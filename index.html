<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V4.3 Ultra Shield</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; --ghost: #3b4a54; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* HEADER SEGÚN FOTO */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 2px solid var(--primary); border-radius: 0 0 20px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .content-body { margin-top: 410px; width: 100%; padding-bottom: 80px; }
        .admin-mode .content-body { margin-top: 460px; }

        #status-bar { font-size: 10px; text-align: center; margin-bottom: 12px; color: #adff2f; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .grid-2 { grid-template-columns: 1fr 2fr; }

        .btn { height: 44px; border-radius: 12px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 6px; text-transform: uppercase; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .primary { background: #2563eb; } .danger { background: #e11d48; } .ghost { background: var(--ghost); } 
        .warning { background: #f59e0b; color: #000; } .success-btn { background: #22c55e; } .orange { background: #f97316; }

        input { width: 100%; height: 46px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); padding: 0 15px; background: #2a3942; color: white; font-size: 15px; }

        /* CONSOLA LOG PEGADA AL BLOQUE */
        #log-container { background: #000; border-radius: 12px; margin-top: 5px; border: 1px solid #333; height: 90px; position: relative; overflow: hidden; }
        #log-panel { padding: 10px; font-size: 10px; height: 100%; overflow-y: auto; font-family: 'Consolas', monospace; color: #0f0; }
        #btn-save-log { position: absolute; top: 5px; right: 5px; background: #333; color: #0cf; border: none; padding: 3px 7px; border-radius: 5px; font-size: 9px; cursor: pointer; opacity: 0.8; }

        /* LISTA */
        .item { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .item b { font-size: 16px; color: #2563eb; }
        .item.no-phone { border-left: 6px solid #f59e0b; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <button id="btn-rocket" class="btn primary" style="position:fixed; bottom:20px; right:20px; width:50px; height:50px; border-radius:50%; display:none; z-index:5001;"><i class="fas fa-rocket"></i></button>

    <!-- PANTALLA LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px;">GestiónUF Login</h2>
            <input id="u-login" placeholder="Usuario">
            <input id="p-login" type="password" placeholder="Contraseña">
            <button id="do-login" class="btn primary" style="width:100%">ENTRAR</button>
            <button id="btn-recuperar" class="btn ghost" style="width:100%; margin-top:10px">RECUPERAR ACCESO</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="status-bar">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            
            <div class="grid-btns">
                <button id="btn-show-log" class="btn ghost admin-only">LOG</button>
                <button id="btn-tema" class="btn ghost">TEMA</button>
                <button id="btn-salir" class="btn orange">SALIR</button>
            </div>

            <div class="grid-btns admin-only">
                <button id="btn-nueva-uf" class="btn primary">NUEVA UF</button>
                <button id="btn-importar" class="btn ghost">IMPORTAR</button>
                <button id="btn-cuentas" class="btn success-btn">CUENTAS</button>
            </div>

            <input id="search-input" placeholder="Buscar unidad o nombre...">
            
            <div class="grid-btns">
                <button id="btn-buscar" class="btn primary">BUSCAR</button>
                <button id="btn-limpiar" class="btn ghost">LIMPIAR</button>
                <button id="btn-disponibles" class="btn warning">UF DISPONIBLES</button>
            </div>

            <div class="grid-btns admin-only">
                <button id="btn-respaldo" class="btn success-btn">RESPALDO</button>
                <button id="btn-borrar-base" class="btn danger" style="grid-column: span 2">BORRAR BASE</button>
            </div>

            <!-- CONSOLA PEGADA -->
            <div id="log-container" class="hidden">
                <button id="btn-save-log"><i class="fas fa-save"></i> LOG</button>
                <div id="log-panel"></div>
            </div>
        </div>

        <div class="content-body" id="list"></div>
    </div>

    <!-- MODALES DE ACCIÓN -->
    <div id="modal-conf" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3 id="conf-title">Confirmar</h3>
            <p id="conf-msg" style="margin:15px 0;"></p>
            <input id="conf-pass" type="password" placeholder="Contraseña de Admin">
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr;">
                <button id="conf-si" class="btn primary">CONFIRMAR</button>
                <button id="conf-no" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3>Datos de Unidad</h3><br>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <button id="btn-guardar-uf" class="btn primary" style="width:100%">GUARDAR</button>
            <button id="btn-cerrar-form" class="btn danger" style="width:100%; margin-top:10px">CERRAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], editId = null, pAction = null;
        const getU = () => JSON.parse(localStorage.getItem("db_u") || '{"admin":{"pass":"admin123","role":"admin"}}');
        const curU = () => localStorage.getItem("uf_user");

        const logAction = (m, t='info') => {
            const p = document.getElementById("log-panel");
            if(p) {
                p.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
                p.scrollTop = p.scrollHeight;
            }
        };

        // EVENTO ENTER UNIVERSAL
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                if(!document.getElementById("login-screen").classList.contains("hidden")) document.getElementById("do-login").click();
                else if(!document.getElementById("main-screen").classList.contains("hidden")) document.getElementById("btn-buscar").click();
            }
        });

        // LOGIN
        document.getElementById("do-login").onclick = () => {
            const u = document.getElementById("u-login").value.toLowerCase().trim();
            const p = document.getElementById("p-login").value;
            if(getU()[u] && getU()[u].pass === p) {
                localStorage.setItem("uf_auth", "true");
                localStorage.setItem("uf_user", u);
                location.reload();
            } else alert("Error de acceso");
        };

        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            if(getU()[curU()]?.role === 'admin') document.body.classList.add("admin-mode");

            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
            logAction(`Sesión: ${curU()}`, 'success');
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            const isAdmin = getU()[curU()]?.role === 'admin';
            data.forEach(d => {
                const tel = String(d.TelefonoPropietario || d.TelefonoInquilino || "").trim();
                const div = document.createElement("div");
                div.className = `item ${!tel ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><br><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-eye" onclick="window.det('${d.id}')"></i>
                            ${isAdmin ? `<i class="fas fa-edit" style="color:#2563eb" onclick="window.edit('${d.id}')"></i>` : ''}
                            ${isAdmin ? `<i class="fas fa-trash" style="color:#e11d48" onclick="window.ask('¿Borrar UF ${d.UF}?', 'del', '${d.id}')"></i>` : ''}
                        </div>
                    </div>
                    <div id="d-${d.id}" class="hidden" style="margin-top:10px; padding-top:10px; border-top:1px dashed #444; font-size:13px">
                        <p>Prop: ${d.Propietario} (${d.TelefonoPropietario || 'S/D'})</p>
                        <p>Inq: ${d.Inquilino} (${d.TelefonoInquilino || 'S/D'})</p>
                        <div class="grid-btns" style="margin-top:10px">
                            <a href="tel:${tel}" class="btn primary" onclick="window.logAction('Llamada UF ${d.UF}')">LLAMAR</a>
                            <a href="https://wa.me/${tel.replace(/\D/g,'')}" target="_blank" class="btn success-btn">WHATSAPP</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // ACCIONES
        window.det = (id) => { document.getElementById(`d-${id}`).classList.toggle("hidden"); logAction(`Vió UF ID: ${id}`); };
        document.getElementById("btn-buscar").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            const r = departamentos.filter(d => d.UF.includes(v) || d.Propietario.toLowerCase().includes(v));
            render(r);
            logAction(`Buscó: ${v} (${r.length} resultados)`);
        };
        document.getElementById("btn-disponibles").onclick = () => {
            const r = departamentos.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino);
            render(r);
            logAction("Filtró UF Disponibles");
        };

        // MODALES Y SEGURIDAD
        window.ask = (m, t, id=null) => {
            pAction = {t, id};
            document.getElementById("conf-msg").innerText = m;
            document.getElementById("conf-pass").value = "";
            document.getElementById("modal-conf").classList.remove("hidden");
        };

        document.getElementById("btn-salir").onclick = () => window.ask("¿Cerrar sesión?", "exit");
        document.getElementById("btn-borrar-base").onclick = () => window.ask("¿BORRAR TODA LA BASE DE DATOS?", "clearAll");
        document.getElementById("btn-respaldo").onclick = () => window.ask("¿Descargar respaldo CSV?", "csv");

        document.getElementById("conf-si").onclick = async () => {
            const pass = document.getElementById("conf-pass").value;
            if(pAction.t !== 'exit' && pass !== getU()[curU()].pass) return alert("Clave Incorrecta");
            
            if(pAction.t === 'exit') { localStorage.clear(); location.reload(); }
            if(pAction.t === 'del') await deleteDoc(doc(db, "departamentos", pAction.id));
            if(pAction.t === 'csv') {
                let csv = "UF,Propietario,TelP,Inquilino,TelI\n" + departamentos.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
                const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download="respaldo.csv"; a.click();
            }
            if(pAction.t === 'clearAll') {
                const s = await getDocs(collection(db, "departamentos"));
                const b = writeBatch(db); s.forEach(d => b.delete(d.ref)); await b.commit();
            }
            document.getElementById("modal-conf").classList.add("hidden");
            logAction(`Acción: ${pAction.t} ejecutada`);
        };

        document.getElementById("conf-no").onclick = () => document.getElementById("modal-conf").classList.add("hidden");
        document.getElementById("btn-show-log").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-nueva-uf").onclick = () => { editId = null; document.getElementById("modal-form").classList.remove("hidden"); };
        document.getElementById("btn-cerrar-form").onclick = () => document.getElementById("modal-form").classList.add("hidden");
        document.getElementById("btn-save-log").onclick = () => {
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([document.getElementById("log-panel").innerText],{type:'text/plain'})); a.download="log.txt"; a.click();
        };

        window.logAction = logAction;
    </script>
</body>
</html>
