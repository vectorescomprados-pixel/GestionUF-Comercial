<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Gestión UF - REPARADO</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0b141a; color: white; padding: 20px; }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .card { background: #111b21; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222d34; }
        .btn-home { display: block; width: 40px; text-align: center; margin: 0 auto 10px; color: #2563eb; font-size: 24px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="btn-home"><i class="fas fa-home"></i></a>
        <h2 style="text-align:center">Ingreso</h2>
        <input id="u" type="text" placeholder="Usuario">
        <input id="p" type="password" placeholder="Contraseña">
        <button id="btn-entrar">ENTRAR</button>
    </div>

    <div id="main-screen" class="hidden">
        <button id="btn-salir" style="background:#e11d48; margin-bottom:20px">CERRAR SESIÓN</button>
        <div id="lista">Cargando unidades...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const conf = { 
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
            authDomain: "gestionuf-remoto.firebaseapp.com", 
            projectId: "gestionuf-remoto", 
            storageBucket: "gestionuf-remoto.firebasestorage.app", 
            messagingSenderId: "724452752860", 
            appId: "1:724452752860:web:4d25585addcdcbd146e319" 
        };

        const app = initializeApp(conf);
        const db = getFirestore(app);

        // LOGIN SIN VUELTAS
        document.getElementById("btn-entrar").onclick = async () => {
            const user = document.getElementById("u").value.trim();
            const pass = document.getElementById("p").value.trim();

            try {
                const q = query(collection(db, "usuarios"), where("usuario", "==", user), where("password", "==", pass));
                const snap = await getDocs(q);
                
                if (!snap.empty) {
                    // El arreglo que pedía la consola
                    localStorage.setItem("sesion_activa", "si");
                    location.reload();
                } else {
                    alert("Usuario o clave mal escritos");
                }
            } catch (err) {
                console.error(err);
                alert("Error técnico al conectar. Revisa tu conexión.");
            }
        };

        // SI YA ESTÁ LOGUEADO
        if(localStorage.getItem("sesion_activa") === "si") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");

            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                const listado = document.getElementById("lista");
                listado.innerHTML = "";
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    listado.innerHTML += `<div class="card"><b>UF: ${d.UF}</b><br>${d.Propietario || 'S/N'}</div>`;
                });
            });
        }

        document.getElementById("btn-salir").onclick = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
