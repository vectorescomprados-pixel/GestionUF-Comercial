<div id="login-screen" class="modal">
    <div class="modal-content">
        <div style="text-align: right; margin-bottom: -20px;">
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="ghost" style="text-decoration: none; font-size: 20px; color: var(--primary);"><i class="fas fa-house-chimney"></i></a>
        </div>
        
        <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
        <input id="login-user" placeholder="Usuario">
        <input id="login-pass" type="password" placeholder="Contraseña">
        <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
        <button id="btn-create-user-trigger" class="btn ghost" style="width:100%; margin-top:10px">GESTIONAR ACCESOS (ADMIN)</button>
    </div>
</div>

<div id="modal-create-user" class="modal hidden">
    <div class="modal-content" style="max-width: 500px; max-height: 90vh; overflow-y: auto;">
        <h3 style="text-align:center; margin-bottom:15px">Control de Accesos</h3>
        
        <div style="background: var(--bg); padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border);">
            <input id="new-username" placeholder="Nuevo Usuario">
            <input id="new-password" type="password" placeholder="Contraseña">
            <select id="new-role">
                <option value="operador">Operador (Gestión)</option>
                <option value="admin">Administrador (Total)</option>
            </select>
            <button id="btn-save-user" class="btn primary" style="width:100%">REGISTRAR NUEVO</button>
        </div>

        <div id="user-list-container">
            <h4 style="font-size: 12px; margin-bottom: 10px; opacity: 0.7; text-transform: uppercase;">Usuarios Registrados</h4>
            <div id="user-list-items">
                </div>
        </div>

        <button id="btn-cancel-user" class="btn danger" style="width:100%; margin-top:15px">CERRAR PANEL</button>
    </div>
</div>

<script type="module">
    // ... (Mantener importaciones y config de Firebase igual) ...

    // --- NUEVA LÓGICA PARA GESTIÓN DE USUARIOS ---

    // Función para renderizar la lista de usuarios en el modal
    const renderUserList = async () => {
        const container = document.getElementById("user-list-items");
        container.innerHTML = "<small>Cargando usuarios...</small>";
        
        const snap = await getDocs(collection(db, "usuarios"));
        container.innerHTML = "";

        snap.forEach(userDoc => {
            const userData = userDoc.data();
            const userId = userDoc.id;
            
            const div = document.createElement("div");
            div.style = "display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--border); font-size:13px;";
            div.innerHTML = `
                <div style="flex-grow:1">
                    <b style="color:var(--primary)">${userData.usuario}</b> 
                    <span style="font-size:10px; background:var(--bg); padding:2px 5px; border-radius:4px">${userData.role}</span>
                    <div id="pass-view-${userId}" class="hidden" style="font-family:monospace; margin-top:4px; color:var(--success)">${userData.password}</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <i class="fas fa-eye" title="Ver Clave" onclick="document.getElementById('pass-view-${userId}').classList.toggle('hidden')" style="cursor:pointer"></i>
                    <i class="fas fa-trash" title="Eliminar" onclick="window.deleteUserAction('${userId}', '${userData.usuario}')" style="color:var(--danger); cursor:pointer"></i>
                </div>
            `;
            container.appendChild(div);
        });
    };

    // Exponer función de borrado de usuario
    window.deleteUserAction = async (id, name) => {
        if(confirm(`¿Está seguro de eliminar al usuario ${name}?`)) {
            await deleteDoc(doc(db, "usuarios", id));
            writeLog(`Usuario eliminado: ${name}`, 'err');
            renderUserList();
        }
    };

    // Modificar el disparador de creación de usuarios para que cargue la lista
    const originalConfirmYes = document.getElementById("btn-confirm-yes").onclick;
    document.getElementById("btn-confirm-yes").onclick = async (e) => {
        if(pendingAction.type === 'openUserForm' && document.getElementById("confirm-pass").value === MASTER_CODE) {
            renderUserList(); // Cargar lista antes de mostrar modal
        }
        // Llamar a la lógica original que ya tienes para manejar el MASTER_CODE
        // (Asegúrate de que el código original de btn-confirm-yes se ejecute)
    };

    // Actualizar el guardado de usuario para refrescar la lista
    const originalSaveUser = document.getElementById("btn-save-user").onclick;
    document.getElementById("btn-save-user").onclick = async () => {
        const u = document.getElementById("new-username").value;
        const p = document.getElementById("new-password").value;
        const r = document.getElementById("new-role").value;
        if(u && p) {
            await addDoc(collection(db, "usuarios"), { usuario: u, password: p, role: r });
            writeLog(`Nuevo usuario creado: ${u}`, "success");
            // Limpiar campos y refrescar
            document.getElementById("new-username").value = "";
            document.getElementById("new-password").value = "";
            renderUserList();
        }
    };
    
    // ... (Resto del código original de Firebase y UI) ...
</script>
