<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V2.7 Hotfix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; --blue-text: #3b82f6; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; --blue-text: #2563eb; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        /* HEADER FIJO */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .content-body { margin-top: 395px; width: 100%; padding-bottom: 100px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #334155; } .warning { background: var(--warning); color: #000; }
        
        /* COHETE REAPARECIDO */
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 20px; border: 2px solid white; display: none; align-items: center; justify-content: center; cursor: pointer; background: var(--primary); color: white; }

        /* LISTA */
        .item { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        .item.no-phone { border-left: 5px solid var(--warning) !important; }
        .item b.uf-title { font-size: 18px; color: var(--blue-text); display: block; }
        
        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: rgba(0,0,0,0.1); color: var(--text); font-size: 16px; outline: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- BOTÓN COHETE (FIXED) -->
    <div id="btn-rocket"><i class="fas fa-rocket"></i></div>

    <!-- PANTALLA LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">ENTRAR</button>
            <button id="btn-support-init" class="btn ghost" style="width:100%; margin-top:10px">SOPORTE TÉCNICO</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="import-progress" style="width:100%; height:4px; background:#333; margin-bottom:8px; display:none"><div id="progress-fill" style="width:0%; height:100%; background:var(--success)"></div></div>
            
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">LOGS</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-init" class="btn danger">CERRAR</button>
            </div>
            
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-add-user-init" class="btn ghost">USER +</button>
                <button id="btn-import-init" class="btn ghost">IMPORTAR</button>
            </div>
            
            <input id="search-input" placeholder="Buscar por UF o Nombre...">
            
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-export-init" class="btn ghost" style="width:49%; display:inline-block">RESPALDO</button>
            <button id="btn-wipe-init" class="btn danger" style="width:49%; display:inline-block">BORRAR NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden" style="margin-bottom:15px">
                <div id="log-panel" style="background:#000; color:#0f0; font-size:10px; padding:10px; height:100px; overflow-y:auto; border-radius:8px; font-family:monospace"></div>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODALES VARIOS (SOPORTE, SEGURIDAD, FORMULARIO) -->
    <div id="modal-alert" class="modal hidden"><div class="modal-content"><h3 id="alert-title">ADVERTENCIA</h3><p id="alert-msg"></p><div class="grid-btns-2"><button id="btn-alert-yes" class="btn primary">SÍ</button><button id="btn-alert-no" class="btn danger">NO</button></div></div></div>
    
    <div id="modal-secure" class="modal hidden"><div class="modal-content"><h3>AUTORIZACIÓN</h3><p id="secure-msg"></p><input id="secure-pass" type="password" placeholder="Clave Maestra"><div class="grid-btns-2"><button id="btn-secure-yes" class="btn danger">OK</button><button id="btn-secure-no" class="btn ghost">VOLVER</button></div></div></div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Nueva Unidad</h3>
            <input id="f-uf" placeholder="UF (Ej: 0001)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel Prop">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel Inq">
            <div class="grid-btns-2"><button id="btn-save" class="btn primary">GUARDAR</button><button id="btn-cancel" class="btn ghost">SALIR</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const MASTER = "1131552679";
        let ufs = [], activeId = null, pendingSecure = null, pendingAlert = null;

        function writeLog(m) {
            const p = document.getElementById("log-panel");
            p.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${m}</div>`;
            p.scrollTop = p.scrollHeight;
        }

        // --- LOGIN ---
        document.getElementById("btn-login").onclick = () => {
            if(document.getElementById("login-pass").value === MASTER) {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("main-screen").classList.remove("hidden");
                load(); writeLog("Sesión iniciada");
            } else alert("Error");
        };

        // --- MOTOR DE DATOS ---
        function load() {
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                ufs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(ufs);
            });
        }

        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                const noTel = (!d.TelefonoPropietario || d.TelefonoPropietario === "") && (!d.TelefonoInquilino || d.TelefonoInquilino === "");
                const div = document.createElement("div");
                div.className = `item ${noTel ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <div><b class="uf-title">UF: ${d.UF}</b><span>${d.Propietario || '---'}</span></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-eye" style="color:#64748b" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger)" onclick="window.openSecure('¿Borrar UF ${d.UF}?', 'del', '${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details-box hidden" style="border-top:1px dashed #444; margin-top:10px; padding-top:10px">
                        <small style="color:var(--blue-text)">P:</small> ${d.Propietario} | ${d.TelefonoPropietario || 'N/C'}<br>
                        <small style="color:var(--blue-text)">I:</small> ${d.Inquilino} | ${d.TelefonoInquilino || 'N/C'}
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- NUEVA UF (FIXED) ---
        document.getElementById("btn-add").onclick = () => {
            activeId = null;
            document.getElementById("f-uf").value = "";
            document.getElementById("f-prop").value = "";
            document.getElementById("f-telp").value = "";
            document.getElementById("f-inq").value = "";
            document.getElementById("f-teli").value = "";
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const data = { 
                UF: document.getElementById("f-uf").value, 
                Propietario: document.getElementById("f-prop").value, 
                TelefonoPropietario: document.getElementById("f-telp").value, 
                Inquilino: document.getElementById("f-inq").value, 
                TelefonoInquilino: document.getElementById("f-teli").value 
            };
            if(activeId) await updateDoc(doc(db, "departamentos", activeId), data);
            else await addDoc(collection(db, "departamentos"), data);
            writeLog(`UF ${data.UF} Guardada`);
            document.getElementById("modal-form").classList.add("hidden");
        };

        // --- LIMPIAR (FIXED) ---
        document.getElementById("btn-clear").onclick = () => {
            document.getElementById("search-input").value = ""; // Limpia el campo
            render(ufs); // Restaura la lista
            writeLog("Búsqueda limpiada");
        };

        // --- COHETE (FIXED) ---
        window.onscroll = () => {
            document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? "flex" : "none";
        };
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top:0, behavior:'smooth'});

        // --- OTROS ---
        window.openSecure = (msg, action, id = null) => {
            pendingSecure = { action, id };
            document.getElementById("secure-msg").innerText = msg;
            document.getElementById("modal-secure").classList.remove("hidden");
        };

        document.getElementById("btn-secure-yes").onclick = async () => {
            if(document.getElementById("secure-pass").value !== MASTER) return alert("Error");
            const { action, id } = pendingSecure;
            if(action === 'del') await deleteDoc(doc(db, "departamentos", id));
            if(action === 'wipe') {
                const b = writeBatch(db); ufs.forEach(u => b.delete(doc(db, "departamentos", u.id)));
                await b.commit(); writeLog("BASE BORRADA");
            }
            document.getElementById("modal-secure").classList.add("hidden");
            document.getElementById("secure-pass").value = "";
        };

        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(ufs.filter(u => u.UF.includes(v) || (u.Propietario||'').toLowerCase().includes(v)));
            writeLog("Buscando: " + v);
        };

        document.getElementById("btn-logout-init").onclick = () => {
            if(confirm("¿Cerrar Sistema?")) location.reload();
        };

        document.getElementById("btn-theme").onclick = () => {
            document.body.classList.toggle("light-mode");
            writeLog("Cambio de tema");
        };

        window.editUF = (id) => {
            activeId = id; const d = ufs.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF;
            document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario;
            document.getElementById("modal-form").classList.remove("hidden");
        };
        
        document.getElementById("btn-cancel").onclick = () => document.getElementById("modal-form").classList.add("hidden");
        document.getElementById("btn-secure-no").onclick = () => document.getElementById("modal-secure").classList.add("hidden");

    </script>
</body>
</html>
