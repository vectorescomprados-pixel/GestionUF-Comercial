<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V4.6 Stable</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; --ghost: #374151; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; }
        html, body { overscroll-behavior-y: contain; margin: 0; padding: 0; background: var(--bg); color: var(--text); transition: 0.3s; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        .wrap { width: 95%; max-width: 450px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        /* Header Fijo */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 20px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .content-body { margin-top: 420px; padding-bottom: 100px; }
        
        /* Botones */
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn { height: 45px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: var(--ghost); } .warning { background: var(--warning); color: #000; }
        .btn-wa { background: #22c55e; color: white; text-decoration: none; }

        /* Consola Logs */
        #log-container { background: #000; border-radius: 12px; border: 1px solid #333; position: relative; padding: 15px; margin-bottom: 20px; }
        #log-panel { height: 110px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #40c4ff; line-height: 1.5; padding-right: 30px; }
        #log-panel::-webkit-scrollbar { width: 4px; } 
        #log-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        #btn-download-logs { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px; border-radius: 6px; cursor: pointer; z-index: 10; }

        /* Items Lista (Estética Imagen) */
        .item { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .item.no-phone { border-left: 6px solid var(--warning) !important; } 
        .item b { font-size: 16px; color: var(--primary); display: block; margin-bottom: 4px; }
        
        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        input { width: 100%; height: 45px; margin-bottom: 12px; border-radius: 10px; border: 1px solid var(--border); padding: 0 12px; background: #1a242b; color: #fff; }

        #btn-rocket { position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: white; border: none; display: none; align-items: center; justify-content: center; font-size: 18px; z-index: 2000; }
        .user-row { display: flex; justify-content: space-between; padding: 10px; background: #161f27; margin-bottom: 5px; border-radius: 8px; align-items: center; }
    </style>
</head>
<body>

    <button id="btn-rocket"><i class="fas fa-rocket"></i></button>
    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 style="color:var(--primary); margin-bottom:20px">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
            <button id="btn-master-users" class="btn ghost" style="width:100%; margin-top:10px">GESTIÓN ACCESOS</button>
        </div>
    </div>

    <!-- GESTIÓN USUARIOS -->
    <div id="modal-users" class="modal hidden">
        <div class="modal-content">
            <h3 id="user-form-title">Usuarios</h3>
            <div id="users-list" style="max-height:180px; overflow-y:auto; margin-bottom:15px"></div>
            <input id="new-u-name" placeholder="Nombre">
            <input id="new-u-pass" placeholder="Password">
            <button id="btn-save-user" class="btn primary" style="width:100%">CREAR</button>
            <button onclick="document.getElementById('modal-users').classList.add('hidden')" class="btn ghost" style="width:100%; margin-top:10px">VOLVER</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div style="font-size:10px; text-align:center; margin-bottom:10px; color:var(--success)">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import-trigger" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">UF DISPONIBLES</button>
            </div>
            <button id="btn-delete-all" class="btn danger admin-only" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden">
                <button id="btn-download-logs"><i class="fas fa-download"></i></button>
                <div id="log-panel"></div>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL MASTER / CONFIRM -->
    <div id="modal-master" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <i class="fas fa-shield-alt" style="font-size:35px; color:var(--warning); margin-bottom:10px"></i>
            <h3 id="master-msg" style="font-size:16px">Autorización Requerida</h3>
            <input id="master-pass-input" type="password" placeholder="Clave Maestra" style="text-align:center">
            <div class="grid-btns-2">
                <button id="btn-master-confirm" class="btn primary">OK</button>
                <button id="btn-master-cancel" class="btn danger">SALIR</button>
            </div>
        </div>
    </div>

    <!-- FORMULARIO UF -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save-uf" class="btn primary">GUARDAR</button>
                <button onclick="document.getElementById('modal-form').classList.add('hidden')" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], pendingAction = null, editUfId = null, editUserId = null;
        const MASTER_CODE = "1131552679";
        const userRole = localStorage.getItem("uf_user_role") || "operador";

        const writeLog = (m) => {
            const lp = document.getElementById("log-panel");
            if(lp) { lp.innerHTML += `<div>» [${new Date().toLocaleTimeString()}] ${m}</div>`; lp.scrollTop = lp.scrollHeight; }
        };

        // --- LOGIN CORREGIDO ---
        document.getElementById("btn-login").onclick = async () => {
            const u = document.getElementById("login-user").value.trim();
            const p = document.getElementById("login-pass").value.trim();
            if(!u || !p) return alert("Complete los campos");

            const qLogin = query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p));
            const snap = await getDocs(qLogin);

            if(!snap.empty) {
                const data = snap.docs[0].data();
                localStorage.setItem("uf_auth", "true");
                localStorage.setItem("uf_user_role", data.role || "operador");
                location.reload();
            } else {
                alert("Credenciales incorrectas");
            }
        };

        // --- RENDER REGISTROS ---
        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                const tel = String(d.TelefonoPropietario || d.TelefonoInquilino || "").trim();
                const div = document.createElement("div");
                div.className = `item ${!tel ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || '---'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-eye" style="cursor:pointer" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary); cursor:pointer" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash ${userRole==='admin'?'':'hidden'}" style="color:var(--danger); cursor:pointer" onclick="window.askConfirm('¿Borrar UF ${d.UF}?','deleteUf','${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px dashed #444; padding-top:10px; font-size:13px">
                        <p style="color:var(--primary)">Prop: <span style="color:white">${d.Propietario}</span></p>
                        <p style="color:var(--primary)">Tel: <span style="color:white">${d.TelefonoPropietario || 'N/C'}</span></p>
                        <p style="color:var(--primary)">Inq: <span style="color:white">${d.Inquilino || 'N/C'}</span></p>
                        <p style="color:var(--primary)">Tel: <span style="color:white">${d.TelefonoInquilino || 'N/C'}</span></p>
                        <div class="grid-btns-2">
                            <a href="tel:${tel}" class="btn primary" style="text-decoration:none">LLAMAR</a>
                            <a href="https://wa.me/${tel.replace(/\D/g,'')}" target="_blank" class="btn btn-wa">CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- SISTEMA MAESTRO ---
        window.askConfirm = (msg, action, id = null) => {
            pendingAction = { type: action, id: id };
            document.getElementById("master-msg").innerText = msg;
            document.getElementById("modal-master").classList.remove("hidden");
            document.getElementById("master-pass-input").value = "";
        };

        document.getElementById("btn-master-confirm").onclick = async () => {
            if(document.getElementById("master-pass-input").value !== MASTER_CODE) return alert("Clave Incorrecta");
            const a = pendingAction; document.getElementById("modal-master").classList.add("hidden");
            if(a.type === 'deleteUf') await deleteDoc(doc(db, "departamentos", a.id));
            if(a.type === 'manageUsers') { loadUsers(); document.getElementById("modal-users").classList.remove("hidden"); }
            if(a.type === 'import') document.getElementById("csv-file").click();
            if(a.type === 'deleteAll') {
                const b = writeBatch(db); departamentos.forEach(d => b.delete(doc(db, "departamentos", d.id)));
                await b.commit(); writeLog("BASE BORRADA POR ADMIN");
            }
        };

        // --- USUARIOS ---
        async function loadUsers() {
            const snap = await getDocs(collection(db, "usuarios"));
            const cont = document.getElementById("users-list"); cont.innerHTML = "";
            snap.forEach(u => {
                const d = u.data();
                const div = document.createElement("div"); div.className = "user-row";
                div.innerHTML = `<span>${d.usuario}</span>
                    <div>
                        <i class="fas fa-edit" style="color:var(--primary); margin-right:10px; cursor:pointer" onclick="window.prepareEditUser('${u.id}','${d.usuario}','${d.password}')"></i>
                        <i class="fas fa-trash" style="color:var(--danger); cursor:pointer" onclick="window.deleteUser('${u.id}')"></i>
                    </div>`;
                cont.appendChild(div);
            });
        }
        window.prepareEditUser = (id, n, p) => {
            editUserId = id; document.getElementById("new-u-name").value = n;
            document.getElementById("new-u-pass").value = p;
            document.getElementById("btn-save-user").innerText = "ACTUALIZAR";
        };
        document.getElementById("btn-save-user").onclick = async () => {
            const u = document.getElementById("new-u-name").value, p = document.getElementById("new-u-pass").value;
            if(editUserId) await updateDoc(doc(db, "usuarios", editUserId), {usuario:u, password:p});
            else await addDoc(collection(db, "usuarios"), {usuario:u, password:p, role:"operador"});
            editUserId = null; document.getElementById("btn-save-user").innerText = "CREAR";
            document.getElementById("new-u-name").value = ""; document.getElementById("new-u-pass").value = "";
            loadUsers();
        };
        window.deleteUser = async (id) => { if(confirm("¿Eliminar?")) { await deleteDoc(doc(db, "usuarios", id)); loadUsers(); } };

        // --- APP ACTIONS ---
        document.getElementById("btn-logout").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("light-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-master-users").onclick = () => askConfirm("Gestión de Accesos", "manageUsers");
        document.getElementById("btn-import-trigger").onclick = () => askConfirm("Importar CSV", "import");
        document.getElementById("btn-export").onclick = () => {
            const csv = "UF,Prop,TelP,Inq,TelI\n" + departamentos.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download="Respaldo.csv"; a.click();
        };
        document.getElementById("btn-delete-all").onclick = () => askConfirm("¿BORRAR TODO?", "deleteAll");

        // --- CRUD UF ---
        document.getElementById("btn-add").onclick = () => { editUfId = null; document.querySelectorAll("#modal-form input").forEach(i => i.value=""); document.getElementById("modal-form").classList.remove("hidden"); };
        window.editUF = (id) => {
            editUfId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario || "";
            document.getElementById("f-inq").value = d.Inquilino || "";
            document.getElementById("f-teli").value = d.TelefonoInquilino || "";
            document.getElementById("modal-form").classList.remove("hidden");
        };
        document.getElementById("btn-save-uf").onclick = async () => {
            const d = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            editUfId ? await updateDoc(doc(db, "departamentos", editUfId), d) : await addDoc(collection(db, "departamentos"), d);
            document.getElementById("modal-form").classList.add("hidden");
        };

        // --- FILTROS ---
        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v)));
        };
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-filter-empty").onclick = () => render(departamentos.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino));

        // --- INIT ---
        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            if(userRole !== 'admin') document.querySelectorAll(".admin-only").forEach(e => e.classList.add("hidden"));
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (s) => {
                departamentos = s.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos); writeLog("Cloud Sync OK");
            });
        }
        
        window.onscroll = () => document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? 'flex' : 'none';
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        document.getElementById("btn-master-cancel").onclick = () => document.getElementById("modal-master").classList.add("hidden");
    </script>
</body>
</html>
