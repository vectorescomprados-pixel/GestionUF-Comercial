<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>GestiónUF - Restaurado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b141a; --card-bg: #111b21; --primary-color: #2563eb; --danger-color: #e11d48; --text-color: #e9edef; --border-color: #222d34; --warning-color: #f59e0b; --success-color: #22c55e; --ghost-color: #334155; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 95%; max-width: 450px; }
        .hidden { display: none !important; }
        
        /* HEADER IDENTICO FOTO 1 */
        .header-fixed { position: fixed; top: 0; width: 95%; max-width: 450px; background-color: var(--card-bg); z-index: 1000; padding: 15px; border-bottom: 2px solid var(--primary-color); border-radius: 0 0 15px 15px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 45px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-danger { background-color: var(--danger-color); }
        .btn-ghost { background-color: var(--ghost-color); }
        .btn-warning { background-color: var(--warning-color); color: #000; }
        
        input { width: 100%; height: 48px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border-color); padding: 0 15px; background-color: #1d2a33; color: white; }
        
        .main-content { margin-top: 360px; padding-bottom: 50px; }
        
        /* TARJETAS */
        .uf-card { background-color: var(--card-bg); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .uf-card::before { content: ''; position: absolute; left: 0; top: 15%; height: 70%; width: 5px; background: var(--warning-color); border-radius: 0 5px 5px 0; }
        
        /* MODALES UNIFICADOS (FOTO 2 y 3) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border-color); }
        
        /* BOTONES LLAMADA/CHAT ORIGINALES */
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-call { flex: 1; background: #1c2e4a; color: #5c85d6; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 12px; font-weight: bold; }
        .btn-chat { flex: 1; background: #0d2d1f; color: #2e7d32; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color: var(--primary-color);">GESTIÓN UF</h2>
            <div id="login-box">
                <input type="text" id="login-user" placeholder="Usuario">
                <input type="password" id="login-pass" placeholder="Contraseña">
                <button id="btn-login" class="btn btn-primary" style="width:100%">ENTRAR</button>
                <button id="btn-pre-reg" class="btn btn-ghost" style="width:100%; margin-top:10px;">CREAR USUARIO</button>
            </div>
            <div id="reg-box" class="hidden">
                <h3 style="color:var(--warning-color); margin-bottom:10px;">REGISTRO</h3>
                <input type="text" id="reg-user" placeholder="Nuevo Usuario">
                <input type="password" id="reg-pass" placeholder="Contraseña">
                <button id="btn-save-user" class="btn btn-warning" style="width:100%">VALIDAR</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="wrapper hidden">
        <div class="header-fixed">
            <div style="text-align: center; font-size: 10px; color: var(--success-color); margin-bottom: 10px; font-weight: bold;">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <!-- FILA 1 FOTO 1 -->
            <div class="btn-grid">
                <button id="btn-logs" class="btn btn-ghost">HISTORIAL</button>
                <button id="btn-tema" class="btn btn-ghost">TEMA</button>
                <button id="btn-pre-exit" class="btn btn-danger">CERRAR</button>
            </div>
            <!-- FILA 2 FOTO 1 -->
            <div class="btn-grid">
                <button id="btn-new-uf" class="btn btn-primary">NUEVA UF</button>
                <button id="btn-import" class="btn btn-ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn btn-ghost admin-only">RESPALDO</button>
            </div>
            <input type="text" id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <!-- FILA 3 FOTO 1 -->
            <div class="btn-grid">
                <button id="btn-search" class="btn btn-primary">BUSCAR</button>
                <button id="btn-clear" class="btn btn-ghost">LIMPIAR</button>
                <button id="btn-empty" class="btn btn-warning">SIN DATOS</button>
            </div>
            <!-- BOTON FINAL FOTO 1 -->
            <button id="btn-del-all" class="btn btn-danger admin-only" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="main-content" id="uf-list"></div>
    </div>

    <!-- MODAL FINALIZAR SESIÓN (FOTO 3) -->
    <div id="modal-exit" class="modal-overlay hidden">
        <div class="modal-content">
            <i class="fas fa-sign-out-alt" style="font-size: 40px; color: var(--danger-color); margin-bottom: 15px;"></i>
            <h3>Finalizar Sesión</h3>
            <p style="margin: 15px 0; font-size: 14px; opacity: 0.8;">¿Desea cerrar el sistema de gestión de forma segura?</p>
            <div style="display:flex; gap:10px;">
                <button id="btn-confirm-exit" class="btn btn-danger" style="flex:1">SALIR</button>
                <button onclick="closeModal('modal-exit')" class="btn btn-ghost" style="flex:1">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL SEGURIDAD REQUERIDA (FOTO 2) -->
    <div id="modal-delete" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Seguridad Requerida</h3>
            <p id="del-text" style="margin: 10px 0; font-size: 14px;"></p>
            <input type="password" id="admin-pass" placeholder="Clave Administrativa" style="margin-top:10px;">
            <div style="display:flex; gap:10px; margin-top:5px;">
                <button id="btn-auth-del" class="btn btn-primary" style="flex:1">AUTORIZAR</button>
                <button onclick="closeModal('modal-delete')" class="btn btn-danger" style="flex:1">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let ufs = [], currentDelId = null, MASTER = "1131552679";

        // LOGIN Y REGISTRO
        document.getElementById("btn-pre-reg").onclick = () => {
            const p = prompt("Clave Maestra:");
            if(p === MASTER) {
                document.getElementById("login-box").classList.add("hidden");
                document.getElementById("reg-box").classList.remove("hidden");
            }
        };

        document.getElementById("btn-save-user").onclick = async () => {
            const u = document.getElementById("reg-user").value;
            const p = document.getElementById("reg-pass").value;
            await addDoc(collection(db, "usuarios"), { user: u, pass: p, role: "admin" });
            alert("Usuario Creado");
            location.reload();
        };

        document.getElementById("btn-login").onclick = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(p === MASTER) return start();
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) start(); else alert("Error");
        };

        function start() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("app-container").classList.remove("hidden");
            load();
        }

        function load() {
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                ufs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(ufs);
            });
        }

        function render(data) {
            const list = document.getElementById("uf-list");
            list.innerHTML = "";
            data.forEach(d => {
                const card = document.createElement("div");
                card.className = "uf-card";
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><b style="color:var(--primary-color)">UF: ${d.UF}</b><br><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px;">
                            <i class="fas fa-eye" onclick="toggleDet('${d.id}')"></i>
                            <i class="fas fa-edit" style="color:var(--primary-color)"></i>
                            <i class="fas fa-trash" style="color:var(--danger-color)" onclick="openDel('${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px solid #222; padding-top:10px;">
                        <p><small>Prop:</small> ${d.Propietario || 'N/C'}</p>
                        <div class="action-btns">
                            ${d.TelefonoPropietario ? `<a href="tel:${d.TelefonoPropietario}" class="btn-call"><i class="fas fa-phone"></i> LLAMAR</a>` : ''}
                            ${d.TelefonoPropietario ? `<a href="https://wa.me/${d.TelefonoPropietario}" class="btn-chat"><i class="fab fa-whatsapp"></i> CHAT</a>` : ''}
                        </div>
                    </div>`;
                list.appendChild(card);
            });
        }

        // FUNCIONES MODALES
        window.toggleDet = (id) => document.getElementById(`det-${id}`).classList.toggle("hidden");
        
        window.openDel = (id, uf) => {
            currentDelId = id;
            document.getElementById("del-text").innerText = `¿Borrar registro UF ${uf}?`;
            document.getElementById("modal-delete").classList.remove("hidden");
        };

        document.getElementById("btn-auth-del").onclick = async () => {
            if(document.getElementById("admin-pass").value === MASTER) {
                await deleteDoc(doc(db, "departamentos", currentDelId));
                closeModal('modal-delete');
            } else alert("Clave Incorrecta");
        };

        document.getElementById("btn-pre-exit").onclick = () => document.getElementById("modal-exit").classList.remove("hidden");
        document.getElementById("btn-confirm-exit").onclick = () => location.reload();
        
        window.closeModal = (id) => {
            document.getElementById(id).classList.add("hidden");
            if(id === 'modal-delete') document.getElementById("admin-pass").value = "";
        };

        // EVENTOS HEADER
        document.getElementById("btn-search").onclick = () => {
            const t = document.getElementById("search-input").value.toLowerCase();
            render(ufs.filter(u => u.UF.includes(t) || u.Propietario.toLowerCase().includes(t)));
        };
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(ufs); };
        document.getElementById("btn-del-all").onclick = () => { if(prompt("CLAVE MAESTRA:") === MASTER) ufs.forEach(u => deleteDoc(doc(db, "departamentos", u.id))); };
    </script>
</body>
</html>
