<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise V3.9.5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; --ghost: #4a5568; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; }
        html, body { overscroll-behavior-y: contain; margin: 0; padding: 0; background: var(--bg); color: var(--text); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        .wrap { width: 95%; max-width: 450px; margin: 0 auto; position: relative; }
        .hidden { display: none !important; }
        
        /* Header Fijo */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .content-body { margin-top: 410px; padding-bottom: 100px; }
        
        /* Botones */
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: var(--ghost); } .warning { background: var(--warning); color: #000; }
        
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; border: 2px solid white; display: none; align-items: center; justify-content: center; background: var(--primary); color: white; }
        
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .item.no-phone { border-left: 8px solid var(--warning) !important; }
        
        input, select { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--card); color: var(--text); font-size: 16px; }
        
        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 150px; overflow-y: auto; border-radius: 8px; font-family: monospace; border: 1px solid #333; color: #00ff41; margin-bottom: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <button id="btn-rocket"><i class="fas fa-rocket"></i></button>
    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
            <button id="btn-master-users" class="btn ghost" style="width:100%; margin-top:10px">GESTIÓN ACCESOS</button>
        </div>
    </div>

    <!-- GESTIÓN USUARIOS (SOLO CON CLAVE MAESTRA) -->
    <div id="modal-users" class="modal hidden">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:15px">Usuarios del Sistema</h3>
            <div id="users-list" style="margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px"></div>
            <input id="new-u-name" placeholder="Nombre Usuario">
            <input id="new-u-pass" placeholder="Password">
            <select id="new-u-role">
                <option value="operador">Operador</option>
                <option value="admin">Administrador</option>
            </select>
            <button id="btn-save-user" class="btn primary" style="width:100%">CREAR USUARIO</button>
            <button onclick="document.getElementById('modal-users').classList.add('hidden')" class="btn danger" style="width:100%; margin-top:10px">VOLVER</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:11px; text-align:center; margin-bottom:10px; color:var(--success); font-weight:bold;">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import-trigger" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">UF DISPONIBLES</button>
            </div>
            <button id="btn-delete-all" class="btn danger admin-only" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden">
                <div id="log-panel"></div>
                <button id="btn-download-logs" class="btn ghost admin-only" style="width:100%; height:30px; font-size:9px">DESCARGAR TXT</button>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL CLAVE MAESTRA (EL FAMOSO CARTEL) -->
    <div id="modal-master" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3 id="master-msg">Autorización Requerida</h3>
            <i class="fas fa-lock" style="font-size:40px; color:var(--warning); margin:15px 0"></i>
            <input id="master-pass-input" type="password" placeholder="Clave Maestra" style="text-align:center">
            <div class="grid-btns-2">
                <button id="btn-master-confirm" class="btn primary">CONFIRMAR</button>
                <button id="btn-master-cancel" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- FORMULARIO UF -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Nueva Unidad</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 1A)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save-uf" class="btn primary">GUARDAR</button>
                <button onclick="document.getElementById('modal-form').classList.add('hidden')" class="btn danger">SALIR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], pendingAction = null, editUfId = null;
        const MASTER_CODE = "1131552679";
        const userRole = localStorage.getItem("uf_user_role") || "operador";

        const writeLog = (m) => {
            const lp = document.getElementById("log-panel");
            if(lp) { lp.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; lp.scrollTop = lp.scrollHeight; }
        };

        // --- RENDERIZADO ---
        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                const tel = String(d.TelefonoPropietario || "").trim() || String(d.TelefonoInquilino || "").trim();
                const div = document.createElement("div");
                div.className = `item ${!tel ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || '---'}</small></div>
                        <div style="display:flex; gap:18px; font-size:18px">
                            <i class="fas fa-eye" style="cursor:pointer" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary); cursor:pointer" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash ${userRole==='admin'?'':'hidden'}" style="color:var(--danger); cursor:pointer" onclick="window.askConfirm('¿Eliminar UF ${d.UF}?','deleteUf','${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px dashed #444; padding-top:10px">
                        <p>Prop: ${d.TelefonoPropietario||'--'}</p><p>Inq: ${d.TelefonoInquilino||'--'}</p>
                        <div class="grid-btns-2">
                            <a href="tel:${tel}" class="btn primary">Llamar</a>
                            <a href="https://wa.me/${tel.replace(/\D/g,'')}" class="btn warning">WhatsApp</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- SISTEMA DE CLAVE MAESTRA ---
        window.askConfirm = (msg, action, id = null) => {
            pendingAction = { type: action, id: id };
            document.getElementById("master-msg").innerText = msg;
            document.getElementById("modal-master").classList.remove("hidden");
            document.getElementById("master-pass-input").value = "";
            document.getElementById("master-pass-input").focus();
        };

        document.getElementById("btn-master-confirm").onclick = async () => {
            if(document.getElementById("master-pass-input").value !== MASTER_CODE) return alert("Clave Incorrecta");
            const a = pendingAction;
            document.getElementById("modal-master").classList.add("hidden");

            if(a.type === 'deleteUf') { await deleteDoc(doc(db, "departamentos", a.id)); writeLog("UF Eliminada"); }
            if(a.type === 'deleteAll') {
                const b = writeBatch(db); departamentos.forEach(d => b.delete(doc(db, "departamentos", d.id)));
                await b.commit(); writeLog("BASE TOTAL ELIMINADA");
            }
            if(a.type === 'manageUsers') { loadUsers(); document.getElementById("modal-users").classList.remove("hidden"); }
            if(a.type === 'import') { document.getElementById("csv-file").click(); }
        };

        document.getElementById("btn-master-cancel").onclick = () => document.getElementById("modal-master").classList.add("hidden");

        // --- GESTIÓN DE USUARIOS ---
        async function loadUsers() {
            const snap = await getDocs(collection(db, "usuarios"));
            const container = document.getElementById("users-list");
            container.innerHTML = "";
            snap.forEach(u => {
                const data = u.data();
                container.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px">
                    <span>${data.usuario} (${data.role})</span>
                    <i class="fas fa-user-minus" style="color:red" onclick="window.deleteUser('${u.id}')"></i>
                </div>`;
            });
        }
        window.deleteUser = async (id) => { if(confirm("¿Eliminar usuario?")) { await deleteDoc(doc(db, "usuarios", id)); loadUsers(); } };
        document.getElementById("btn-save-user").onclick = async () => {
            const u = document.getElementById("new-u-name").value, p = document.getElementById("new-u-pass").value, r = document.getElementById("new-u-role").value;
            if(u && p) { await addDoc(collection(db, "usuarios"), {usuario:u, password:p, role:r}); loadUsers(); }
        };

        // --- BOTONES APP ---
        document.getElementById("btn-login").onclick = async () => {
            const u = document.getElementById("login-user").value, p = document.getElementById("login-pass").value;
            const q = query(collection(db, "usuarios"), where("usuario","==",u), where("password","==",p));
            const s = await getDocs(q);
            if(!s.empty) { localStorage.setItem("uf_auth","true"); localStorage.setItem("uf_user_role", s.docs[0].data().role); location.reload(); }
            else alert("Error de acceso");
        };

        document.getElementById("btn-master-users").onclick = () => askConfirm("Acceso a Usuarios", "manageUsers");
        document.getElementById("btn-logout").onclick = () => { if(confirm("¿Cerrar?")) { localStorage.clear(); location.reload(); }};
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("light-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-filter-empty").onclick = () => { render(departamentos.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino)); writeLog("Filtro: Disponibles"); };
        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v)));
        };

        // --- IMPORT/EXPORT ---
        document.getElementById("btn-import-trigger").onclick = () => askConfirm("Importar CSV", "import");
        document.getElementById("csv-file").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const lines = ev.target.result.split("\n").slice(1);
                for(let l of lines) {
                    const c = l.split(",");
                    if(c[0]) await addDoc(collection(db, "departamentos"), {UF:c[0], Propietario:c[1], TelefonoPropietario:c[2], Inquilino:c[3], TelefonoInquilino:c[4]});
                }
                writeLog("CSV Importado");
            };
            reader.readAsText(e.target.files[0]);
        };
        document.getElementById("btn-export").onclick = () => {
            const csv = "UF,Prop,TelP,Inq,TelI\n" + departamentos.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download="UF_BASE.csv"; a.click();
        };
        document.getElementById("btn-delete-all").onclick = () => askConfirm("¿BORRAR TODA LA BASE?", "deleteAll");

        // --- CRUD UF ---
        document.getElementById("btn-add").onclick = () => { 
            editUfId = null; 
            document.querySelectorAll("#modal-form input").forEach(i => i.value = "");
            document.getElementById("modal-form").classList.remove("hidden");
        };
        window.editUF = (id) => {
            editUfId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("modal-form").classList.remove("hidden");
        };
        document.getElementById("btn-save-uf").onclick = async () => {
            const data = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            editUfId ? await updateDoc(doc(db, "departamentos", editUfId), data) : await addDoc(collection(db, "departamentos"), data);
            document.getElementById("modal-form").classList.add("hidden");
            writeLog("UF Guardada");
        };

        // --- INICIO ---
        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            if(userRole !== 'admin') document.querySelectorAll(".admin-only").forEach(el => el.classList.add("hidden"));
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        // --- SCROLL ROCKET ---
        window.onscroll = () => document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? 'flex' : 'none';
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        document.getElementById("btn-download-logs").onclick = () => {
            const blob = new Blob([document.getElementById("log-panel").innerText], {type:'text/plain'});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download="logs.txt"; a.click();
        };
    </script>
</body>
</html>
