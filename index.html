<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Gestión UF - Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0b141a; --card-bg: #111b21; --primary-color: #2563eb; 
            --danger-color: #e11d48; --text-color: #e9edef; --border-color: #222d34; 
            --warning-color: #f59e0b; --success-color: #22c55e; --ghost-color: #334155; 
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* HEADER */
        .header-fixed { position: fixed; top: 0; width: 95%; max-width: 450px; background-color: var(--card-bg); z-index: 100; padding: 15px; border-bottom: 2px solid var(--primary-color); border-radius: 0 0 15px 15px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 45px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-danger { background-color: var(--danger-color); }
        .btn-ghost { background-color: var(--ghost-color); }
        .btn-warning { background-color: var(--warning-color); color: #000; }
        
        input { width: 100%; height: 48px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border-color); padding: 0 15px; background-color: #1d2a33; color: white; outline: none; }
        .main-content { margin-top: 360px; padding-bottom: 80px; width: 100%; }

        /* TARJETAS CON COHETE */
        .uf-card { background-color: var(--card-bg); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .uf-card::before { content: '🚀'; position: absolute; left: -10px; top: -5px; opacity: 0.2; font-size: 40px; transform: rotate(-20deg); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .card-icons { display: flex; gap: 15px; font-size: 18px; }
        .card-icons i { cursor: pointer; transition: 0.2s; }
        .card-icons i:active { transform: scale(1.2); }

        /* DETALLES EXPANDIDOS */
        .detalles-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-color); font-size: 14px; line-height: 1.6; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-call { flex: 1; background: #1c2e4a; color: #5c85d6; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-weight: bold; }
        .btn-chat { flex: 1; background: #0d2d1f; color: #2e7d32; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-weight: bold; }

        /* MODALES */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <!-- PANTALLA LOGIN -->
    <div id="login-screen" class="modal-overlay">
        <div id="login-box" class="modal-content">
            <h2 style="margin-bottom:20px; color: var(--primary-color);">SISTEMA UF</h2>
            <input type="text" id="login-user" placeholder="Usuario">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button id="btn-login" class="btn btn-primary" style="width:100%">ENTRAR</button>
            <button id="btn-goto-master" class="btn btn-ghost" style="width:100%; margin-top:10px;">CREAR USUARIO</button>
        </div>

        <div id="master-box" class="modal-content hidden">
            <h3>Seguridad Requerida</h3>
            <p style="margin-bottom: 15px; font-size: 14px; opacity: 0.8;">Clave Maestra para Registro</p>
            <input type="password" id="master-key-input" placeholder="Clave Administrativa">
            <div style="display:flex; gap:10px;">
                <button id="btn-auth-master" class="btn btn-primary" style="flex:1">AUTORIZAR</button>
                <button onclick="location.reload()" class="btn btn-danger" style="flex:1">VOLVER</button>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-container" class="wrapper hidden">
        <div class="header-fixed">
            <div style="text-align: center; font-size: 10px; color: var(--success-color); margin-bottom: 10px; font-weight: bold;">● CONECTADO - BASE REMOTA</div>
            <div class="btn-grid">
                <button class="btn btn-ghost">HISTORIAL</button>
                <button class="btn btn-ghost">TEMA</button>
                <button id="btn-logout" class="btn btn-danger">CERRAR</button>
            </div>
            <div class="btn-grid">
                <button id="btn-new-uf" class="btn btn-primary">NUEVA UF</button>
                <button class="btn btn-ghost">IMPORTAR</button>
                <button class="btn btn-ghost">RESPALDO</button>
            </div>
            <input type="text" id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="btn-grid">
                <button id="btn-search" class="btn btn-primary">BUSCAR</button>
                <button id="btn-clear" class="btn btn-ghost">LIMPIAR</button>
                <button class="btn btn-warning">SIN DATOS</button>
            </div>
        </div>

        <div class="main-content" id="uf-list"></div>
    </div>

    <!-- MODAL CERRAR SESIÓN -->
    <div id="modal-cerrar" class="modal-overlay hidden">
        <div class="modal-content">
            <i class="fas fa-sign-out-alt" style="font-size: 40px; color: var(--danger-color); margin-bottom: 15px;"></i>
            <h3>¿Cerrar Sistema?</h3>
            <p style="margin-bottom:20px; opacity: 0.7;">Deberá ingresar sus credenciales nuevamente.</p>
            <div style="display:flex; gap:10px;">
                <button onclick="location.reload()" class="btn btn-danger" style="flex:1">SÍ, SALIR</button>
                <button onclick="document.getElementById('modal-cerrar').classList.add('hidden')" class="btn btn-ghost" style="flex:1">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL BORRAR (FOTO 1) -->
    <div id="modal-borrar" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Seguridad Requerida</h3>
            <p id="txt-borrar" style="margin-bottom: 15px; font-size: 14px;"></p>
            <input type="password" id="pass-borrar" placeholder="Clave Administrativa">
            <div style="display:flex; gap:10px;">
                <button id="btn-confirm-borrar" class="btn btn-primary" style="flex:1">AUTORIZAR</button>
                <button onclick="document.getElementById('modal-borrar').classList.add('hidden')" class="btn btn-danger" style="flex:1">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, getDocs, where, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const MASTER = "1131552679";
        let ufs = [], idABorrar = null;

        // LOGIN LÓGICA
        document.getElementById("btn-login").onclick = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(p === MASTER) return entrar();
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) entrar(); else alert("Acceso Denegado");
        };

        function entrar() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app-container").classList.remove("hidden");
            load();
        }

        // CARGA Y RENDER (CON BOTONES EDITAR/BORRAR/COHETE)
        function load() {
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                ufs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(ufs);
            });
        }

        function render(data) {
            const list = document.getElementById("uf-list");
            list.innerHTML = "";
            data.forEach(d => {
                const div = document.createElement("div");
                div.className = "uf-card";
                div.innerHTML = `
                    <div class="card-header">
                        <div>
                            <b style="color:var(--primary-color); font-size:16px;">UF: ${d.UF}</b><br>
                            <span style="font-size:13px; opacity:0.8;">${d.Propietario || 'Sin Datos'}</span>
                        </div>
                        <div class="card-icons">
                            <i class="fas fa-eye" style="color:var(--text-color)" onclick="toggleDetalles('${d.id}')"></i>
                            <i class="fas fa-edit" style="color:var(--primary-color)" onclick="alert('Función Editar en Proceso')"></i>
                            <i class="fas fa-trash" style="color:var(--danger-color)" onclick="prepararBorrado('${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="detalles-box hidden">
                        <p><b>Inquilino:</b> ${d.Inquilino || 'N/C'}</p>
                        <p><b>Teléfono:</b> ${d.TelefonoPropietario || 'No registrado'}</p>
                        <div class="action-btns">
                            <a href="tel:${d.TelefonoPropietario}" class="btn-call"><i class="fas fa-phone"></i> LLAMAR</a>
                            <a href="https://wa.me/${d.TelefonoPropietario}" class="btn-chat"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // FUNCIONES DE REGISTRO
        window.toggleDetalles = (id) => {
            const el = document.getElementById(`det-${id}`);
            el.classList.toggle("hidden");
        };

        window.prepararBorrado = (id, uf) => {
            idABorrar = id;
            document.getElementById("txt-borrar").innerText = `¿Borrar registro UF ${uf}?`;
            document.getElementById("modal-borrar").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-borrar").onclick = async () => {
            if(document.getElementById("pass-borrar").value === MASTER) {
                await deleteDoc(doc(db, "departamentos", idABorrar));
                document.getElementById("modal-borrar").classList.add("hidden");
                document.getElementById("pass-borrar").value = "";
            } else { alert("CLAVE INCORRECTA"); }
        };

        // BOTONES GENERALES
        document.getElementById("btn-logout").onclick = () => document.getElementById("modal-cerrar").classList.remove("hidden");
        
        document.getElementById("btn-search").onclick = () => {
            const t = document.getElementById("search-input").value.toLowerCase();
            render(ufs.filter(u => u.UF.includes(t) || (u.Propietario && u.Propietario.toLowerCase().includes(t))));
        };
        
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(ufs); };

        // ENTER EVENT
        document.getElementById("login-pass").onkeypress = (e) => { if(e.key === 'Enter') document.getElementById("btn-login").click(); };
    </script>
</body>
</html>
