<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF V11.6 - Inquilinos Focus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #f0f2f5; --card: #ffffff; --header-bg: #ffffff; --primary: #0078d4; 
            --danger: #d83b01; --text: #323130; --border: #d2d0ce; --warning: #ffb900; 
            --console-bg: #000000; --console-text: #00ff00;
        }
        .theme-dark { 
            --bg: #0d141b; --card: #1c2c3e; --header-bg: #111b21; 
            --text: #ffffff; --border: #333333; 
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 100%; max-width: 450px; padding: 15px; padding-bottom: 80px; }

        /* HEADER Y BOTONES */
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
        .btn { height: 38px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; font-size: 10px; font-weight: 600; text-transform: uppercase; background: #fff; transition: 0.2s; }
        .btn:active { background: #ebebeb; }
        .primary { background: var(--primary) !important; color: white !important; border: none; }
        .danger { background: var(--danger) !important; color: white !important; border: none; }
        .warning { background: var(--warning) !important; color: #000 !important; border: none; }

        /* CONSOLA CENTRALIZADA */
        #console-log { 
            width: 100%; height: 85px; background: var(--console-bg); color: var(--console-text); 
            font-family: 'Consolas', monospace; font-size: 11px; padding: 10px; overflow-y: auto; 
            border: 2px solid #333; margin: 10px 0; border-radius: 4px;
        }

        /* REGISTROS */
        .item { background: var(--card); padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; border-radius: 4px; position: relative; }
        .alert-inquilino { border-left: 8px solid var(--warning); border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .item-data b { font-size: 15px; color: var(--primary); display: block; }
        .item-data span { font-size: 12px; color: #666; display: block; }
        .item-actions { display: flex; gap: 18px; font-size: 18px; color: #0078d4; }

        /* COHETE 🚀 */
        #rocket { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--primary); color: white; border-radius: 50%; border: none; display: none; font-size: 20px; cursor: pointer; z-index: 999; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        /* BUSCADOR */
        .search-area { background: var(--card); padding: 10px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; }
        .search-input { width: 100%; height: 40px; padding: 8px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 2px; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 380px; padding: 20px; border-radius: 4px; border: 1px solid #999; }
        .modal-content input { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ccc; border-radius: 2px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body id="app-body">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content" style="text-align:center">
            <h2 style="color:var(--primary)">GESTIÓN UF V11.6</h2>
            <p style="font-size: 12px; margin-bottom: 15px;">Inicie sesión para continuar</p>
            <input id="l-user" type="text" placeholder="Usuario">
            <input id="l-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%; height:45px; margin-top:10px;">ACCEDER</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-app" class="wrap hidden">
        <div class="grid-btns">
            <button id="btn-tema" class="btn">TEMA</button>
            <button id="btn-export" class="btn">EXPORTAR CSV</button>
            <button id="btn-logout" class="btn danger">SALIR</button>
        </div>
        <div class="grid-btns">
            <button id="btn-open-add" class="btn primary">NUEVA UF</button>
            <button id="btn-import" class="btn admin-only">IMPORTAR</button>
            <button id="btn-users" class="btn admin-only">USUARIOS</button>
        </div>

        <!-- CONSOLA EN EL MEDIO -->
        <div id="console-log"><div>> Cargando registros del edificio...</div></div>

        <div class="search-area">
            <input id="search-input" class="search-input" placeholder="Buscar por UF o Nombre...">
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr 1.5fr;">
                <button id="btn-search-exec" class="btn primary">BUSCAR</button>
                <button id="btn-search-clear" class="btn">LIMPIAR</button>
                <button id="btn-filter-avail" class="btn warning">SIN TEL. INQ.</button>
            </div>
        </div>

        <div id="list"></div>
    </div>

    <!-- BOTON COHETE -->
    <button id="rocket" onclick="window.scrollTo({top:0, behavior:'smooth'})">🚀</button>

    <!-- MODAL UF -->
    <div id="modal-form-uf" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title" style="margin-bottom:10px; font-size: 16px;">Detalles de la Unidad</h3>
            <input id="f-uf" placeholder="Número UF (Ej: 01A)">
            <input id="f-prop" placeholder="Nombre del Propietario">
            <input id="f-telp" placeholder="Teléfono del Propietario">
            <input id="f-inq" placeholder="Nombre del Inquilino">
            <input id="f-teli" placeholder="Teléfono del Inquilino">
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr; margin-top:10px;">
                <button id="btn-save-uf" class="btn primary">GUARDAR</button>
                <button onclick="closeModals()" class="btn">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let localData = [], currentEditId = null;

        const log = (msg) => {
            const c = document.getElementById("console-log");
            c.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        };

        const login = async () => {
            const u = document.getElementById("l-user").value;
            const p = document.getElementById("l-pass").value;
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const s = await getDocs(q);
            if(!s.empty) { localStorage.setItem("uf_login", s.docs[0].data().role); location.reload(); }
            else alert("Credenciales incorrectas");
        };
        document.getElementById("btn-login").onclick = login;
        document.getElementById("l-pass").onkeypress = (e) => e.key === "Enter" && login();

        const role = localStorage.getItem("uf_login");
        if(role) {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-app").classList.remove("hidden");
            if(role === "operador") document.querySelectorAll(".admin-only").forEach(b => b.remove());

            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                localData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(localData);
            });
        }

        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                // LOGICA AMARILLA: Faltante de teléfono de INQUILINO únicamente
                const sinInquilinoTel = (!d.TelefonoInquilino || d.TelefonoInquilino.trim() === "");
                
                const div = document.createElement("div");
                div.className = `item ${sinInquilinoTel ? 'alert-inquilino' : ''}`;
                div.innerHTML = `
                    <div class="item-data">
                        <b>UF ${d.UF}</b>
                        <span>P: ${d.Propietario || 'S/D'} ${d.TelefonoPropietario ? '📞' : ''}</span>
                        <span>I: ${d.Inquilino || 'S/D'} ${d.TelefonoInquilino ? '📞' : ''}</span>
                    </div>
                    <div class="item-actions">
                        <i class="far fa-edit" onclick="window.preEdit('${d.id}')" title="Editar"></i>
                        <i class="fas fa-trash-alt" style="color:var(--danger)" onclick="window.delUF('${d.id}', '${d.UF}')" title="Borrar"></i>
                    </div>`;
                list.appendChild(div);
            });
        }

        window.preEdit = (id) => {
            currentEditId = id;
            const d = localData.find(x => x.id === id);
            document.getElementById("form-title").innerText = "Editando UF " + d.UF;
            document.getElementById("f-uf").value = d.UF;
            document.getElementById("f-prop").value = d.Propietario || "";
            document.getElementById("f-telp").value = d.TelefonoPropietario || "";
            document.getElementById("f-inq").value = d.Inquilino || "";
            document.getElementById("f-teli").value = d.TelefonoInquilino || "";
            document.getElementById("modal-form-uf").classList.remove("hidden");
        };

        window.delUF = async (id, num) => {
            if(confirm(`¿Desea borrar la UF ${num}?`)) {
                await deleteDoc(doc(db, "departamentos", id));
                log(`UF ${num} eliminada de la base.`);
            }
        };

        document.getElementById("btn-save-uf").onclick = async () => {
            const payload = { 
                UF: document.getElementById("f-uf").value, 
                Propietario: document.getElementById("f-prop").value, 
                TelefonoPropietario: document.getElementById("f-telp").value,
                Inquilino: document.getElementById("f-inq").value,
                TelefonoInquilino: document.getElementById("f-teli").value
            };
            if(currentEditId) await updateDoc(doc(db, "departamentos", currentEditId), payload);
            else await addDoc(collection(db, "departamentos"), payload);
            closeModals();
            log(`Registro UF ${payload.UF} actualizado.`);
        };

        // FILTRAR AMARILLOS (Sin teléfono de inquilino)
        document.getElementById("btn-filter-avail").onclick = () => {
            const f = localData.filter(d => !d.TelefonoInquilino || d.TelefonoInquilino.trim() === "");
            render(f);
            log("Filtro aplicado: Unidades sin teléfono de inquilino.");
        };

        const search = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(localData.filter(x => 
                x.UF.toLowerCase().includes(v) || 
                (x.Propietario && x.Propietario.toLowerCase().includes(v)) || 
                (x.Inquilino && x.Inquilino.toLowerCase().includes(v))
            ));
            log(`Búsqueda ejecutada: "${v}"`);
        };
        document.getElementById("btn-search-exec").onclick = search;
        document.getElementById("search-input").onkeypress = (e) => e.key === "Enter" && search();

        window.onscroll = () => {
            document.getElementById("rocket").style.display = window.scrollY > 250 ? "block" : "none";
        };

        document.getElementById("btn-search-clear").onclick = () => { document.getElementById("search-input").value=""; render(localData); };
        document.getElementById("btn-tema").onclick = () => document.body.classList.toggle("theme-dark");
        document.getElementById("btn-logout").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-open-add").onclick = () => { 
            currentEditId = null; 
            document.querySelectorAll("#modal-form-uf input").forEach(i => i.value = "");
            document.getElementById("modal-form-uf").classList.remove("hidden"); 
        };
        window.closeModals = () => document.querySelectorAll(".modal").forEach(m => { if(m.id !== "login-screen") m.classList.add("hidden"); });
    </script>
</body>
</html>
