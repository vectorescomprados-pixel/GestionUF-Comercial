<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V3 Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        /* Botón Casita Flotante */
        #btn-home-floating { position: fixed; top: 15px; left: 15px; width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; z-index: 10001; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; border: 2px solid white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; color: var(--text); }
        
        input, select { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; }
        .btn { height: 45px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; }

        /* Lista de Usuarios Estilo Edición */
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .user-actions { display: flex; gap: 15px; font-size: 18px; }
        .user-actions i { cursor: pointer; }

        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; }
        .content-body { margin-top: 320px; padding-bottom: 50px; }
    </style>
</head>
<body class="dark-mode">

    <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" id="btn-home-floating"><i class="fas fa-house-chimney"></i></a>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Login</h2>
            <input id="l-user" placeholder="Usuario">
            <input id="l-pass" type="password" placeholder="Contraseña">
            <button id="btn-do-login" class="btn primary">ENTRAR</button>
            <button id="btn-open-admin" class="btn ghost">GESTIÓN DE ACCESOS</button>
        </div>
    </div>

    <div id="modal-admin-users" class="modal hidden">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
            <h3 id="admin-title">Panel de Usuarios</h3>
            <div style="margin-top:15px; padding:10px; border: 1px solid var(--border); border-radius:10px;">
                <input id="adm-name" placeholder="Usuario">
                <input id="adm-pass" type="password" placeholder="Contraseña">
                <select id="adm-role"><option value="operador">Operador</option><option value="admin">Admin</option></select>
                <button id="btn-save-adm" class="btn primary">GUARDAR / ACTUALIZAR</button>
                <button id="btn-cancel-edit-adm" class="btn ghost hidden">CANCELAR EDICIÓN</button>
            </div>
            <div id="listado-usuarios" style="margin-top:20px"></div>
            <button id="btn-close-admin" class="btn danger" style="margin-top:20px">CERRAR</button>
        </div>
    </div>

    <div id="main-app" class="wrap hidden">
        <div class="main-header">
            <div style="display:flex; gap:10px; margin-bottom:15px">
                <button id="btn-logout-main" class="btn danger" style="font-size:10px">SALIR</button>
                <button id="btn-theme-main" class="btn ghost" style="font-size:10px">TEMA</button>
            </div>
            <input id="main-search" placeholder="Buscar unidad...">
            <button id="btn-add-uf" class="btn primary">NUEVA UNIDAD</button>
        </div>
        <div class="content-body"><div id="lista-uf"></div></div>
    </div>

    <div id="modal-master" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3>Seguridad Administrativa</h3>
            <input id="master-key" type="password" placeholder="Clave Maestra" style="margin-top:15px">
            <button id="btn-master-auth" class="btn primary">AUTORIZAR</button>
            <button id="btn-master-close" class="btn ghost">VOLVER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, deleteDoc, updateDoc, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const MASTER_CODE = "1131552679";
        let editUserId = null;

        // --- FUNCION LOGIN ---
        document.getElementById("btn-do-login").onclick = async () => {
            const u = document.getElementById("l-user").value.trim();
            const p = document.getElementById("l-pass").value.trim();
            if(!u || !p) return alert("Ingresa datos");

            try {
                const q = query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p));
                const snap = await getDocs(q);
                if(!snap.empty) {
                    localStorage.setItem("uf_login", "true");
                    location.reload();
                } else { alert("Usuario o clave no válidos"); }
            } catch (e) { alert("Error de conexión. Revisa tu internet."); }
        };

        // --- GESTION USUARIOS ---
        const loadUsers = async () => {
            const cont = document.getElementById("listado-usuarios");
            cont.innerHTML = "Cargando...";
            const snap = await getDocs(collection(db, "usuarios"));
            cont.innerHTML = "";
            snap.forEach(uDoc => {
                const d = uDoc.data();
                const div = document.createElement("div");
                div.className = "user-item";
                div.innerHTML = `
                    <div><b>${d.usuario}</b><br><small id="p-${uDoc.id}" style="display:none; color:var(--success)">${d.password}</small></div>
                    <div class="user-actions">
                        <i class="fas fa-eye" onclick="document.getElementById('p-${uDoc.id}').style.display='block'"></i>
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="window.prepareEditUser('${uDoc.id}','${d.usuario}','${d.password}','${d.role}')"></i>
                        <i class="fas fa-trash" style="color:var(--danger)" onclick="window.removeUser('${uDoc.id}')"></i>
                    </div>`;
                cont.appendChild(div);
            });
        };

        window.prepareEditUser = (id, n, p, r) => {
            editUserId = id;
            document.getElementById("adm-name").value = n;
            document.getElementById("adm-pass").value = p;
            document.getElementById("adm-role").value = r;
            document.getElementById("btn-cancel-edit-adm").classList.remove("hidden");
        };

        window.removeUser = async (id) => { if(confirm("¿Borrar usuario?")) { await deleteDoc(doc(db, "usuarios", id)); loadUsers(); } };

        document.getElementById("btn-save-adm").onclick = async () => {
            const n = document.getElementById("adm-name").value;
            const p = document.getElementById("adm-pass").value;
            const r = document.getElementById("adm-role").value;
            if(editUserId) {
                await updateDoc(doc(db, "usuarios", editUserId), { usuario: n, password: p, role: r });
            } else {
                await addDoc(collection(db, "usuarios"), { usuario: n, password: p, role: r });
            }
            editUserId = null;
            document.getElementById("adm-name").value = ""; document.getElementById("adm-pass").value = "";
            document.getElementById("btn-cancel-edit-adm").classList.add("hidden");
            loadUsers();
        };

        // --- NAVEGACIÓN ---
        document.getElementById("btn-open-admin").onclick = () => document.getElementById("modal-master").classList.remove("hidden");
        document.getElementById("btn-master-auth").onclick = () => {
            if(document.getElementById("master-key").value === MASTER_CODE) {
                document.getElementById("modal-master").classList.add("hidden");
                document.getElementById("modal-admin-users").classList.remove("hidden");
                loadUsers();
            } else { alert("Clave Maestra Incorrecta"); }
        };

        document.getElementById("btn-logout-main").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-close-admin").onclick = () => document.getElementById("modal-admin-users").classList.add("hidden");
        document.getElementById("btn-master-close").onclick = () => document.getElementById("modal-master").classList.add("hidden");
        document.getElementById("btn-theme-main").onclick = () => document.body.classList.toggle("dark-mode");

        // --- INICIO ---
        if(localStorage.getItem("uf_login")) {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-app").classList.remove("hidden");
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                const l = document.getElementById("lista-uf"); l.innerHTML = "";
                snap.forEach(d => { l.innerHTML += `<div style="padding:15px; background:var(--card); margin-bottom:10px; border-radius:10px; border:1px solid var(--border)"><b>UF: ${d.data().UF}</b><p>${d.data().Propietario}</p></div>`; });
            });
        }
    </script>
</body>
</html>
