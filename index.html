<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V7.0 Blindado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; padding-bottom: 100px; }

        /* CABECERA BLINDADA - No se corta */
        .main-header { 
            position: sticky; top: 0; width: 100%; 
            background: var(--card); z-index: 1000; padding: 15px; 
            border: 2px solid var(--primary); border-top: none; 
            border-radius: 0 0 20px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }
        
        /* BOTÓN RECUPERAR (COHETE) - Forzado */
        #btn-rocket { 
            position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; 
            border-radius: 50%; z-index: 99999; background: var(--primary);
            color: white; border: 2px solid #fff; display: flex !important;
            align-items: center; justify-content: center; font-size: 22px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn { height: 45px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; text-transform: uppercase; gap: 5px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #374151; } .warning { background: var(--warning); color: #000; }

        input { width: 100%; height: 48px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); padding: 0 15px; background: #1c272f; color: white; font-size: 16px; outline: none; }
        
        /* REGISTROS */
        .item { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 6px solid var(--primary); position: relative; }
        .item.empty { border-left-color: var(--warning); }
        .item b { color: var(--primary); font-size: 17px; }

        /* LOG */
        #log-panel { background: rgba(0,0,0,0.4); color: #00ff41; padding: 10px; font-family: monospace; font-size: 11px; height: 110px; overflow-y: auto; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111b21; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode">

    <!-- BOTÓN RECUPERAR SIEMPRE PRESENTE -->
    <div id="btn-rocket" onclick="window.scrollTo({top:0, behavior:'smooth'}); writeLog('Retorno al inicio');">
        <i class="fas fa-rocket"></i>
    </div>

    <!-- LOGIN CON BLINDAJE DE AUTOPREDICCIÓN -->
    <div id="login-screen" class="modal">
        <form class="modal-content" onsubmit="return false;" autocomplete="off">
            <h2 style="color:var(--primary); margin-bottom:20px;">GestiónUF Pro</h2>
            <input id="login-user" type="text" placeholder="Usuario" autocomplete="new-password">
            <input id="login-pass" type="password" placeholder="Contraseña" autocomplete="new-password">
            <button id="btn-login-exec" class="btn primary" style="width:100%">ENTRAR</button>
        </form>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div style="text-align:center; font-size:11px; color:var(--success); margin-bottom:10px; font-weight:bold;">● SISTEMA ACTIVO - NUBE SINCRONIZADA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-init" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add-new" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost">IMPORTAR</button>
                <button id="btn-export" class="btn ghost">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar UF o Apellido..." autocomplete="off">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-avail" class="btn warning">UF DISPONIBLES</button>
            </div>
            <button id="btn-wipe-init" class="btn danger" style="width:100%; background:#ff4444">BORRAR TODA LA NUBE</button>
        </div>

        <div id="log-panel" class="hidden"></div>
        <div id="list"></div>
    </div>

    <!-- MODAL FORMULARIO (NUEVA UF / EDITAR) -->
    <div id="modal-form" class="modal hidden">
        <form class="modal-content" id="uf-form" onsubmit="return false;" autocomplete="off">
            <h3 id="form-title" style="margin-bottom:15px">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad" autocomplete="off">
            <input id="f-prop" placeholder="Propietario" autocomplete="off">
            <input id="f-telp" placeholder="Teléfono Prop." autocomplete="off">
            <input id="f-inq" placeholder="Inquilino" autocomplete="off">
            <input id="f-teli" placeholder="Teléfono Inq." autocomplete="off">
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr; margin-top:10px">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-close-form" class="btn danger">CANCELAR</button>
            </div>
        </form>
    </div>

    <!-- MODAL CONFIRMACIÓN ESTILO CAPTURA -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content">
            <div id="conf-icon" style="font-size:35px; margin-bottom:15px"></div>
            <h3 id="conf-title">Finalizar Sesión</h3>
            <p id="conf-msg" style="margin:15px 0; font-size:14px; opacity:0.8"></p>
            <div id="pass-area" class="hidden">
                <input id="conf-pass" type="password" placeholder="Clave Administrativa" autocomplete="new-password">
            </div>
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr">
                <button id="btn-confirm-yes" class="btn danger">ACEPTAR</button>
                <button id="btn-confirm-no" class="btn ghost">CANCELAR</button>
            </div>
        </div>
    </div>

    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let dbData = [], editId = null, pendingAction = null;
        const MASTER = "admin";

        // LOG CENTRALIZADO
        window.writeLog = (msg) => {
            const p = document.getElementById("log-panel");
            const t = new Date().toLocaleTimeString();
            p.innerHTML += `<div>[${t}] ${msg}</div>`;
            p.scrollTop = p.scrollHeight;
        };

        // LOGIN
        document.getElementById("btn-login-exec").onclick = () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(u === "admin" && p === "admin") {
                localStorage.setItem("uf_auth_v7", "true");
                location.reload();
            } else alert("Credenciales incorrectas");
        };

        if(localStorage.getItem("uf_auth_v7") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                dbData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(dbData);
                writeLog("Base de datos sincronizada");
            });
        }

        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                const empty = !d.TelefonoPropietario && !d.TelefonoInquilino;
                const div = document.createElement("div");
                div.className = `item ${empty ? 'empty' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><div style="font-size:14px; opacity:0.8">${d.Propietario || '---'}</div></div>
                        <div style="display:flex; gap:15px; font-size:20px">
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden'); writeLog('Vista rápida UF ${d.UF}')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.preEdit('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger)" onclick="window.ask('delete','${d.id}','¿Borrar registro UF ${d.UF}?')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details hidden" style="margin-top:10px; padding-top:10px; border-top:1px dashed #444">
                        <p><strong>Prop:</strong> ${d.Propietario} | <strong>Tel:</strong> ${d.TelefonoPropietario}</p>
                        <p><strong>Inq:</strong> ${d.Inquilino} | <strong>Tel:</strong> ${d.TelefonoInquilino}</p>
                        <div class="grid-btns" style="margin-top:10px">
                            <a href="tel:${d.TelefonoPropietario}" class="btn primary"><i class="fas fa-phone"></i> LLAMAR</a>
                            <a href="https://wa.me/${d.TelefonoPropietario}" class="btn warning" style="background:#22c55e; color:white"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // EVENTO ENTER
        document.getElementById("search-input").onkeydown = (e) => { 
            if(e.key === "Enter") { 
                document.getElementById("btn-search").click(); 
                writeLog("Búsqueda por tecla Enter");
            } 
        };

        // ACCIONES
        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            const res = dbData.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v));
            render(res);
            writeLog(`Búsqueda: ${v} (${res.length} resultados)`);
        };

        document.getElementById("btn-avail").onclick = () => {
            const res = dbData.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino);
            render(res);
            writeLog(`Filtrado: UF Disponibles (${res.length})`);
        };

        // NUEVA UF - LIMPIEZA TOTAL AL ABRIR
        document.getElementById("btn-add-new").onclick = () => {
            editId = null;
            document.getElementById("uf-form").reset(); // BLINDAJE: Limpia el formulario
            document.getElementById("form-title").innerText = "Nueva Unidad";
            document.getElementById("modal-form").classList.remove("hidden");
            writeLog("Abriendo Formulario Nueva UF (Vacío)");
        };

        window.preEdit = (id) => {
            editId = id; const d = dbData.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF;
            document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario;
            document.getElementById("f-inq").value = d.Inquilino;
            document.getElementById("f-teli").value = d.TelefonoInquilino;
            document.getElementById("form-title").innerText = "Editar Unidad";
            document.getElementById("modal-form").classList.remove("hidden");
            writeLog(`Editando UF: ${d.UF}`);
        };

        document.getElementById("btn-save").onclick = async () => {
            const data = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            if(editId) await updateDoc(doc(db, "departamentos", editId), data);
            else await addDoc(collection(db, "departamentos"), data);
            document.getElementById("modal-form").classList.add("hidden");
            writeLog(`Guardado exitoso: UF ${data.UF}`);
        };

        // SEGURIDAD Y MODAL CERRAR
        window.ask = (type, id, msg) => {
            pendingAction = { type, id };
            document.getElementById("conf-title").innerText = type === 'logout' ? "Finalizar Sesión" : "Seguridad Requerida";
            document.getElementById("conf-msg").innerText = msg;
            document.getElementById("conf-icon").innerHTML = type === 'logout' ? '<i class="fas fa-sign-out-alt" style="color:var(--danger)"></i>' : '<i class="fas fa-shield-alt" style="color:var(--primary)"></i>';
            document.getElementById("pass-area").className = (type === 'logout' || type === 'export') ? "hidden" : "";
            document.getElementById("conf-pass").value = "";
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(!document.getElementById("pass-area").classList.contains("hidden") && document.getElementById("conf-pass").value !== MASTER) return alert("Clave Incorrecta");
            
            if(pendingAction.type === 'logout') { localStorage.removeItem("uf_auth_v7"); location.reload(); }
            if(pendingAction.type === 'delete') await deleteDoc(doc(db, "departamentos", pendingAction.id));
            if(pendingAction.type === 'wipe') {
                const b = writeBatch(db); (await getDocs(collection(db, "departamentos"))).forEach(d => b.delete(d.ref)); await b.commit();
                writeLog("BORRADO TOTAL DE NUBE EJECUTADO");
            }
            if(pendingAction.type === 'export') {
                const csv = "UF,Prop,TelP,Inq,TelI\n" + dbData.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
                const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); link.download = "Respaldo_UF.csv"; link.click();
            }
            document.getElementById("modal-confirm").classList.add("hidden");
        };

        // BOTONES INTERFAZ
        document.getElementById("btn-logout-init").onclick = () => window.ask('logout', null, '¿Desea cerrar el sistema de gestión de forma segura?');
        document.getElementById("btn-wipe-init").onclick = () => window.ask('wipe', null, '¡ADVERTENCIA! Esta acción borrará todos los datos.');
        document.getElementById("btn-import").onclick = () => document.getElementById("csv-file").click();
        document.getElementById("btn-export").onclick = () => window.ask('export', null, '¿Descargar respaldo en CSV?');
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("light-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-panel").classList.toggle("hidden");
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(dbData); };
        document.getElementById("btn-close-form").onclick = () => document.getElementById("modal-form").classList.add("hidden");
        document.getElementById("btn-confirm-no").onclick = () => document.getElementById("modal-confirm").classList.add("hidden");

        // IMPORTAR CSV
        document.getElementById("csv-file").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const rows = ev.target.result.split("\n").slice(1);
                const batch = writeBatch(db);
                rows.forEach(r => {
                    const [uf, p, tp, inq, ti] = r.split(",");
                    if(uf) batch.set(doc(collection(db, "departamentos")), { UF:uf.trim(), Propietario:p, TelefonoPropietario:tp, Inquilino:inq, TelefonoInquilino:ti });
                });
                await batch.commit(); writeLog(`Importados ${rows.length} registros`);
            };
            reader.readAsText(e.target.files[0]);
        };
    </script>
</body>
</html>
