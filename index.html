<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>GestiónUF Pro - V4.8 Ultra Blindado</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --bg:#0b141a; --card:#111b21; --primary:#2563eb; --danger:#e11d48; --text:#e9edef; --border:#222d34; --warning:#f59e0b; --success:#22c55e; --ghost:#374151;}
body.light-mode { --bg:#f0f2f5; --card:#ffffff; --text:#1f293b; --border:#e5e7eb;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
*{box-sizing:border-box;font-family:'Segoe UI';}

.wrap{width:95%;max-width:450px;margin:auto;}
.hidden{display:none!important;}

.main-header{position:fixed;top:0;width:95%;max-width:450px;background:var(--card);padding:15px;border-bottom:3px solid var(--primary);border-radius:0 0 20px 20px;}
.content-body{margin-top:420px;}

.grid-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.btn{height:45px;border:none;border-radius:10px;font-weight:bold;color:white;cursor:pointer;}
.primary{background:var(--primary);}
.danger{background:var(--danger);}
.ghost{background:var(--ghost);}
.warning{background:var(--warning);color:#000;}

/* LOGS */
#log-container{position:relative;margin-bottom:20px;}
#log-panel{background:#000;padding:12px;font-size:10px;height:120px;overflow-y:auto;border-radius:8px;font-family:monospace;}
.log-success{color:#00ff41;}
.log-warn{color:#fbff00;}
.log-err{color:#ff3131;}
.log-info{color:#00d4ff;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;}
.modal-content{background:var(--card);padding:25px;border-radius:20px;width:90%;max-width:380px;text-align:center;}

input{width:100%;height:45px;margin-bottom:12px;border-radius:10px;border:1px solid var(--border);padding:0 12px;background:#1a242b;color:#fff;}

.item{background:var(--card);padding:15px;margin-bottom:10px;border-radius:10px;}
</style>
</head>

<body>

<div id="login-screen" class="modal">
<div class="modal-content">
<h2>GestiónUF Pro</h2>
<input id="login-user" placeholder="Usuario">
<input id="login-pass" type="password" placeholder="Contraseña">
<button id="btn-login" class="btn primary">INICIAR SESIÓN</button>
</div>
</div>

<div id="main-screen" class="wrap hidden">
<div class="main-header">
<div class="grid-btns">
<button id="btn-log-toggle" class="btn ghost">LOGS</button>
<button id="btn-theme" class="btn ghost">TEMA</button>
<button id="btn-logout" class="btn danger">SALIR</button>
</div>

<input id="search-input" placeholder="Buscar">

<div class="grid-btns">
<button id="btn-search" class="btn primary">BUSCAR</button>
<button id="btn-clear" class="btn ghost">LIMPIAR</button>
</div>
</div>

<div class="content-body">
<div id="log-container" class="hidden">
<div id="log-panel"></div>
</div>
<div id="list"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "gestionuf-remoto.firebaseapp.com",
projectId: "gestionuf-remoto",
appId: "1:724452752860:web:4d25585addcdcbd146e319"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let departamentos = [];

/* 🔥 LOG PROFESIONAL (EXTRAÍDO E INTEGRADO) */
const writeLog = (msg, type='success')=>{
const lp=document.getElementById("log-panel");
if(lp){
lp.innerHTML+=`<div class="log-${type}">» [${new Date().toLocaleTimeString()}] ${msg}</div>`;
lp.scrollTop=lp.scrollHeight;
}
};

/* LOGIN (NO TOCADO) */
document.getElementById("btn-login").onclick = async () => {
const u = document.getElementById("login-user").value;
const p = document.getElementById("login-pass").value;

const q = query(collection(db,"usuarios"),
where("usuario","==",u),
where("password","==",p));

const snap = await getDocs(q);

if(!snap.empty){
localStorage.setItem("uf_auth","true");
location.reload();
}else{
alert("Error login");
writeLog("Login fallido: "+u,"err");
}
};

/* INIT */
if(localStorage.getItem("uf_auth")==="true"){
document.getElementById("login-screen").classList.add("hidden");
document.getElementById("main-screen").classList.remove("hidden");

onSnapshot(query(collection(db,"departamentos"),orderBy("UF","asc")),snap=>{
departamentos=snap.docs.map(d=>({id:d.id,...d.data()}));
render(departamentos);
writeLog("Datos sincronizados","info");
});
}

/* RENDER */
function render(data){
const list=document.getElementById("list");
list.innerHTML="";
data.forEach(d=>{
const div=document.createElement("div");
div.className="item";
div.innerHTML=`<b>${d.UF}</b><p>${d.Propietario||''}</p>`;
list.appendChild(div);
});
}

/* BUSCAR */
document.getElementById("btn-search").onclick=()=>{
const v=document.getElementById("search-input").value.toLowerCase();
const res=departamentos.filter(d=>d.UF.toLowerCase().includes(v));
render(res);
writeLog(`Búsqueda: ${v} (${res.length})`,"info");
};

document.getElementById("btn-clear").onclick=()=>{
render(departamentos);
writeLog("Lista restaurada","info");
};

/* UI */
document.getElementById("btn-theme").onclick=()=>{
document.body.classList.toggle("light-mode");
writeLog("Cambio de tema","info");
};

document.getElementById("btn-log-toggle").onclick=()=>{
document.getElementById("log-container").classList.toggle("hidden");
};

document.getElementById("btn-logout").onclick=()=>{
localStorage.clear();
location.reload();
};
</script>

</body>
</html>
