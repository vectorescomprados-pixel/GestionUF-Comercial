<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise V3.3 FINAL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 100px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; }
        
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        input, select { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); }
        
        #log-panel { background: #000; padding: 10px; font-size: 10px; height: 100px; overflow-y: auto; border-radius: 8px; font-family: monospace; color: #00ff41; margin-bottom: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }

        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body class="dark-mode">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
            <button id="btn-create-user-trigger" class="btn ghost" style="width:100%; margin-top:10px">CREAR USUARIOS</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● SEGURIDAD NIVEL 3.3 ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">LOGS</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">UF DISPONIBLE</button>
            </div>
        </div>
        <div class="content-body">
            <div id="log-container" class="hidden"><div id="log-panel"></div></div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL GESTIÓN DE USUARIOS -->
    <div id="modal-manage-users" class="modal hidden">
        <div class="modal-content">
            <h3 style="text-align:center">Panel de Usuarios</h3>
            <div id="user-list-container" style="margin:15px 0; border:1px solid var(--border); border-radius:10px; max-height:180px; overflow-y:auto;"></div>
            <hr style="margin:15px 0; opacity:0.3">
            <h4 id="user-form-title" style="font-size:12px; margin-bottom:10px">NUEVO / EDITAR</h4>
            <input id="new-username" placeholder="Usuario">
            <input id="new-password" type="password" placeholder="Contraseña">
            <select id="new-role">
                <option value="operador">Operador</option>
                <option value="admin">Administrador</option>
            </select>
            <div class="grid-btns-2">
                <button id="btn-save-user" class="btn primary">CONFIRMAR</button>
                <button id="btn-close-users" class="btn danger">CERRAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMACIÓN MAESTRA -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3 id="confirm-msg">Seguridad Requerida</h3>
            <p style="margin:10px 0; font-size:13px; opacity:0.7">Ingrese Clave Maestra para autorizar</p>
            <input id="confirm-pass" type="password" placeholder="Código de Autorización">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL FORMULARIO UF -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 style="text-align:center">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], usuariosList = [], editUfId = null, editUserId = null, pendingAction = null;
        const MASTER_CODE = "1131552679";
        const userRole = localStorage.getItem("uf_user_role") || "operador";

        const writeLog = (msg) => {
            const lp = document.getElementById("log-panel");
            if(lp) { lp.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`; lp.scrollTop = lp.scrollHeight; }
        };

        // --- GESTIÓN DE USUARIOS (LOGICA) ---
        const loadUsers = async () => {
            const snap = await getDocs(collection(db, "usuarios"));
            usuariosList = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const container = document.getElementById("user-list-container");
            container.innerHTML = "";
            usuariosList.forEach(u => {
                const row = document.createElement("div");
                row.className = "user-row";
                row.innerHTML = `
                    <div style="font-size:12px"><b>${u.usuario}</b><br><small>${u.role}</small></div>
                    <div style="display:flex; gap:15px">
                        <i class="fas fa-edit" style="color:var(--primary); cursor:pointer" onclick="window.prepareEditUser('${u.id}')"></i>
                        ${u.usuario !== 'admin' ? `<i class="fas fa-trash" style="color:var(--danger); cursor:pointer" onclick="window.askConfirm('¿Eliminar acceso a ${u.usuario}?', 'deleteUser', '${u.id}')"></i>` : ''}
                    </div>`;
                container.appendChild(row);
            });
        };

        window.prepareEditUser = (id) => {
            const u = usuariosList.find(x => x.id === id);
            editUserId = id;
            document.getElementById("new-username").value = u.usuario;
            document.getElementById("new-password").value = u.password;
            document.getElementById("new-role").value = u.role;
            document.getElementById("user-form-title").innerText = "EDITANDO: " + u.usuario;
            writeLog("Editando usuario: " + u.usuario);
        };

        // --- SISTEMA DE CONFIRMACIÓN ---
        window.askConfirm = (msg, type, id = null) => {
            pendingAction = { type, id };
            document.getElementById("confirm-msg").innerText = msg;
            document.getElementById("confirm-pass").value = "";
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value !== MASTER_CODE) return alert("Código Maestro Inválido");
            const action = pendingAction;
            document.getElementById("modal-confirm").classList.add("hidden");

            if(action.type === 'deleteUser') {
                await deleteDoc(doc(db, "usuarios", action.id));
                writeLog("Usuario eliminado correctamente");
                loadUsers();
            } else if(action.type === 'saveUser') {
                const uData = {
                    usuario: document.getElementById("new-username").value,
                    password: document.getElementById("new-password").value,
                    role: document.getElementById("new-role").value
                };
                if(editUserId) {
                    await updateDoc(doc(db, "usuarios", editUserId), uData);
                    writeLog("Usuario actualizado: " + uData.usuario);
                } else {
                    await addDoc(collection(db, "usuarios"), uData);
                    writeLog("Usuario creado: " + uData.usuario);
                }
                editUserId = null;
                document.getElementById("user-form-title").innerText = "NUEVO / EDITAR";
                document.querySelectorAll("#modal-manage-users input").forEach(i => i.value = "");
                loadUsers();
            } else if(action.type === 'openManage') {
                document.getElementById("modal-manage-users").classList.remove("hidden");
                loadUsers();
            }
        };

        // --- LOGIN & INICIO ---
        document.getElementById("btn-login").onclick = async () => {
            const u = document.getElementById("login-user").value, p = document.getElementById("login-pass").value;
            const snap = await getDocs(query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p)));
            if (!snap.empty) {
                const data = snap.docs[0].data();
                localStorage.setItem("uf_auth", "true");
                localStorage.setItem("uf_user_role", data.role);
                location.reload();
            } else alert("Datos incorrectos");
        };

        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            if(userRole !== 'admin') document.querySelectorAll(".admin-only").forEach(el => el.remove());
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        // --- RENDER UNIDADES ---
        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || '---'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        window.editUF = (id) => {
            editUfId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario;
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const d = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value };
            if(editUfId) await updateDoc(doc(db, "departamentos", editUfId), d);
            else await addDoc(collection(db, "departamentos"), d);
            document.getElementById("modal-form").classList.add("hidden");
            writeLog(`UF ${d.UF} Guardada`);
        };

        // --- TRIGGERS ---
        document.getElementById("btn-save-user").onclick = () => askConfirm("¿Guardar cambios en usuarios?", "saveUser");
        document.getElementById("btn-create-user-trigger").onclick = () => askConfirm("Gestión de Usuarios", "openManage");
        document.getElementById("btn-close-users").onclick = () => { editUserId = null; document.getElementById("modal-manage-users").classList.add("hidden"); };
        document.getElementById("btn-logout-trigger").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
        document.getElementById("btn-confirm-no").onclick = () => document.getElementById("modal-confirm").classList.add("hidden");
        document.getElementById("btn-cancel").onclick = () => document.getElementById("modal-form").classList.add("hidden");
        document.getElementById("btn-add").onclick = () => { editUfId = null; document.querySelectorAll("#modal-form input").forEach(i => i.value = ""); document.getElementById("modal-form").classList.remove("hidden"); };
    </script>
</body>
</html>
