<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V5.8 Blindaje Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --ghost: #3b4a54; --warning: #f59e0b; --success: #22c55e; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; --ghost: #d1d5db; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* CABECERA */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 20px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .content-body { margin-top: 495px; width: 100%; padding-bottom: 80px; }

        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 44px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; text-transform: uppercase; text-decoration: none; }
        .primary { background: #1d4ed8; } .danger { background: #e11d48; } .ghost { background: var(--ghost); color: var(--text); } .warning { background: #f59e0b; color: #000; } .success { background: #16a34a; }

        input { width: 100%; height: 46px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: #1c272f; color: white; font-size: 15px; }

        /* REGISTROS */
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 6px solid #111b21; }
        .item.no-data { border-left-color: var(--warning); }
        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .item b { color: #2563eb; font-size: 16px; }
        .item small { display: block; color: #888; font-size: 14px; margin-top: 4px; }
        .actions-icons { display: flex; gap: 18px; font-size: 18px; }
        .fa-eye, .fa-edit, .fa-trash { cursor: pointer; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1c272f; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .logout-icon { font-size: 45px; color: #e11d48; margin-bottom: 15px; }

        /* LOG */
        #log-container { background: #000; border-radius: 10px; margin-top: 10px; border: 1px solid #333; height: 110px; position: relative; overflow: hidden; }
        #log-panel { padding: 10px; font-size: 10px; height: 100%; overflow-y: auto; font-family: monospace; color: #0f0; text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--primary); margin-bottom:20px;">GestiónUF Acceso</h2>
            <input id="login-user" type="text" placeholder="Usuario (admin)">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login-exec" class="btn primary" style="width:100%">ENTRAR</button>
            <button id="btn-recover-open" class="btn ghost" style="width:100%; margin-top:10px; font-size:9px;">SOPORTE TÉCNICO</button>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div style="text-align:center; font-size:10px; color:#22c55e; margin-bottom:10px; font-weight:bold;">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button onclick="document.body.classList.toggle('light-mode')" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-new-uf" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost">IMPORTAR</button>
                <button id="btn-export-secure" class="btn ghost">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search-exec" class="btn primary">BUSCAR</button>
                <button id="btn-clear-exec" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-disp" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-wipe-secure" class="btn danger" style="width:100%; margin-bottom:10px;">BORRAR TODA LA NUBE</button>
            <div id="log-container" class="hidden">
                <button id="btn-download-log-secure" style="position:absolute; top:5px; right:5px; font-size:9px; background:#333; color:#fff; border:1px solid #444; padding:3px 6px; border-radius:4px; cursor:pointer;">BAJAR LOG</button>
                <div id="log-panel"></div>
            </div>
        </div>
        <div class="content-body" id="list"></div>
    </div>

    <div id="modal-logout" class="modal hidden">
        <div class="modal-content">
            <div class="logout-icon"><i class="fas fa-sign-out-alt"></i></div>
            <h3 style="color: white; margin-bottom: 10px;">Finalizar Sesión</h3>
            <p style="color: #888; font-size: 14px; margin-bottom: 25px;">¿Desea cerrar el sistema de gestión de forma segura?</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button id="btn-logout-confirm" class="btn danger">SALIR</button>
                <button onclick="closeModals()" class="btn ghost">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modal-auth" class="modal hidden">
        <div class="modal-content">
            <h3 style="color: white; margin-bottom: 10px;">Seguridad Requerida</h3>
            <p id="auth-desc" style="color: #888; font-size: 13px; margin-bottom: 15px;"></p>
            <input id="auth-pass" type="password" placeholder="Clave Administrativa">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="auth-confirm-btn" class="btn primary">AUTORIZAR</button>
                <button onclick="closeModals()" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title" style="color:white; margin-bottom:15px;">Datos de Unidad</h3>
            <input id="f-uf" placeholder="UF">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Teléfono Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Teléfono Inquilino">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btn-save-data" class="btn primary">GUARDAR</button>
                <button onclick="closeModals()" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <input type="file" id="csv-file-hidden" class="hidden" accept=".csv">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], editId = null, pTask = null;
        const MASTER = "1131552679";

        const logMsg = (m) => {
            const lp = document.getElementById("log-panel");
            lp.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${m}</div>`;
            lp.scrollTop = lp.scrollHeight;
        };

        // --- GESTIÓN DE ACCESO ---
        const login = () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(u === "admin" && p === "admin") {
                localStorage.setItem("uf_auth", "true");
                location.reload();
            } else { alert("Usuario o Clave Incorrectos"); }
        };
        document.getElementById("btn-login-exec").onclick = login;
        document.getElementById("login-pass").onkeypress = (e) => e.key === "Enter" && login();

        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const sinD = !d.TelefonoPropietario && !d.TelefonoInquilino;
                const div = document.createElement("div");
                div.className = `item ${sinD ? 'no-data' : ''}`;
                div.innerHTML = `
                    <div class="item-top">
                        <div><b>UF: ${d.UF}</b></div>
                        <div class="actions-icons">
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash" onclick="window.askSecurity('del', '${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>
                    <small>${d.Propietario || '---'}</small>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px dashed #444; padding-top:10px; font-size:13px;">
                        <p>Prop: ${d.Propietario} | ${d.TelefonoPropietario}</p>
                        <p>Inq: ${d.Inquilino} | ${d.TelefonoInquilino}</p>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                            <a href="tel:${d.TelefonoPropietario}" class="btn primary">LLAMAR</a>
                            <a href="https://wa.me/${(d.TelefonoPropietario||'').replace(/\D/g,'')}" class="btn success">CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- EVENTO ENTER BÚSQUEDA ---
        const buscar = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            const res = departamentos.filter(d => d.UF.includes(v) || (d.Propietario||"").toLowerCase().includes(v));
            render(res);
            logMsg(res.length > 0 ? `Éxito: ${res.length} hallados` : `No hay resultados para "${v}"`);
        };
        document.getElementById("btn-search-exec").onclick = buscar;
        document.getElementById("search-input").onkeypress = (e) => e.key === "Enter" && buscar();

        // --- SEGURIDAD ---
        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.id!=="login-screen" && m.classList.add('hidden')); editId = null; };
        
        window.askSecurity = (task, id, uf) => {
            pTask = { task, id, uf };
            document.getElementById("auth-desc").innerText = task==='del'?`¿Borrar UF ${uf}?`:task==='exp'?"¿Descargar Respaldo de Nube?":task==='wipe'?"¿BORRAR TODA LA NUBE?":"¿Bajar Log?";
            document.getElementById("auth-pass").value = "";
            document.getElementById("modal-auth").classList.remove("hidden");
            setTimeout(()=> document.getElementById("auth-pass").focus(), 200);
        };

        document.getElementById("auth-confirm-btn").onclick = async () => {
            if(document.getElementById("auth-pass").value !== MASTER) return alert("Clave Incorrecta");
            if(pTask.task === 'del') { await deleteDoc(doc(db, "departamentos", pTask.id)); logMsg(`Eliminada UF ${pTask.uf}`); }
            if(pTask.task === 'exp') {
                const csv = "UF,Prop,TelP,Inq,TelI\n" + departamentos.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
                const l = document.createElement("a"); l.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); l.download="Backup.csv"; l.click();
                logMsg("Respaldo descargado");
            }
            if(pTask.task === 'wipe') {
                const s = await getDocs(collection(db, "departamentos"));
                const b = writeBatch(db); s.forEach(d => b.delete(d.ref)); await b.commit();
                logMsg("!!! NUBE VACIADA !!!");
            }
            if(pTask.task === 'log') {
                const b = new Blob([document.getElementById("log-panel").innerText], {type:'text/plain'});
                const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download="Log.txt"; a.click();
            }
            closeModals();
        };

        // --- CABECERA ---
        document.getElementById("btn-export-secure").onclick = () => window.askSecurity('exp');
        document.getElementById("btn-wipe-secure").onclick = () => window.askSecurity('wipe');
        document.getElementById("btn-download-log-secure").onclick = () => window.askSecurity('log');
        document.getElementById("btn-logout-trigger").onclick = () => document.getElementById("modal-logout").classList.remove("hidden");
        document.getElementById("btn-logout-confirm").onclick = () => { localStorage.removeItem("uf_auth"); location.reload(); };
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-clear-exec").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-filter-disp").onclick = () => render(departamentos.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino));

        // --- GESTIÓN DATOS ---
        document.getElementById("btn-new-uf").onclick = () => { editId = null; document.getElementById("modal-form").classList.remove("hidden"); };
        window.editUF = (id) => {
            editId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario; document.getElementById("f-inq").value = d.Inquilino;
            document.getElementById("f-teli").value = d.TelefonoInquilino;
            document.getElementById("modal-form").classList.remove("hidden");
        };
        document.getElementById("btn-save-data").onclick = async () => {
            const d = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            if(editId) await updateDoc(doc(db, "departamentos", editId), d);
            else await addDoc(collection(db, "departamentos"), d);
            logMsg(`UF ${d.UF} Guardada`);
            closeModals();
        };

        // --- IMPORTAR ---
        document.getElementById("btn-import").onclick = () => document.getElementById("csv-file-hidden").click();
        document.getElementById("csv-file-hidden").onchange = (e) => {
            const r = new FileReader();
            r.onload = async (ev) => {
                const b = writeBatch(db);
                ev.target.result.split("\n").slice(1).forEach(l => {
                    const c = l.split(",");
                    if(c) b.set(doc(collection(db, "departamentos")), {UF:c.trim(), Propietario:c, TelefonoPropietario:c, Inquilino:c, TelefonoInquilino:c});
                });
                await b.commit(); logMsg("Importación completada");
            };
            r.readAsText(e.target.files);
        };

    </script>
</body>
</html>
