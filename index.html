<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V2.2 Gold</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 100px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; }
        
        /* BOTÓN COHETE (SCROLL) */
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; border: 2px solid white; display: none; }

        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        .item b { font-size: 16px; color: var(--primary); display: block; }
        
        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; outline: none; }

        /* LOG PROFESIONAL */
        #log-container { position: relative; margin-bottom: 15px; }
        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 120px; overflow-y: auto; border-radius: 8px; font-family: 'Courier New', monospace; border: 1px solid #333; line-height: 1.4; color: #aaa; }
        #btn-download-log { position: absolute; top: 5px; right: 5px; width: 30px; height: 30px; font-size: 10px; opacity: 0.6; }
        .log-success { color: #00ff41; } .log-warn { color: #fbff00; } .log-err { color: #ff3131; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body class="dark-mode">

    <!-- COHETE PARA VOLVER ARRIBA -->
    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>
    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <!-- PANTALLA ACCESO -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">ENTRAR</button>
            <button id="btn-recover-open" class="btn ghost" style="width:100%; margin-top:10px">SOPORTE TÉCNICO</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● UF DISPONIBLES - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost">IMPORTAR</button>
                <button id="btn-export" class="btn ghost">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-delete-all" class="btn danger" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden">
                <button id="btn-download-log" class="btn ghost" title="Descargar"><i class="fas fa-download"></i></button>
                <div id="log-panel"></div>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL CERRAR SESIÓN -->
    <div id="modal-logout" class="modal hidden">
        <div class="modal-content">
            <i class="fas fa-sign-out-alt" style="font-size:40px; color:var(--danger); margin-bottom:15px"></i>
            <h3>¿Cerrar Sistema?</h3>
            <p style="margin:10px 0; font-size:14px; opacity:0.8">Deberá ingresar credenciales nuevamente.</p>
            <div class="grid-btns-2">
                <button id="btn-logout-confirm" class="btn danger">SALIR</button>
                <button id="btn-logout-cancel" class="btn ghost">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMACIÓN PROTEGIDA -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content">
            <h3>Seguridad Requerida</h3>
            <p id="confirm-msg" style="margin:10px 0; font-size:13px"></p>
            <input id="confirm-pass" type="password" placeholder="Clave Administrativa">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <!-- MODAL FORMULARIO -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 001)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Teléfono Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Teléfono Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        const MASTER = "1131552679";
        let ufs = [], editId = null, pending = null;

        // --- LOGS ---
        const writeLog = (msg, type = 'success') => {
            const lp = document.getElementById("log-panel");
            const cls = { success: 'log-success', warn: 'log-warn', err: 'log-err' };
            lp.innerHTML += `<div class="${cls[type]}">» [${new Date().toLocaleTimeString()}] ${msg}</div>`;
            lp.scrollTop = lp.scrollHeight;
        };

        document.getElementById("btn-download-log").onclick = () => {
            const blob = new Blob([document.getElementById("log-panel").innerText], {type: 'text/plain'});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `Log_${new Date().getTime()}.txt`; a.click();
        };

        // --- ACCESO ---
        const login = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(p === MASTER) return start();
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) start(); else alert("Error de acceso");
        };

        function start() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            writeLog("Sistema Iniciado", "success");
            load();
        }

        document.getElementById("btn-login").onclick = login;
        document.getElementById("login-pass").onkeyup = (e) => e.key === "Enter" && login();

        // SOPORTE (RESET LOCAL)
        document.getElementById("btn-recover-open").onclick = () => {
            const c = prompt("Ingrese código maestro de soporte:");
            if(c === MASTER) { alert("Soporte Activo: Acceso Temporal Concedido"); start(); }
        };

        // --- MOTOR DE DATOS ---
        function load() {
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                ufs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(ufs);
                writeLog("Sincronización Cloud OK", "success");
            });
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'Sin Datos'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger)" onclick="window.askConfirm('Borrar UF ${d.UF}?', 'delete', '${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; font-size:13px; border-top:1px dashed #444; padding-top:10px">
                        <p>Inq: ${d.Inquilino || '---'}</p>
                        <p>Tel: ${d.TelefonoPropietario || d.TelefonoInquilino || 'N/C'}</p>
                        <div class="grid-btns-2">
                            <a href="tel:${d.TelefonoPropietario}" class="btn primary"><i class="fas fa-phone"></i> LLAMAR</a>
                            <a href="https://wa.me/${(d.TelefonoPropietario||'').replace(/\D/g,'')}" class="btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- ACCIONES ---
        window.askConfirm = (msg, type, id = null) => {
            pending = { type, id };
            document.getElementById("confirm-msg").innerText = msg;
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value !== MASTER) return alert("Error");
            if(pending.type === 'delete') await deleteDoc(doc(db, "departamentos", pending.id));
            if(pending.type === 'deleteAll') {
                const b = writeBatch(db); ufs.forEach(u => b.delete(doc(db, "departamentos", u.id))); await b.commit();
                writeLog("NUBE VACIADA", "err");
            }
            if(pending.type === 'export') {
                const csv = "UF,Prop,TelP\n" + ufs.map(u => `${u.UF},${u.Propietario},${u.TelefonoPropietario}`).join("\n");
                const blob = new Blob([csv], {type: 'text/csv'});
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Respaldo.csv"; a.click();
            }
            document.getElementById("modal-confirm").classList.add("hidden");
            document.getElementById("confirm-pass").value = "";
        };

        // BÚSQUEDA
        const search = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(ufs.filter(u => u.UF.includes(v) || (u.Propietario||'').toLowerCase().includes(v)));
            writeLog(`Búsqueda: ${v}`, "warn");
        };
        document.getElementById("btn-search").onclick = search;
        document.getElementById("search-input").onkeyup = (e) => e.key === "Enter" && search();

        document.getElementById("btn-clear").onclick = () => { 
            document.getElementById("search-input").value = ""; render(ufs); 
            writeLog("Vista Limpia", "success");
        };

        document.getElementById("btn-filter-empty").onclick = () => {
            render(ufs.filter(u => !u.TelefonoPropietario && !u.TelefonoInquilino));
            writeLog("Filtrado: Sin datos", "warn");
        };

        // ALTAS Y EDICIÓN
        document.getElementById("btn-add").onclick = () => { editId = null; document.getElementById("modal-form").classList.remove("hidden"); };
        window.editUF = (id) => {
            editId = id; const d = ufs.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const d = { 
                UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value,
                TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value,
                TelefonoInquilino: document.getElementById("f-teli").value
            };
            if(editId) await updateDoc(doc(db, "departamentos", editId), d);
            else await addDoc(collection(db, "departamentos"), d);
            writeLog(`Guardado UF ${d.UF}`, "success");
            document.getElementById("modal-form").classList.add("hidden");
        };

        // IMPORTACIÓN
        document.getElementById("btn-import").onclick = () => document.getElementById("csv-file").click();
        document.getElementById("csv-file").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const batch = writeBatch(db);
                ev.target.result.split("\n").slice(1).forEach(l => {
                    const [u,p,tp] = l.split(',');
                    if(u) batch.set(doc(collection(db, "departamentos")), {UF:u.trim(), Propietario:p, TelefonoPropietario:tp});
                });
                await batch.commit();
                writeLog("Importación Finalizada", "success");
            };
            reader.readAsText(e.target.files[0]);
        };

        // INTERFAZ
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        window.onscroll = () => document.getElementById("btn-rocket").style.display = window.scrollY > 400 ? "flex" : "none";
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-logout-trigger").onclick = () => document.getElementById("modal-logout").classList.remove("hidden");
        document.getElementById("btn-logout-confirm").onclick = () => location.reload();
        
        // CIERRE MODALES
        document.querySelectorAll("#btn-logout-cancel, #btn-confirm-no, #btn-cancel").forEach(b => b.onclick = () => {
            document.querySelectorAll(".modal").forEach(m => m.id !== "login-screen" && m.classList.add("hidden"));
        });
        document.getElementById("btn-export").onclick = () => window.askConfirm("¿Descargar Respaldo?", "export");
        document.getElementById("btn-delete-all").onclick = () => window.askConfirm("¡BORRADO TOTAL!", "deleteAll");

    </script>
</body>
</html>
