<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Final Gold V2.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        /* HEADER */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 100px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; text-transform: uppercase; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; }
        
        /* ELEMENTOS */
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; border: 2px solid white; display: none; }
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; position: relative; overflow: hidden; }
        .item::after { content: '🚀'; position: absolute; right: -5px; bottom: -5px; opacity: 0.1; font-size: 30px; transform: rotate(-20deg); }
        .item.no-phone { border-left: 8px solid var(--warning) !important; }
        .item b { font-size: 16px; color: var(--primary); display: block; margin-bottom: 5px; }
        
        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }

        /* LOG PANEL */
        #log-container { position: relative; margin-bottom: 15px; }
        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 120px; overflow-y: auto; border-radius: 8px; font-family: 'Courier New', monospace; border: 1px solid #333; line-height: 1.4; text-align: left; }
        .log-success { color: #00ff41; } .log-warn { color: #fbff00; } .log-err { color: #ff3131; } .log-info { color: #00d4ff; }
    </style>
</head>
<body class="dark-mode">

    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>

    <!-- SISTEMA DE ACCESO UNIFICADO -->
    <div id="login-screen" class="modal">
        <!-- 1. LOGIN -->
        <div id="box-login" class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">ENTRAR</button>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <button id="btn-pre-reg" class="btn ghost">REGISTRAR</button>
                <button id="btn-recover-open" class="btn ghost">SOPORTE</button>
            </div>
        </div>

        <!-- 2. SEGURIDAD REQUERIDA (FOTO 1) -->
        <div id="box-master" class="modal-content hidden">
            <i class="fas fa-shield-alt" style="font-size:30px; color:var(--primary); margin-bottom:10px;"></i>
            <h3>Seguridad Requerida</h3>
            <p style="margin-bottom:15px; font-size:13px; opacity:0.8;">Clave Administrativa para crear usuarios</p>
            <input id="master-key-input" type="password" placeholder="Clave Maestra">
            <div class="grid-btns-2">
                <button id="btn-auth-master" class="btn primary">AUTORIZAR</button>
                <button id="btn-cancel-master" class="btn danger">VOLVER</button>
            </div>
        </div>

        <!-- 3. CREAR USUARIO -->
        <div id="box-reg" class="modal-content hidden">
            <h3 style="color:var(--warning)">NUEVO ACCESO</h3>
            <p style="margin-bottom:15px; font-size:12px;">Defina credenciales para el operador</p>
            <input id="reg-user" placeholder="Nuevo Usuario">
            <input id="reg-pass" type="password" placeholder="Contraseña">
            <button id="btn-save-user" class="btn warning" style="width:100%">GUARDAR USUARIO</button>
            <button id="btn-back-login" class="btn ghost" style="width:100%; margin-top:10px">CANCELAR</button>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost">IMPORTAR</button>
                <button id="btn-export" class="btn ghost">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-delete-all" class="btn danger" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden">
                <div id="log-panel"></div>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODALES DE ACCIÓN -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content">
            <h3 id="confirm-title">Confirmar Acción</h3>
            <p id="confirm-msg" style="margin:10px 0; font-size:13px"></p>
            <input id="confirm-pass" type="password" placeholder="Clave Administrativa">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 0001)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        const MASTER_CODE = "1131552679"; //[cite: 1]
        let departamentos = [], editId = null, pendingAction = null;

        const writeLog = (msg, type = 'success') => {
            const lp = document.getElementById("log-panel");
            if(!lp) return;
            const colors = { success: 'log-success', warn: 'log-warn', err: 'log-err', info: 'log-info' };
            lp.innerHTML += `<div class="${colors[type]}">» [${new Date().toLocaleTimeString()}] ${msg}</div>`;
            lp.scrollTop = lp.scrollHeight;
        };

        // --- LÓGICA DE ACCESO BLINDADA ---
        document.getElementById("btn-pre-reg").onclick = () => {
            document.getElementById("box-login").classList.add("hidden");
            document.getElementById("box-master").classList.remove("hidden");
        };

        document.getElementById("btn-cancel-master").onclick = () => {
            document.getElementById("box-master").classList.add("hidden");
            document.getElementById("box-login").classList.remove("hidden");
        };

        document.getElementById("btn-auth-master").onclick = () => {
            if(document.getElementById("master-key-input").value === MASTER_CODE) {
                document.getElementById("box-master").classList.add("hidden");
                document.getElementById("box-reg").classList.remove("hidden");
            } else { alert("CLAVE MAESTRA INCORRECTA"); }
        };

        document.getElementById("btn-back-login").onclick = () => {
            document.getElementById("box-reg").classList.add("hidden");
            document.getElementById("box-login").classList.remove("hidden");
        };

        document.getElementById("btn-save-user").onclick = async () => {
            const u = document.getElementById("reg-user").value;
            const p = document.getElementById("reg-pass").value;
            if(!u || !p) return alert("Complete los campos");
            await addDoc(collection(db, "usuarios"), { user: u, pass: p });
            alert("USUARIO CREADO CORRECTAMENTE");
            document.getElementById("btn-back-login").click();
        };

        const procesarEntrada = () => {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").classList.remove("hidden");
            writeLog("Sesión iniciada correctamente", "success");
            loadData();
        };

        document.getElementById("btn-login").onclick = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(p === MASTER_CODE) return procesarEntrada();
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) procesarEntrada(); else alert("CREDENCIALES INVÁLIDAS");
        };

        // --- MANEJO DE DATOS ---
        function loadData() {
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const div = document.createElement("div");
                div.className = `item ${(!d.TelefonoPropietario && !d.TelefonoInquilino) ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger)" onclick="window.askConfirm('¿Borrar registro UF ${d.UF}?', 'delete', '${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details hidden">
                        <p><b>Prop:</b> ${d.Propietario || '---'} | <b>Tel:</b> ${d.TelefonoPropietario || 'N/C'}</p>
                        <p><b>Inq:</b> ${d.Inquilino || '---'} | <b>Tel:</b> ${d.TelefonoInquilino || 'N/C'}</p>
                        <div class="grid-btns-2">
                            <a href="tel:${d.TelefonoPropietario || d.TelefonoInquilino}" class="btn primary"><i class="fas fa-phone"></i> LLAMAR</a>
                            <a href="https://wa.me/${(d.TelefonoPropietario || d.TelefonoInquilino || '').replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- ACCIONES PROTEGIDAS ---
        window.askConfirm = (msg, type, id = null) => {
            pendingAction = { type, id };
            document.getElementById("confirm-msg").innerText = msg;
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            const p = document.getElementById("confirm-pass").value;
            if(p !== MASTER_CODE) return alert("CLAVE INCORRECTA");
            
            if(pendingAction.type === 'delete') await deleteDoc(doc(db, "departamentos", pendingAction.id));
            if(pendingAction.type === 'deleteAll') {
                const s = await getDocs(collection(db, "departamentos"));
                const b = writeBatch(db); s.forEach(d => b.delete(d.ref)); await b.commit();
            }
            document.getElementById("modal-confirm").classList.add("hidden");
            writeLog("Acción autorizada y ejecutada", "warn");
        };

        // --- FUNCIONES EXTRA ---
        document.getElementById("btn-logout-trigger").onclick = () => location.reload();
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.includes(v) || (d.Propietario||'').toLowerCase().includes(v)));
        };

        window.editUF = (id) => {
            editId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario;
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const d = { 
                UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value,
                TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value,
                TelefonoInquilino: document.getElementById("f-teli").value
            };
            if(editId) await updateDoc(doc(db, "departamentos", editId), d);
            else await addDoc(collection(db, "departamentos"), d);
            document.getElementById("modal-form").classList.add("hidden");
        };

        document.querySelectorAll("#btn-confirm-no, #btn-cancel").forEach(b => b.onclick = () => document.querySelectorAll(".modal").forEach(m => m.id!=="login-screen" && m.classList.add("hidden")));

    </script>
</body>
</html>
