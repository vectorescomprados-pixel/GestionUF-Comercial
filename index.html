<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
        authDomain: "gestionuf-remoto.firebaseapp.com", 
        projectId: "gestionuf-remoto", 
        storageBucket: "gestionuf-remoto.firebasestorage.app", 
        messagingSenderId: "724452752860", 
        appId: "1:724452752860:web:4d25585addcdcbd146e319" 
    };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);
    
    let departamentos = [], editId = null, pendingAction = null;
    
    // CLAVE MAESTRA ACTUALIZADA
    const MASTER_CODE = "4750"; 
    
    const userRole = localStorage.getItem("uf_user_role") || "operador";

    // --- LOGS ---
    const writeLog = (msg, type = 'success') => {
        const lp = document.getElementById("log-panel");
        if(lp) {
            lp.innerHTML += `<div class="log-${type}">» [${new Date().toLocaleTimeString()}] ${msg}</div>`;
            lp.scrollTop = lp.scrollHeight;
        }
    };

    // --- RENDERIZADO CON BOTONES LATERALES ---
    function render(data) {
        const list = document.getElementById("list");
        list.innerHTML = "";
        
        data.forEach(d => {
            const tp = String(d.TelefonoPropietario || "").trim();
            const ti = String(d.TelefonoInquilino || "").trim();
            const sinT = (!tp && !ti);
            const telActivo = tp || ti || "";

            const div = document.createElement("div");
            div.className = `item ${sinT ? 'no-phone' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <b>UF: ${d.UF}</b>
                        <small>${d.Propietario || 'Sin Datos'}</small>
                    </div>
                    <div style="display:flex; gap:15px; font-size:18px">
                        <i class="fas fa-eye" style="cursor:pointer" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden');" title="Ver detalles"></i>
                        <i class="fas fa-edit" style="color:var(--primary); cursor:pointer" onclick="window.editUF('${d.id}')" title="Editar registro"></i>
                        ${userRole === 'admin' ? `<i class="fas fa-trash" style="color:var(--danger); cursor:pointer" onclick="window.askConfirm('¿Borrar registro UF ${d.UF}?', 'delete', '${d.id}')" title="Eliminar"></i>` : ''}
                    </div>
                </div>
                <div id="det-${d.id}" class="details hidden">
                    <p><b>Prop:</b> ${d.Propietario || '---'} | <b>Tel:</b> ${tp || 'N/C'}</p>
                    <p><b>Inq:</b> ${d.Inquilino || '---'} | <b>Tel:</b> ${ti || 'N/C'}</p>
                    <div class="grid-btns-2">
                        <a href="tel:${telActivo}" class="btn primary" onclick="writeLog('Llamada a UF ${d.UF}', 'info')"><i class="fas fa-phone"></i> LLAMAR</a>
                        <a href="https://wa.me/${telActivo.replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e" onclick="writeLog('WhatsApp a UF ${d.UF}', 'info')"><i class="fab fa-whatsapp"></i> CHAT</a>
                    </div>
                </div>`;
            list.appendChild(div);
        });
    }

    // --- FUNCIONES GLOBALES PARA BOTONES ---
    window.editUF = (id) => {
        editId = id; 
        const d = departamentos.find(x => x.id === id);
        if(!d) return;
        
        document.getElementById("form-title").innerText = "Editar Unidad " + d.UF;
        document.getElementById("f-uf").value = d.UF || ""; 
        document.getElementById("f-prop").value = d.Propietario || "";
        document.getElementById("f-telp").value = d.TelefonoPropietario || "";
        document.getElementById("f-inq").value = d.Inquilino || "";
        document.getElementById("f-teli").value = d.TelefonoInquilino || "";
        document.getElementById("modal-form").classList.remove("hidden");
        writeLog(`Editando UF: ${d.UF}`, "info");
    };

    // --- LÓGICA DE GUARDADO (BLINDADA) ---
    document.getElementById("btn-save").onclick = async () => {
        const ufVal = document.getElementById("f-uf").value.trim();
        if(!ufVal) return alert("Error: El campo UF no puede estar vacío.");

        const d = { 
            UF: ufVal, 
            Propietario: document.getElementById("f-prop").value.trim(), 
            TelefonoPropietario: document.getElementById("f-telp").value.trim(), 
            Inquilino: document.getElementById("f-inq").value.trim(), 
            TelefonoInquilino: document.getElementById("f-teli").value.trim(),
            lastUpdate: new Date().toISOString()
        };

        try {
            if(editId) {
                await updateDoc(doc(db, "departamentos", editId), d);
                writeLog(`UF ${d.UF} actualizada`, "success");
            } else {
                await addDoc(collection(db, "departamentos"), d);
                writeLog(`Nueva UF ${d.UF} creada`, "success");
            }
            document.getElementById("modal-form").classList.add("hidden");
        } catch (error) {
            writeLog("Error al guardar: " + error.message, "err");
            alert("No se pudo guardar en la nube.");
        }
    };

    // --- RESTO DE FUNCIONALIDAD (SIN CAMBIOS EN LOGIN) ---
    // ... (Aquí sigue tu lógica de login, búsqueda, exportación y permisos que ya tenías)
</script>
