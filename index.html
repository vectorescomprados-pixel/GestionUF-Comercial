<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>GestiónUF Pro - Enterprise Gold V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* 🏠 BOTÓN HOME - RUTA CORREGIDA */
        .btn-home-fixed {
            position: fixed !important; bottom: 30px !important; right: 25px !important;
            z-index: 999999999 !important; background: #2563eb !important;
            color: white !important; width: 65px; height: 65px; border-radius: 50%;
            display: flex !important; align-items: center; justify-content: center;
            text-decoration: none; box-shadow: 0 8px 25px rgba(0,0,0,0.5); border: 3px solid #ffffff;
        }

        /* HEADER SEGÚN LA FOTO */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: #111b21; z-index: 1000; padding: 15px; border-bottom: 4px solid var(--primary); border-radius: 0 0 20px 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .content-body { margin-top: 360px; width: 100%; padding-bottom: 120px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 50px; border-radius: 12px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .primary { background: #2563eb; } .danger { background: #e11d48; } .ghost { background: #475569; } .warning { background: #f59e0b; color: #000; } .orange { background: #f97316; }

        /* CARDS SEGÚN LA FOTO (BORDE IZQUIERDO AMARILLO/VERDE) */
        .item { background: #2a3942; border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #374151; position: relative; border-left: 8px solid var(--success); }
        .item.vacio { border-left: 8px solid var(--warning); }
        .item b { font-size: 18px; color: #3b82f6; display: block; margin-bottom: 4px; }
        .item small { font-size: 14px; color: #9ca3af; }
        
        .details { margin-top: 12px; padding-top: 10px; border-top: 1px dashed #4b5563; font-size: 13px; color: #d1d5db; }
        
        input { width: 100%; height: 50px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #374151; padding: 0 15px; background: #0b141a; color: white; font-size: 16px; outline: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #111b21; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <a href="https://vectorescomprados-pixel.github.io/Hub-Central/" class="btn-home-fixed">
        <i class="fas fa-home" style="font-size: 28px;"></i>
    </a>

    <div id="login-screen" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 style="margin-bottom:20px; color:#2563eb">GestiónUF Acceso</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:10px; text-align:center; margin-bottom:12px; color:var(--success);">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            
            <div class="grid-btns">
                <button class="btn primary">LOGS</button>
                <button id="btn-theme" class="btn primary">TEMA</button>
                <button id="btn-logout" class="btn orange">CERRAR</button>
            </div>
            
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button class="btn primary">IMPORTAR</button>
                <button id="btn-export" class="btn primary">RESPALDO</button>
            </div>

            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn primary">LIMPIAR</button>
                <button class="btn warning">SIN DATOS</button>
            </div>
            
            <button class="btn orange" style="width: 100%; height: 40px; font-size: 10px;">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="list"></div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title" style="margin-bottom:15px; text-align:center;">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 0000)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div style="display: flex; gap: 10px;">
                <button id="btn-save" class="btn primary" style="flex:1">GUARDAR</button>
                <button id="btn-cancel" class="btn danger" style="flex:1">DESCARTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let departamentos = [], editId = null, expandedId = null;
        const MASTER_CODE = "1131552679";

        document.getElementById("btn-login").onclick = () => {
            if (document.getElementById("login-pass").value === MASTER_CODE) {
                localStorage.setItem("uf_auth", "true");
                location.reload();
            } else { alert("Clave Incorrecta"); }
        };

        if (localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        function render() {
            const list = document.getElementById("list");
            list.innerHTML = "";
            departamentos.forEach(d => {
                // LÓGICA DE COLOR AMARILLO REFORZADA:
                // Se activa si el Propietario está vacío, no existe, o dice "S/D"
                const prop = d.Propietario ? d.Propietario.trim().toUpperCase() : "";
                const esVacio = !prop || prop === "S/D" || prop === "";
                
                const div = document.createElement("div");
                div.className = `item ${esVacio ? 'vacio' : ''}`;
                
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <b>UF: ${d.UF}</b>
                            <small>${esVacio ? 'S/D' : d.Propietario}</small>
                        </div>
                        <div style="display:flex; gap:12px; font-size:18px">
                            <i class="fas fa-eye" style="color:#d1d5db" onclick="window.toggleExpand('${d.id}')"></i>
                            <i class="fas fa-edit" style="color:#22d3ee" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:#f87171" onclick="window.deleteUF('${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>
                    ${expandedId === d.id ? `
                        <div class="details">
                            <p><strong>Tel Prop:</strong> ${d.TelefonoPropietario || '-'}</p>
                            <p><strong>Inquilino:</strong> ${d.Inquilino || '-'}</p>
                            <p><strong>Tel Inq:</strong> ${d.TelefonoInquilino || '-'}</p>
                        </div>
                    ` : ''}
                `;
                list.appendChild(div);
            });
        }

        window.toggleExpand = (id) => {
            expandedId = (expandedId === id) ? null : id;
            render();
        };

        window.editUF = (id) => {
            const d = departamentos.find(x => x.id === id);
            editId = id;
            document.getElementById("f-uf").value = d.UF;
            document.getElementById("f-prop").value = d.Propietario || "";
            document.getElementById("f-telp").value = d.TelefonoPropietario || "";
            document.getElementById("f-inq").value = d.Inquilino || "";
            document.getElementById("f-teli").value = d.TelefonoInquilino || "";
            document.getElementById("modal-form").classList.remove("hidden");
        };

        window.deleteUF = async (id, uf) => {
            if(confirm(`¿Desea eliminar la unidad ${uf}?`)) await deleteDoc(doc(db, "departamentos", id));
        };

        document.getElementById("btn-save").onclick = async () => {
            const d = { 
                UF: document.getElementById("f-uf").value, 
                Propietario: document.getElementById("f-prop").value, 
                TelefonoPropietario: document.getElementById("f-telp").value, 
                Inquilino: document.getElementById("f-inq").value, 
                TelefonoInquilino: document.getElementById("f-teli").value 
            };
            if(editId) await updateDoc(doc(db, "departamentos", editId), d);
            else await addDoc(collection(db, "departamentos"), d);
            document.getElementById("modal-form").classList.add("hidden");
        };

        document.getElementById("btn-add").onclick = () => {
            editId = null;
            document.querySelectorAll("#modal-form input").forEach(i => i.value = "");
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-cancel").onclick = () => document.getElementById("modal-form").classList.add("hidden");
        document.getElementById("btn-logout").onclick = () => { localStorage.removeItem("uf_auth"); location.reload(); };
    </script>
</body>
</html>
