<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>GestiónUF Pro - Enterprise Gold V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* 🏠 BOTÓN HOME BLINDADO PARA ANDROID */
        .btn-home {
            position: fixed !important; /* Forza la posición fija */
            bottom: 30px !important;  /* Separado del borde inferior */
            right: 25px !important;   /* Separado del borde derecho */
            width: 65px;
            height: 65px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex !important;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            z-index: 99999999; /* Máxima prioridad sobre cualquier modal o tabla */
            border: 3px solid #ffffff;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-home i { font-size: 28px; }
        .btn-home:active { transform: scale(0.9); }

        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 250px; width: 100%; padding-bottom: 120px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; }
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        .item b { font-size: 16px; color: var(--primary); display: block; margin-bottom: 5px; }
        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body class="dark-mode">

    <a href="https://vectorescomprados-pixel.github.io/Hub-Central/" class="btn-home">
        <i class="fas fa-home"></i>
    </a>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Acceso</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success);">● EN LÍNEA</div>
            <div class="grid-btns">
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout" class="btn danger">SALIR</button>
                <button id="btn-export" class="btn ghost">BACKUP</button>
            </div>
            <button id="btn-add" class="btn primary" style="width: 100%; margin: 10px 0;">+ NUEVA UNIDAD</button>
            <input id="search-input" placeholder="Buscar Unidad o Apellido...">
        </div>

        <div class="content-body">
            <div id="list"></div>
        </div>
    </div>

    <script type="module">
        // [Copia aquí exactamente tu bloque <script> de Firebase del archivo original]
        // Asegúrate de que las funciones editUF y deleteUF sigan estando.
        
        const MASTER_CODE = "1131552679";
        document.getElementById("btn-login").onclick = () => {
            if (document.getElementById("login-pass").value === MASTER_CODE) {
                localStorage.setItem("uf_auth", "true");
                location.reload();
            } else { alert("Clave incorrecta"); }
        };

        if (localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
        }
        
        document.getElementById("btn-logout").onclick = () => {
            localStorage.removeItem("uf_auth");
            location.reload();
        };
        
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
    </script>
</body>
</html>
