<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise V3.2 FINAL</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icono-192.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 100px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; }
        
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; border: 2px solid white; display: none; }
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        .item.no-phone { border-left: 8px solid var(--warning) !important; }
        .item b { font-size: 16px; color: var(--primary); display: block; margin-bottom: 5px; }
        
        input, select { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; }
        
        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 120px; overflow-y: auto; border-radius: 8px; font-family: 'Courier New', monospace; border: 1px solid #333; color: #00ff41; margin-bottom: 15px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }

        /* Estilos lista usuarios */
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body class="dark-mode">

    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>
    <input type="file" id="csv-file" class="hidden">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
            <button id="btn-create-user-trigger" class="btn ghost" style="width:100%; margin-top:10px">CREAR USUARIOS</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● SISTEMA BLINDADO - V3.2</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">LOGS</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">UF DISPONIBLE</button>
            </div>
            <button id="btn-delete-all" class="btn danger admin-only" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden"><div id="log-panel"></div></div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL GESTIÓN DE USUARIOS (NUEVO) -->
    <div id="modal-manage-users" class="modal hidden">
        <div class="modal-content">
            <h3 style="text-align:center">Panel de Usuarios</h3>
            <div id="user-list-container" style="margin:15px 0; border:1px solid var(--border); border-radius:10px; max-height:200px; overflow-y:auto;">
                <!-- Aquí se cargan los usuarios dinámicamente -->
            </div>
            <hr style="margin:15px 0; opacity:0.3">
            <h4 style="font-size:12px; margin-bottom:10px">REGISTRAR NUEVO</h4>
            <input id="new-username" placeholder="Nuevo Usuario">
            <input id="new-password" type="password" placeholder="Contraseña">
            <select id="new-role">
                <option value="operador">Operador</option>
                <option value="admin">Administrador</option>
            </select>
            <div class="grid-btns-2">
                <button id="btn-save-user" class="btn primary">REGISTRAR</button>
                <button id="btn-close-users" class="btn danger">CERRAR</button>
            </div>
        </div>
    </div>

    <!-- OTROS MODALES BLINDADOS -->
    <div id="modal-logout" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3>Finalizar Sesión</h3>
            <div class="grid-btns-2">
                <button id="btn-logout-confirm" class="btn danger">SALIR</button>
                <button id="btn-logout-cancel" class="btn ghost">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3>Seguridad Requerida</h3>
            <p id="confirm-msg" style="margin:10px 0; font-size:13px"></p>
            <input id="confirm-pass" type="password" placeholder="Clave Administrativa">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title" style="text-align:center">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], usuarios = [], editId = null, pendingAction = null;
        const MASTER_CODE = "1131552679";
        const userRole = localStorage.getItem("uf_user_role") || "operador";

        // --- SISTEMA DE LOGS ---
        const writeLog = (msg, type = 'success') => {
            const lp = document.getElementById("log-panel");
            if(lp) {
                lp.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
                lp.scrollTop = lp.scrollHeight;
            }
        };

        const applyPermissions = () => {
            if(userRole !== 'admin') document.querySelectorAll(".admin-only").forEach(el => el.remove());
        };

        // --- GESTIÓN DE USUARIOS ---
        const loadUsers = async () => {
            const snap = await getDocs(collection(db, "usuarios"));
            const container = document.getElementById("user-list-container");
            container.innerHTML = "";
            snap.forEach(uDoc => {
                const u = uDoc.data();
                const row = document.createElement("div");
                row.className = "user-row";
                row.innerHTML = `
                    <span><b>${u.usuario}</b> (${u.role})</span>
                    ${u.usuario !== 'admin' ? `<i class="fas fa-user-minus" style="color:var(--danger); cursor:pointer" onclick="window.deleteUser('${uDoc.id}', '${u.usuario}')"></i>` : ''}
                `;
                container.appendChild(row);
            });
        };

        window.deleteUser = async (id, name) => {
            if(confirm(`¿Eliminar acceso de ${name}?`)) {
                await deleteDoc(doc(db, "usuarios", id));
                writeLog(`Usuario ${name} eliminado`, 'err');
                loadUsers();
            }
        };

        // --- LOGIN ---
        const login = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            const q = query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const data = snap.docs[0].data();
                localStorage.setItem("uf_auth", "true");
                localStorage.setItem("uf_user_role", data.role);
                localStorage.setItem("uf_username", data.usuario);
                location.reload();
            } else { alert("Error de acceso"); writeLog("Intento fallido: " + u, "err"); }
        };
        document.getElementById("btn-login").onclick = login;
        document.getElementById("login-pass").onkeyup = (e) => e.key === "Enter" && login();

        // --- RENDER REGISTROS ---
        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const tp = String(d.TelefonoPropietario || "").trim();
                const ti = String(d.TelefonoInquilino || "").trim();
                const div = document.createElement("div");
                div.className = `item ${(!tp && !ti) ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px">
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden');"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                            ${userRole === 'admin' ? `<i class="fas fa-trash" style="color:var(--danger)" onclick="window.askConfirm('¿Borrar UF ${d.UF}?', 'delete', '${d.id}')"></i>` : ''}
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details hidden">
                        <hr style="margin:5px 0; opacity:0.1">
                        <p>Prop: ${d.Propietario || '---'} | Tel: ${tp || 'N/C'}</p>
                        <p>Inq: ${d.Inquilino || '---'} | Tel: ${ti || 'N/C'}</p>
                        <div class="grid-btns-2">
                            <a href="tel:${tp || ti}" class="btn primary" onclick="writeLog('Llamada a UF ${d.UF}', 'info')"><i class="fas fa-phone"></i></a>
                            <a href="https://wa.me/${(tp || ti).replace(/\D/g,'')}" target="_blank" class="btn success" style="background:#22c55e" onclick="writeLog('WhatsApp a UF ${d.UF}', 'info')"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- ACCIONES BLINDADAS ---
        window.askConfirm = (msg, type, id = null) => {
            pendingAction = { type, id };
            document.getElementById("confirm-msg").innerText = msg;
            document.getElementById("confirm-pass").value = "";
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value !== MASTER_CODE) return alert("Clave Maestra Incorrecta");
            document.getElementById("modal-confirm").classList.add("hidden");
            if(pendingAction.type === 'delete') {
                await deleteDoc(doc(db, "departamentos", pendingAction.id));
                writeLog("Registro eliminado", "err");
            } else if(pendingAction.type === 'deleteAll') {
                const s = await getDocs(collection(db, "departamentos"));
                const b = writeBatch(db); s.forEach(d => b.delete(d.ref)); await b.commit();
                writeLog("BASE VACIADA", "err");
            } else if(pendingAction.type === 'manageUsers') {
                document.getElementById("modal-manage-users").classList.remove("hidden");
                loadUsers();
            } else if(pendingAction.type === 'export') {
                const csv = "UF,Propietario,TelProp,Inquilino,TelInq\n" + departamentos.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
                const link = document.createElement("a"); link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
                link.download = "Respaldo.csv"; link.click();
                writeLog("CSV Generado", "success");
            }
        };

        // --- EVENTOS ---
        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            applyPermissions();
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        document.getElementById("btn-add").onclick = () => { editId = null; document.querySelectorAll("#modal-form input").forEach(i => i.value = ""); document.getElementById("modal-form").classList.remove("hidden"); };
        
        window.editUF = (id) => {
            editId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario; document.getElementById("f-inq").value = d.Inquilino;
            document.getElementById("f-teli").value = d.TelefonoInquilino;
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const d = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            if(editId) await updateDoc(doc(db, "departamentos", editId), d); else await addDoc(collection(db, "departamentos"), d);
            document.getElementById("modal-form").classList.add("hidden");
            writeLog(`UF ${d.UF} guardada`, "success");
        };

        document.getElementById("btn-save-user").onclick = async () => {
            const u = document.getElementById("new-username").value, p = document.getElementById("new-password").value, r = document.getElementById("new-role").value;
            if(u && p) {
                await addDoc(collection(db, "usuarios"), { usuario: u, password: p, role: r });
                writeLog(`Usuario ${u} creado`, "success"); loadUsers();
                document.getElementById("new-username").value = ""; document.getElementById("new-password").value = "";
            }
        };

        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v)));
            writeLog(`Buscó: ${v}`, "info");
        };

        document.getElementById("btn-filter-empty").onclick = () => {
            render(departamentos.filter(d => !String(d.TelefonoPropietario||"").trim() && !String(d.TelefonoInquilino||"").trim()));
            writeLog("Filtro: Disponibles", "warn");
        };

        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-logout-trigger").onclick = () => document.getElementById("modal-logout").classList.remove("hidden");
        document.getElementById("btn-logout-confirm").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-create-user-trigger").onclick = () => askConfirm("Gestión de accesos", "manageUsers");
        document.getElementById("btn-close-users").onclick = () => document.getElementById("modal-manage-users").classList.add("hidden");
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

        document.querySelectorAll("#btn-cancel, #btn-confirm-no, #btn-logout-cancel").forEach(b => b.onclick = () => {
            document.querySelectorAll(".modal").forEach(m => m.id !== "login-screen" && m.classList.add("hidden"));
        });
    </script>
</body>
</html>
