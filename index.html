<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V5.9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --ghost: #3b4a54; --warning: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* INPUTS Y BOTONES */
        input { width: 100%; height: 48px; margin-bottom: 12px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: #1c272f; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { height: 46px; border-radius: 10px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .primary { background: #1d4ed8; } .danger { background: #e11d48; } .ghost { background: var(--ghost); color: var(--text); }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1c272f; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; pointer-events: auto; }

        /* CABECERA APP */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 20px 20px; }
        .content-body { margin-top: 500px; width: 100%; padding-bottom: 80px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- PANTALLA LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--primary); margin-bottom:25px;">GestiónUF Acceso</h2>
            <input id="login-user" type="text" placeholder="Usuario" autocomplete="off">
            <input id="login-pass" type="password" placeholder="Contraseña" autocomplete="off">
            <button id="btn-login-exec" class="btn primary" style="width:100%">ENTRAR</button>
            <button id="btn-recover-trigger" class="btn ghost" style="width:100%; margin-top:15px; font-size:10px;">SOPORTE TÉCNICO</button>
        </div>
    </div>

    <!-- MODAL RECUPERACIÓN -->
    <div id="modal-recovery" class="modal hidden">
        <div class="modal-content">
            <h3 style="color:white; margin-bottom:10px;">Restablecer Acceso</h3>
            <p style="color:#888; font-size:12px; margin-bottom:15px;">Ingrese el Código Maestro de Soporte.</p>
            <input id="recovery-code" type="password" placeholder="Código Maestro">
            <button id="btn-recovery-exec" class="btn primary" style="width:100%">CONFIRMAR</button>
            <button onclick="document.getElementById('modal-recovery').classList.add('hidden')" class="btn ghost" style="width:100%; margin-top:10px;">VOLVER</button>
        </div>
    </div>

    <!-- MODAL SEGURIDAD ACCIONES -->
    <div id="modal-auth" class="modal hidden">
        <div class="modal-content">
            <h3 style="color: white; margin-bottom: 10px;">Seguridad</h3>
            <p id="auth-desc" style="color: #888; font-size: 13px; margin-bottom: 15px;"></p>
            <input id="auth-pass" type="password" placeholder="Clave Administrativa">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="auth-confirm-btn" class="btn primary">OK</button>
                <button onclick="document.getElementById('modal-auth').classList.add('hidden')" class="btn danger">NO</button>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL (Oculta hasta login) -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div style="text-align:center; font-size:10px; color:#22c55e; margin-bottom:10px; font-weight:bold;">SISTEMA ACTIVO</div>
            <div class="grid-btns">
                <button onclick="document.getElementById('log-container').classList.toggle('hidden')" class="btn ghost">HISTORIAL</button>
                <button class="btn ghost">TEMA</button>
                <button id="btn-logout-app" class="btn danger">SALIR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-new" class="btn primary">NUEVA UF</button>
                <button class="btn ghost">IMPORTAR</button>
                <button id="btn-export-sec" class="btn ghost">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por UF o Nombre...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-wipe" class="btn danger" style="width:100%">VACIAR NUBE</button>
            <div id="log-container" class="hidden" style="background:#000; height:80px; margin-top:10px; border-radius:8px; padding:10px; font-size:10px; color:#0f0; overflow-y:auto;">
                <div id="log-panel"></div>
            </div>
        </div>
        <div class="content-body" id="list"></div>
    </div>

    <script type="module">
        const MASTER = "1131552679";

        // LÓGICA DE LOGIN
        const runLogin = () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(u === "admin" && p === "admin") {
                localStorage.setItem("uf_auth", "true");
                location.reload();
            } else {
                alert("Credenciales Incorrectas");
            }
        };

        document.getElementById("btn-login-exec").onclick = runLogin;
        document.getElementById("login-pass").onkeyup = (e) => e.key === "Enter" && runLogin();

        // SOPORTE TÉCNICO (RECUPERAR)
        document.getElementById("btn-recover-trigger").onclick = () => {
            document.getElementById("modal-recovery").classList.remove("hidden");
        };

        const runRecovery = () => {
            if(document.getElementById("recovery-code").value === MASTER) {
                alert("Acceso Restaurado. User: admin / Pass: admin");
                location.reload();
            } else { alert("Código Inválido"); }
        };
        document.getElementById("btn-recovery-exec").onclick = runRecovery;
        document.getElementById("recovery-code").onkeyup = (e) => e.key === "Enter" && runRecovery();

        // PERSISTENCIA
        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            // Aquí iría tu lógica de Firebase onSnapshot que ya tienes
        }

        // SALIR
        document.getElementById("btn-logout-app").onclick = () => {
            localStorage.removeItem("uf_auth");
            location.reload();
        };

        // RESPALDO CON CONTRASEÑA
        let pTask = null;
        window.askSec = (task, desc) => {
            pTask = task;
            document.getElementById("auth-desc").innerText = desc;
            document.getElementById("modal-auth").classList.remove("hidden");
        };

        document.getElementById("btn-export-sec").onclick = () => window.askSec('exp', '¿Descargar respaldo de la base?');
        document.getElementById("btn-wipe").onclick = () => window.askSec('wipe', '¿BORRAR TODA LA BASE DE DATOS?');

        document.getElementById("auth-confirm-btn").onclick = () => {
            if(document.getElementById("auth-pass").value === MASTER) {
                alert("Acción autorizada: " + pTask);
                // Aquí ejecutas la lógica de exportar o borrar que ya tenías
                document.getElementById("modal-auth").classList.add("hidden");
            } else { alert("Clave Incorrecta"); }
        };

    </script>
</body>
</html>
