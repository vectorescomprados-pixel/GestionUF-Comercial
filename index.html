<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>GestiónUF Pro - V4.8 Ultra Blindado</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --bg:#0b141a; --card:#111b21; --primary:#2563eb; --danger:#e11d48; --text:#e9edef; --border:#222d34; --warning:#f59e0b; --success:#22c55e; --ghost:#374151;}
body.light-mode { --bg:#f0f2f5; --card:#ffffff; --text:#1f293b; --border:#e5e7eb;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);transition:.3s;}
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

.wrap{width:95%;max-width:450px;margin:0 auto;}
.hidden{display:none!important;}

.btn-home{position:fixed;top:15px;left:15px;z-index:10001;background:var(--primary);color:#fff;border:none;border-radius:50%;width:45px;height:45px;display:flex;align-items:center;justify-content:center;}

.main-header{position:fixed;top:0;width:95%;max-width:450px;background:var(--card);padding:15px;border-bottom:3px solid var(--primary);border-radius:0 0 20px 20px;}
.content-body{margin-top:420px;padding-bottom:100px;}

.grid-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.btn{height:45px;border:none;border-radius:10px;font-weight:bold;color:white;}
.primary{background:var(--primary);}
.danger{background:var(--danger);}
.ghost{background:var(--ghost);}
.warning{background:var(--warning);color:#000;}

#log-panel{background:#000;height:120px;overflow:auto;font-size:10px;}
.log-success{color:#00ff41;}
.log-warn{color:#fbff00;}
.log-err{color:#ff3131;}
.log-info{color:#00d4ff;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;}
.modal-content{background:var(--card);padding:25px;border-radius:20px;}

</style>
</head>

<body>

<div id="login-screen" class="modal">
<div class="modal-content">
<input id="login-user">
<input id="login-pass" type="password">
<button id="btn-login">LOGIN</button>
</div>
</div>

<div id="main-screen" class="wrap hidden">

<div class="grid-btns">
<button id="btn-log-toggle" class="btn ghost">LOGS</button>
<button id="btn-theme" class="btn ghost">TEMA</button>
<button id="btn-logout" class="btn danger">CERRAR</button>
</div>

<div id="log-panel"></div>
<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({});
const db = getFirestore(app);

let departamentos=[];

/* RESTAURAR TEMA */
const savedTheme=localStorage.getItem("uf_theme");
if(savedTheme==="light"){
document.body.classList.add("light-mode");
}

/* LOGS */
const writeLog=(msg,type='info')=>{
const lp=document.getElementById("log-panel");
lp.innerHTML+=`<div class="log-${type}">${msg}</div>`;
};

/* LOGIN */
document.getElementById("btn-login").onclick=()=>{
localStorage.setItem("uf_auth","true");
location.reload();
};

/* INIT */
if(localStorage.getItem("uf_auth")==="true"){
document.getElementById("login-screen").classList.add("hidden");
document.getElementById("main-screen").classList.remove("hidden");
}

/* TEMA */
document.getElementById("btn-theme").onclick=()=>{
document.body.classList.toggle("light-mode");
const isLight=document.body.classList.contains("light-mode");
localStorage.setItem("uf_theme",isLight?"light":"dark");
writeLog("Cambio de tema","info");
};

/* 🔥 CERRAR (ARREGLADO BIEN) */
document.getElementById("btn-logout").onclick=()=>{
const confirmar=confirm("¿Desea cerrar sesión?");

if(!confirmar){
writeLog("Canceló cierre","warn");
return;
}

writeLog("Sesión cerrada","warn");

setTimeout(()=>{
localStorage.clear();
location.reload();
},300);
};
</script>
</body>
</html>
