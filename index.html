<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise Gold V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 100px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; }
        
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; }
        input, select { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; }
        
        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 120px; overflow-y: auto; border-radius: 8px; font-family: 'Courier New', monospace; border: 1px solid #333; line-height: 1.4; }
        .log-success { color: #00ff41; } .log-err { color: #ff3131; } .log-info { color: #00d4ff; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .user-list-container { margin-top: 20px; border-top: 2px solid var(--border); padding-top: 15px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body class="dark-mode">

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Acceso</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
            <button id="btn-create-user-trigger" class="btn ghost" style="width:100%; margin-top:10px">GESTIONAR ACCESOS</button>
        </div>
    </div>

    <div id="modal-create-user" class="modal hidden">
        <div class="modal-content">
            <h3 id="user-form-title" style="text-align:center; margin-bottom:15px">Registrar Acceso</h3>
            <input id="new-username" placeholder="Nombre de Usuario">
            <input id="new-password" type="password" placeholder="Contraseña">
            <select id="new-role">
                <option value="operador">Operador (Gestión)</option>
                <option value="admin">Administrador (Total)</option>
            </select>
            <div class="grid-btns-2">
                <button id="btn-save-user" class="btn primary">GUARDAR</button>
                <button id="btn-cancel-user" class="btn danger">CERRAR</button>
            </div>
            <div class="user-list-container">
                <h4 style="margin-bottom:10px; font-size:14px; color:var(--primary)">Usuarios en la Nube:</h4>
                <div id="user-db-list"></div>
            </div>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● EN LÍNEA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">LOGS</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar...">
            <div id="log-container" class="hidden"><div id="log-panel"></div></div>
        </div>
        <div class="content-body"><div id="list"></div></div>
    </div>

    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3>Seguridad Requerida</h3>
            <p id="confirm-msg" style="margin:10px 0; font-size:13px"></p>
            <input id="confirm-pass" type="password" placeholder="Clave Maestra">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title" style="text-align:center; margin-bottom:15px">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
            authDomain: "gestionuf-remoto.firebaseapp.com", 
            projectId: "gestionuf-remoto", 
            storageBucket: "gestionuf-remoto.firebasestorage.app", 
            messagingSenderId: "724452752860", 
            appId: "1:724452752860:web:4d25585addcdcbd146e319" 
        };

        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        
        let departamentos = [], usuariosDB = [], editId = null, editUserId = null, pendingAction = null;
        const MASTER_CODE = "1131552679";
        const userRole = localStorage.getItem("uf_user_role") || "operador";

        const writeLog = (msg, type = 'success') => {
            const lp = document.getElementById("log-panel");
            if(lp) lp.innerHTML += `<div class="log-${type}">» [${new Date().toLocaleTimeString()}] ${msg}</div>`;
        };

        // --- GESTIÓN DE USUARIOS ---
        const loadUsersList = () => {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                usuariosDB = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const container = document.getElementById("user-db-list");
                container.innerHTML = "";
                usuariosDB.forEach(u => {
                    const row = document.createElement("div");
                    row.className = "user-row";
                    row.innerHTML = `<span><b>${u.usuario}</b> (${u.role})</span>
                        <div style="display:flex; gap:12px">
                            <i class="fas fa-edit" style="color:var(--primary);cursor:pointer" onclick="window.prepareEditUser('${u.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger);cursor:pointer" onclick="window.askConfirm('¿Eliminar a ${u.usuario}?', 'deleteUser', '${u.id}')"></i>
                        </div>`;
                    container.appendChild(row);
                });
            });
        };

        window.prepareEditUser = (id) => {
            const u = usuariosDB.find(x => x.id === id);
            editUserId = id;
            document.getElementById("user-form-title").innerText = "Editar Acceso";
            document.getElementById("new-username").value = u.usuario;
            document.getElementById("new-password").value = u.password;
            document.getElementById("new-role").value = u.role;
            document.getElementById("btn-save-user").innerText = "ACTUALIZAR";
        };

        document.getElementById("btn-save-user").onclick = async () => {
            const u = document.getElementById("new-username").value.trim();
            const p = document.getElementById("new-password").value.trim();
            const r = document.getElementById("new-role").value;
            if(!u || !p) return alert("Faltan datos");

            if(editUserId) {
                await updateDoc(doc(db, "usuarios", editUserId), { usuario: u, password: p, role: r });
                editUserId = null;
            } else {
                await addDoc(collection(db, "usuarios"), { usuario: u, password: p, role: r });
            }
            
            document.getElementById("user-form-title").innerText = "Registrar Acceso";
            document.querySelectorAll("#modal-create-user input").forEach(i => i.value = "");
            document.getElementById("btn-save-user").innerText = "GUARDAR";
        };

        // --- LOGIN CORREGIDO ---
        const login = async () => {
            const u = document.getElementById("login-user").value.trim();
            const p = document.getElementById("login-pass").value.trim();
            if(!u || !p) return alert("Ingrese datos");

            try {
                const qry = query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p));
                const snap = await getDocs(qry);
                if (!snap.empty) {
                    const data = snap.docs.data();
                    localStorage.setItem("uf_auth", "true");
                    localStorage.setItem("uf_user_role", data.role);
                    location.reload();
                } else {
                    alert("Usuario o Contraseña no coinciden en la nube");
                }
            } catch (e) { alert("Error de conexión con Firebase"); }
        };

        document.getElementById("btn-login").onclick = login;

        // --- ACCIONES ADMIN ---
        window.askConfirm = (msg, type, id = null) => {
            pendingAction = { type, id };
            document.getElementById("confirm-msg").innerText = msg;
            document.getElementById("confirm-pass").value = "";
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value !== MASTER_CODE) return alert("Código maestro incorrecto");
            document.getElementById("modal-confirm").classList.add("hidden");

            if(pendingAction.type === 'deleteUser') await deleteDoc(doc(db, "usuarios", pendingAction.id));
            else if(pendingAction.type === 'openUserForm') {
                document.getElementById("modal-create-user").classList.remove("hidden");
                loadUsersList();
            }
        };

        // --- INICIO ---
        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `<b>UF: ${d.UF}</b> - ${d.Propietario || 'S/D'}`;
                list.appendChild(div);
            });
        }

        document.getElementById("btn-create-user-trigger").onclick = () => askConfirm("Gestión de Usuarios", "openUserForm");
        document.querySelectorAll("#btn-cancel, #btn-confirm-no, #btn-cancel-user").forEach(b => b.onclick = () => {
            document.querySelectorAll(".modal").forEach(m => m.id !== "login-screen" && m.classList.add("hidden"));
        });
        document.getElementById("btn-logout-trigger").onclick = () => { localStorage.clear(); location.reload(); };

    </script>
</body>
</html>
