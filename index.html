<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise Gold V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 12px; font-weight: bold; }
        .user-tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
        .search-container { position: relative; margin-bottom: 15px; }
        .search-box { width: 100%; height: 50px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 0 45px 0 15px; color: var(--text); font-size: 16px; outline: none; }
        .search-icon { position: absolute; right: 15px; top: 15px; color: var(--primary); font-size: 18px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; }
        .btn-home { display: flex; width: 55px; height: 55px; background: var(--primary); color: white; border-radius: 50%; align-items: center; justify-content: center; margin: 0 auto 20px; text-decoration: none; border: 2px solid white; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 50px; }
        .item-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 6px solid var(--primary); position: relative; }
        .item-card h3 { color: var(--primary); font-size: 17px; margin-bottom: 5px; }
        .item-tools { position: absolute; top: 15px; right: 15px; display: flex; gap: 15px; font-size: 18px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; }
    </style>
</head>
<body class="dark-mode">

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="btn-home"><i class="fas fa-home"></i></a>
            <h2 style="color:var(--primary); margin-bottom:20px">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%; height:50px">INGRESAR</button>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div class="status-bar">
                <div id="display-user" class="user-tag">USUARIO</div>
                <div style="display:flex; gap:15px">
                    <i id="btn-theme" class="fas fa-moon" style="cursor:pointer"></i>
                </div>
            </div>
            <div class="grid-btns">
                <button id="btn-nueva" class="btn primary">NUEVA UF</button>
                <button id="btn-import-trigger" class="btn ghost admin-only hidden">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only hidden">RESPALDO</button>
            </div>
            <div class="search-container">
                <input id="search-input" class="search-box" placeholder="Buscar unidad o apellido...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-logout-trigger" class="btn danger" style="width:100%; margin-top:5px">CERRAR SESIÓN</button>
        </div>
        <div id="list-container" class="content-body"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dptos = [];
        const MASTER_CODE = "1131552679";

        // LÓGICA DE LOGIN DEL BACKUP (Corregida para evitar el error de la foto)
        document.getElementById("btn-login").onclick = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            const q = query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p));
            const snap = await getDocs(q);

            if(!snap.empty) {
                const userData = snap.docs.data(); // Aquí estaba el error, ahora usa .data() correctamente
                localStorage.setItem("uf_user", userData.usuario);
                localStorage.setItem("uf_role", userData.role || "operador");
                location.reload();
            } else {
                alert("Acceso Incorrecto");
            }
        };

        if(localStorage.getItem("uf_user")) {
            const role = localStorage.getItem("uf_role");
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            document.getElementById("display-user").innerText = localStorage.getItem("uf_user");

            if(role === "admin") {
                document.querySelectorAll(".admin-only").forEach(el => el.classList.remove("hidden"));
            }

            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                dptos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(dptos);
            });
        }

        function render(data) {
            const container = document.getElementById("list-container");
            container.innerHTML = "";
            data.forEach(d => {
                const div = document.createElement("div");
                div.className = "item-card";
                div.innerHTML = `
                    <h3>UF: ${d.UF}</h3>
                    <p>Prop: ${d.Propietario || '---'}</p>
                    <div class="item-tools">
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                        <i class="fas fa-trash" style="color:var(--danger)" onclick="window.deleteUF('${d.id}')"></i>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.deleteUF = async (id) => {
            const pass = prompt("Clave Administrativa para borrar:");
            if(pass === MASTER_CODE) await deleteDoc(doc(db, "departamentos", id));
            else if(pass !== null) alert("Clave Incorrecta");
        };

        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(dptos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v)));
        };

        document.getElementById("btn-clear").onclick = () => {
            document.getElementById("search-input").value = "";
            render(dptos);
        };

        document.getElementById("btn-logout-trigger").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("dark-mode");

    </script>
</body>
</html>
