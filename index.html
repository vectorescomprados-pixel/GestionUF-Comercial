<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>GestiónUF Pro - Enterprise Gold V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* BOTÓN HOME */
        .btn-home-fixed {
            position: fixed !important; bottom: 30px !important; right: 25px !important;
            z-index: 9999; background: #2563eb !important;
            color: white !important; width: 65px; height: 65px; border-radius: 50%;
            display: flex !important; align-items: center; justify-content: center;
            text-decoration: none; box-shadow: 0 8px 25px rgba(0,0,0,0.5); border: 3px solid #ffffff;
        }

        /* HEADER */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 4px solid var(--primary); border-radius: 0 0 20px 20px; }
        .content-body { margin-top: 380px; width: 100%; padding-bottom: 120px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 48px; border-radius: 12px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; text-transform: uppercase; gap: 5px; }
        .primary { background: #2563eb; } .danger { background: #e11d48; } .orange { background: #f97316; } .warning { background: #f59e0b; color: #000; } .ghost { background: #475569; }

        /* LOG PANEL */
        #log-container { background: #000; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-family: monospace; font-size: 10px; height: 100px; overflow-y: auto; border: 1px solid #333; }
        .log-success { color: #00ff41; } .log-info { color: #00d4ff; } .log-err { color: #ff3131; }

        /* CARDS */
        .item { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; border-left: 10px solid var(--success); }
        .item.no-phone { border-left: 10px solid var(--warning) !important; }
        .item b { font-size: 18px; color: #3b82f6; display: block; }
        .item small { font-size: 14px; color: var(--text); opacity: 0.7; }
        .details { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #4b5563; font-size: 13px; line-height: 1.6; }
        
        input { width: 100%; height: 50px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); font-size: 16px; outline: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; width: 92%; max-width: 400px; border: 1px solid var(--border); text-align: center; }
    </style>
</head>
<body>

    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="btn-home-fixed">
        <i class="fas fa-home" style="font-size: 28px;"></i>
    </a>

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:#2563eb">GestiónUF Acceso</h2>
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content">
            <h3>Seguridad Requerida</h3>
            <p id="confirm-msg" style="margin:10px 0; font-size:13px; opacity:0.8"></p>
            <input id="confirm-pass" type="password" placeholder="Clave Administrativa">
            <div style="display:flex; gap:10px">
                <button id="btn-confirm-yes" class="btn primary" style="flex:1">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger" style="flex:1">VOLVER</button>
            </div>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div style="font-size:10px; text-align:center; margin-bottom:12px; color:var(--success);">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn primary">LOGS</button>
                <button id="btn-theme" class="btn primary">TEMA</button>
                <button id="btn-logout" class="btn danger">CERRAR</button>
            </div>
            
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import-trigger" class="btn primary">IMPORTAR</button>
                <button id="btn-export" class="btn primary">RESPALDO</button>
            </div>

            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-sd" class="btn warning">SIN DATOS</button>
            </div>
            
            <button id="btn-delete-all" class="btn danger" style="width: 100%; height: 35px; font-size: 9px; margin-top:5px;">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden"></div>
            <div id="list"></div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-bottom:15px">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 0001)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div style="display: flex; gap: 10px;">
                <button id="btn-save" class="btn primary" style="flex:1">GUARDAR</button>
                <button id="btn-cancel" class="btn danger" style="flex:1">DESCARTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let departamentos = [], editId = null, expandedId = null, pendingAction = null;
        const MASTER_CODE = "1131552679";

        const writeLog = (msg, type = 'success') => {
            const container = document.getElementById("log-container");
            container.innerHTML += `<div class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            container.scrollTop = container.scrollHeight;
        };

        // LOGIN
        document.getElementById("btn-login").onclick = () => {
            if (document.getElementById("login-pass").value === "4750" || document.getElementById("login-pass").value === MASTER_CODE) {
                localStorage.setItem("uf_auth", "true");
                location.reload();
            } else { alert("Clave Incorrecta"); }
        };

        if (localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
                writeLog("Sincronización completa", "info");
            });
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const tp = String(d.TelefonoPropietario || "").trim();
                const ti = String(d.TelefonoInquilino || "").trim();
                const sinContacto = (!tp && !ti);

                const div = document.createElement("div");
                div.className = `item ${sinContacto ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <b>UF: ${d.UF}</b>
                            <small>${d.Propietario || 'S/D'}</small>
                        </div>
                        <div style="display:flex; gap:18px; font-size:20px">
                            <i class="fas fa-eye" style="color:#d1d5db" onclick="window.toggleExpand('${d.id}')"></i>
                            <i class="fas fa-edit" style="color:#3b82f6" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:#ef4444" onclick="window.askConfirm('¿Borrar registro UF ${d.UF}?', 'delete', '${d.id}')"></i>
                        </div>
                    </div>
                    ${expandedId === d.id ? `
                        <div class="details">
                            <p><strong>Tel Prop:</strong> ${tp || 'N/C'}</p>
                            <p><strong>Inq:</strong> ${d.Inquilino || '-'}</p>
                            <p><strong>Tel Inq:</strong> ${ti || 'N/C'}</p>
                        </div>
                    ` : ''}
                `;
                list.appendChild(div);
            });
        }

        // --- FUNCIONALIDADES DE BOTONES HEADER ---
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        
        document.getElementById("btn-theme").onclick = () => {
            document.body.classList.toggle("light-mode");
            writeLog("Cambio de tema visual", "info");
        };

        document.getElementById("btn-search").onclick = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            const res = departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v));
            render(res);
            writeLog(`Búsqueda: "${v}"`, "info");
        };

        document.getElementById("btn-clear").onclick = () => {
            document.getElementById("search-input").value = "";
            render(departamentos);
            writeLog("Filtros limpiados", "info");
        };

        document.getElementById("btn-filter-sd").onclick = () => {
            const vacios = departamentos.filter(d => !String(d.TelefonoPropietario||"").trim() && !String(d.TelefonoInquilino||"").trim());
            render(vacios);
            writeLog(`Filtrado: ${vacios.length} sin datos`, "warn");
        };

        // --- IMPORTACIÓN / EXPORTACIÓN ---
        document.getElementById("btn-import-trigger").onclick = () => document.getElementById("csv-file").click();
        
        document.getElementById("csv-file").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const batch = writeBatch(db);
                const lines = ev.target.result.split("\n").slice(1);
                lines.forEach(l => {
                    if(!l.trim()) return;
                    const p = l.split(',');
                    batch.set(doc(collection(db, "departamentos")), {
                        UF: p?.trim() || "0000", Propietario: p?.trim() || "", TelefonoPropietario: p?.trim() || "",
                        Inquilino: p?.trim() || "", TelefonoInquilino: p?.trim() || ""
                    });
                });
                await batch.commit();
                writeLog("Importación masiva exitosa", "success");
            };
            reader.readAsText(e.target.files);
        };

        document.getElementById("btn-export").onclick = () => {
            const csv = "UF,Propietario,TelProp,Inquilino,TelInq\n" + departamentos.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Respaldo_UF.csv"; a.click();
            writeLog("Respaldo descargado", "success");
        };

        // --- SEGURIDAD ---
        window.askConfirm = (msg, type, id = null) => {
            pendingAction = { type, id };
            document.getElementById("confirm-msg").innerText = msg;
            document.getElementById("confirm-pass").value = "";
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value !== MASTER_CODE) return alert("Clave Incorrecta");
            document.getElementById("modal-confirm").classList.add("hidden");

            if(pendingAction.type === 'delete') {
                await deleteDoc(doc(db, "departamentos", pendingAction.id));
                writeLog("Registro eliminado", "err");
            } else if(pendingAction.type === 'deleteAll') {
                const s = await getDocs(collection(db, "departamentos"));
                const b = writeBatch(db); s.forEach(d => b.delete(d.ref)); await b.commit();
                writeLog("BASE DE DATOS VACIADA", "err");
            }
        };

        document.getElementById("btn-confirm-no").onclick = () => document.getElementById("modal-confirm").classList.add("hidden");

        // GESTIÓN
        window.toggleExpand = (id) => { expandedId = (expandedId === id) ? null : id; render(departamentos); };
        window.editUF = (id) => {
            const d = departamentos.find(x => x.id === id);
            editId = id;
            document.getElementById("f-uf").value = d.UF;
            document.getElementById("f-prop").value = d.Propietario || "";
            document.getElementById("f-telp").value = d.TelefonoPropietario || "";
            document.getElementById("f-inq").value = d.Inquilino || "";
            document.getElementById("f-teli").value = d.TelefonoInquilino || "";
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const d = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            if(editId) await updateDoc(doc(db, "departamentos", editId), d);
            else await addDoc(collection(db, "departamentos"), d);
            document.getElementById("modal-form").classList.add("hidden");
            writeLog(`UF ${d.UF} guardada`, "success");
        };

        document.getElementById("btn-add").onclick = () => { editId = null; document.querySelectorAll("#modal-form input").forEach(i => i.value = ""); document.getElementById("modal-form").classList.remove("hidden"); };
        document.getElementById("btn-cancel").onclick = () => document.getElementById("modal-form").classList.add("hidden");
        document.getElementById("btn-logout").onclick = () => { localStorage.removeItem("uf_auth"); location.reload(); };
        document.getElementById("btn-delete-all").onclick = () => askConfirm("¡PELIGRO! Esto borrará todos los datos.", "deleteAll");
    </script>
</body>
</html>
