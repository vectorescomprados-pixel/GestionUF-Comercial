<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise V3.9.2</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; --ghost: #4a5568; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; }
        
        /* Bloqueo de pull-to-refresh en Android */
        html, body { overscroll-behavior-y: contain; margin: 0; padding: 0; }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .content-body { margin-top: 395px; width: 100%; padding-bottom: 100px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: var(--ghost); } .warning { background: var(--warning); color: #000; }
        
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; border: 2px solid white; display: none; align-items: center; justify-content: center; }
        
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .item.no-phone { border-left: 8px solid var(--warning) !important; }
        
        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--card); color: var(--text); font-size: 16px; }
        
        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 110px; overflow-y: auto; border-radius: 8px; font-family: monospace; border: 1px solid #333; color: #00ff41; margin-bottom: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>
    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
            <!-- Botón restaurado -->
            <button id="btn-create-user-trigger" class="btn ghost" style="width:100%; margin-top:10px">GESTIÓN ACCESOS</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:11px; text-align:center; margin-bottom:10px; color:var(--success); font-weight:bold;">● EN LÍNEA - SISTEMA PROTEGIDO</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import-trigger" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">UF DISPONIBLES</button>
            </div>
            <button id="btn-delete-all" class="btn danger admin-only" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden"><div id="log-panel"></div></div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL FORMULARIO UF -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title" style="text-align:center; margin-bottom:15px">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMACIÓN CLAVE -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3 id="confirm-msg">Autorización</h3>
            <input id="confirm-pass" type="password" placeholder="Clave Maestra" style="margin-top:15px">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], pendingAction = null, editUfId = null;
        const MASTER_CODE = "1131552679";
        const userRole = localStorage.getItem("uf_user_role") || "operador";

        // --- ANTI ACTUALIZACIÓN POR ERROR ---
        window.addEventListener('beforeunload', (e) => {
            if (localStorage.getItem("uf_auth") === "true") {
                e.preventDefault();
                e.returnValue = '¿Estás seguro de que quieres salir? Los datos no guardados se perderán.';
            }
        });

        const writeLog = (m, type='info') => {
            const lp = document.getElementById("log-panel");
            if(lp) { lp.innerHTML += `<div style="color:${type==='err'?'#f44':'#0f4'}">[${new Date().toLocaleTimeString()}] ${m}</div>`; lp.scrollTop = lp.scrollHeight; }
        };

        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                const tel = String(d.TelefonoPropietario || "").trim() || String(d.TelefonoInquilino || "").trim();
                const div = document.createElement("div");
                div.className = `item ${!tel ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || '---'}</small></div>
                        <div style="display:flex; gap:18px; font-size:18px">
                            <i class="fas fa-eye" style="cursor:pointer" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary); cursor:pointer" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash ${userRole==='admin'?'':'hidden'}" style="color:var(--danger); cursor:pointer" onclick="window.askConfirm('¿Borrar UF ${d.UF}?','deleteUf','${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px dashed #444; padding-top:10px">
                        <p>P: ${d.Propietario||'--'} | T: ${d.TelefonoPropietario||'--'}</p>
                        <p>I: ${d.Inquilino||'--'} | T: ${d.TelefonoInquilino||'--'}</p>
                        <div class="grid-btns-2">
                            <a href="tel:${tel}" class="btn primary" style="text-decoration:none">LLAMAR</a>
                            <a href="https://wa.me/${tel.replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e; text-decoration:none">WHATSAPP</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- AUTH ---
        const login = async () => {
            const u = document.getElementById("login-user").value, p = document.getElementById("login-pass").value;
            const snap = await getDocs(query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p)));
            if (!snap.empty) {
                localStorage.setItem("uf_auth", "true");
                localStorage.setItem("uf_user_role", snap.docs[0].data().role);
                location.reload();
            } else alert("Datos incorrectos");
        };
        document.getElementById("btn-login").onclick = login;
        document.getElementById("login-pass").onkeyup = (e) => e.key === "Enter" && login();
        
        // El botón ahora dispara una confirmación o acción
        document.getElementById("btn-create-user-trigger").onclick = () => {
            const code = prompt("Ingrese Clave Maestra para gestionar accesos:");
            if(code === MASTER_CODE) alert("Módulo de usuarios habilitado (Aquí podrías abrir otro formulario)");
        };

        // --- BUSCADOR ENTER ---
        document.getElementById("search-input").onkeyup = (e) => {
            if(e.key === "Enter") {
                const v = e.target.value.toLowerCase();
                render(departamentos.filter(d => d.UF.toLowerCase().includes(v) || (d.Propietario||"").toLowerCase().includes(v)));
            }
        };

        // --- UI ACTIONS ---
        document.getElementById("btn-add").onclick = () => {
            editUfId = null;
            document.querySelectorAll("#modal-form input").forEach(i => i.value = "");
            document.getElementById("form-title").innerText = "Nueva Unidad";
            document.getElementById("modal-form").classList.remove("hidden");
        };

        window.editUF = (id) => {
            editUfId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; 
            document.getElementById("f-prop").value = d.Propietario || "";
            document.getElementById("f-telp").value = d.TelefonoPropietario || "";
            document.getElementById("f-inq").value = d.Inquilino || "";
            document.getElementById("f-teli").value = d.TelefonoInquilino || "";
            document.getElementById("form-title").innerText = "Editando UF " + d.UF;
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const d = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            editUfId ? await updateDoc(doc(db, "departamentos", editUfId), d) : await addDoc(collection(db, "departamentos"), d);
            document.getElementById("modal-form").classList.add("hidden");
        };

        document.getElementById("btn-logout-trigger").onclick = () => {
            if(confirm("¿Cerrar sesión?")) { localStorage.clear(); location.reload(); }
        };

        document.getElementById("btn-theme").onclick = () => document.body.classList.toggle("light-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");

        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            if(userRole !== 'admin') document.querySelectorAll(".admin-only").forEach(el => el.classList.add("hidden"));
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        // Helpers de cierre de modales
        document.querySelectorAll("#btn-cancel, #btn-confirm-no").forEach(b => b.onclick = () => document.querySelectorAll(".modal").forEach(m => m.id!=="login-screen" && m.classList.add("hidden")));
    </script>
</body>
</html>
