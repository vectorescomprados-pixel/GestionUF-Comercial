<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V4.8 Gold Blindada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --ghost: #3b4a54; --warning: #f59e0b; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; --ghost: #d1d5db; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 20px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .content-body { margin-top: 485px; width: 100%; padding-bottom: 50px; }

        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { height: 44px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .primary { background: #1d4ed8; } .danger { background: #e11d48; } .ghost { background: var(--ghost); color: var(--text); } .warning { background: #f59e0b; color: #000; }

        input { width: 100%; height: 46px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: #1c272f; color: white; font-size: 15px; }

        /* REGISTROS BLINDADOS */
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 6px solid #111b21; }
        .item.no-data { border-left-color: var(--warning); }
        .item b { color: #2563eb; font-size: 16px; display: block; }
        .actions-icons { display: flex; gap: 18px; font-size: 18px; }
        .fa-eye { color: #e9edef; } .fa-edit { color: #2563eb; } .fa-trash { color: #e11d48; }

        /* MODALES ESTILO FOTO (AZUL/ROJO) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1c272f; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; color: white; }
        .modal-content h3 { font-size: 20px; margin-bottom: 5px; }
        .modal-content p { font-size: 14px; opacity: 0.8; margin-bottom: 20px; }
        
        /* BOTÓN COHETE */
        #rocket { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: white; border: 2px solid white; display: none; z-index: 2000; cursor: pointer; }

        /* CONSOLA */
        #log-container { background: #000; border-radius: 10px; margin-top: 10px; border: 1px solid #333; height: 100px; overflow: hidden; position: relative; }
        #log-panel { padding: 10px; font-size: 10px; height: 100%; overflow-y: auto; font-family: monospace; color: #0f0; }
    </style>
</head>
<body>

    <button id="rocket"><i class="fas fa-rocket"></i></button>

    <!-- MODAL SEGURIDAD (PARA TODO EL SISTEMA) -->
    <div id="modal-auth" class="modal hidden">
        <div class="modal-content">
            <h3 id="auth-title">Seguridad Requerida</h3>
            <p id="auth-desc">¿Borrar registro UF 0002?</p>
            <input id="auth-pass" type="password" placeholder="Clave Administrativa">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="auth-confirm" class="btn primary">AUTORIZAR</button>
                <button onclick="closeModals()" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL -->
    <div id="main-screen" class="wrap">
        <div class="main-header">
            <div style="text-align:center; font-size:10px; color:#22c55e; margin-bottom:10px; font-weight:bold;">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-hist-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-tema-toggle" class="btn ghost">TEMA</button>
                <button id="btn-cerrar-app" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-nueva-uf" class="btn primary">NUEVA UF</button>
                <button id="btn-importar" class="btn ghost">IMPORTAR</button>
                <button id="btn-respaldo" class="btn ghost">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-buscar" class="btn primary">BUSCAR</button>
                <button id="btn-limpiar" class="btn ghost">LIMPIAR</button>
                <button id="btn-sin-datos" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-wipe" class="btn danger" style="width:100%; margin-bottom:10px;">BORRAR TODA LA NUBE</button>
            
            <div id="log-container" class="hidden">
                <div id="log-panel"></div>
            </div>
        </div>

        <div class="content-body" id="list"></div>
    </div>

    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], pendingAction = null;
        const PASS = "1131552679";

        const log = (m) => { document.getElementById("log-panel").innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; };

        // COHETE Y SCROLL
        window.onscroll = () => { document.getElementById("rocket").style.display = window.scrollY > 300 ? "block" : "none"; };
        document.getElementById("rocket").onclick = () => window.scrollTo({top:0, behavior:'smooth'});

        // RENDERIZADO BLINDADO
        onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
            departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render(departamentos);
        });

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const sinDatos = !d.TelefonoPropietario && !d.TelefonoInquilino;
                const div = document.createElement("div");
                div.className = `item ${sinDatos ? 'no-data' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; width:100%; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || '---'}</small></div>
                        <div class="actions-icons">
                            <i class="fas fa-eye" onclick="alert('Datos: ${d.Propietario}')"></i>
                            <i class="fas fa-edit"></i>
                            <i class="fas fa-trash" onclick="askAuth('delete', '${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // LÓGICA DE LIMPIEZA
        document.getElementById("btn-limpiar").onclick = () => {
            document.getElementById("search-input").value = "";
            render(departamentos);
            log("Filtros limpiados");
        };

        // MODALES DE SEGURIDAD (AZUL/ROJO)
        window.askAuth = (type, id, uf) => {
            pendingAction = { type, id, uf };
            document.getElementById("auth-title").innerText = "Seguridad Requerida";
            document.getElementById("auth-desc").innerText = type === 'delete' ? `¿Borrar registro UF ${uf}?` : "¿Vaciar toda la base de datos?";
            document.getElementById("auth-pass").value = "";
            document.getElementById("modal-auth").classList.remove("hidden");
        };

        document.getElementById("auth-confirm").onclick = async () => {
            if(document.getElementById("auth-pass").value === PASS) {
                if(pendingAction.type === 'delete') {
                    await deleteDoc(doc(db, "departamentos", pendingAction.id));
                    log(`UF ${pendingAction.uf} eliminada`);
                } else if(pendingAction.type === 'wipe') {
                    const snap = await getDocs(collection(db, "departamentos"));
                    const batch = writeBatch(db);
                    snap.forEach(d => batch.delete(d.ref));
                    await batch.commit();
                    log("Base de datos vaciada");
                }
                closeModals();
            } else {
                alert("Clave incorrecta");
            }
        };

        document.getElementById("btn-wipe").onclick = () => askAuth('wipe');
        document.getElementById("btn-cerrar-app").onclick = () => { if(confirm("¿Cerrar sesión?")) location.reload(); };
        
        // IMPORTAR
        document.getElementById("btn-importar").onclick = () => document.getElementById("csv-file").click();
        document.getElementById("csv-file").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const rows = ev.target.result.split("\n").slice(1);
                const batch = writeBatch(db);
                rows.forEach(r => {
                    const c = r.split(",");
                    if(c[0]) batch.set(doc(collection(db, "departamentos")), {UF:c[0], Propietario:c[1], TelefonoPropietario:c[2], Inquilino:c[3], TelefonoInquilino:c[4]});
                });
                await batch.commit(); log("Importación exitosa");
            };
            reader.readAsText(e.target.files[0]);
        };

        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
        document.getElementById("btn-hist-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-tema-toggle").onclick = () => document.body.classList.toggle("light-mode");

    </script>
</body>
</html>
