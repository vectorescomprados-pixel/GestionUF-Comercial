<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Restauración Estética</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b141a; 
            --card: #1c272f; 
            --primary: #0081fb; 
            --danger: #ef4444; 
            --orange: #f97316;
            --text: #e9edef; 
            --border: #222d34; 
        }
        
        body { background: #0b141a; color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; }
        .wrap { width: 95%; max-width: 450px; padding: 10px; }
        .hidden { display: none !important; }

        /* MODAL LOGIN - ESTILO LIMPIO */
        .modal-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* CABECERA SEGÚN TU FOTO */
        .header-container { 
            background: #111b21; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #0081fb; 
            box-shadow: 0 0 15px rgba(0,129,251,0.3);
            margin-bottom: 20px;
        }
        
        .status-label { color: #22c55e; font-size: 10px; font-weight: bold; text-align: center; margin-bottom: 15px; letter-spacing: 1px; }

        /* GRID DE BOTONES IDÉNTICO A LA FOTO */
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
        
        .btn { 
            height: 50px; border-radius: 12px; border: none; color: white; 
            font-weight: bold; font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .btn-blue { background: #0081fb; }
        .btn-dark { background: #3b4a54; }
        .btn-orange { background: #f97316; }
        .btn-red { background: #ef4444; width: 100%; margin-top: 5px; }
        .btn:active { transform: scale(0.95); }

        /* BUSCADOR */
        .search-box { 
            background: #2a3942; border: 1px solid #444; border-radius: 10px;
            width: 100%; height: 45px; padding: 0 15px; color: white;
            margin-bottom: 12px; font-size: 14px;
        }

        /* INPUTS LOGIN */
        .input-login {
            width: 100%; height: 45px; background: #2a3942; border: 1px solid #444;
            border-radius: 10px; padding: 0 15px; color: white; margin-bottom: 15px;
        }

        /* LISTADO */
        .item-uf { 
            background: #111b21; padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; border-left: 5px solid #0081fb;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE ENTRADA -->
    <div id="login-screen" class="modal-login">
        <div class="login-box">
            <h2 style="color:#0081fb; margin-bottom:20px">GestiónUF Pro</h2>
            <input id="login-user" class="input-login" placeholder="Usuario">
            <input id="login-pass" class="input-login" type="password" placeholder="Contraseña">
            <button id="btn-entrar" class="btn btn-blue" style="width:100%">ENTRAR</button>
            <button id="btn-soporte" class="btn btn-dark" style="width:100%; margin-top:10px; font-size:9px">SOPORTE TÉCNICO</button>
        </div>
    </div>

    <!-- APP PRINCIPAL (Oculta hasta loguear) -->
    <div id="main-app" class="wrap hidden">
        
        <div class="header-container">
            <div class="status-label">SISTEMA ACTIVO</div>
            
            <!-- Fila 1 -->
            <div class="grid-btns">
                <button class="btn btn-dark">HISTORIAL</button>
                <button class="btn btn-dark">TEMA</button>
                <button id="btn-salir" class="btn btn-orange">SALIR</button>
            </div>

            <!-- Fila 2 -->
            <div class="grid-btns">
                <button class="btn btn-blue">NUEVA UF</button>
                <button class="btn btn-dark">IMPORTAR</button>
                <button class="btn btn-dark">RESPALDO</button>
            </div>

            <!-- Buscador -->
            <input class="search-box" placeholder="Buscar por UF o Nombre...">

            <!-- Fila 3 -->
            <div class="grid-btns">
                <button class="btn btn-blue">BUSCAR</button>
                <button class="btn btn-dark">LIMPIAR</button>
                <button class="btn" style="background:white; color:black">SIN DATOS</button>
            </div>

            <!-- Botón Final -->
            <button id="btn-vaciar" class="btn btn-red">VACIAR NUBE</button>
        </div>

        <!-- Contenedor de lista -->
        <div id="lista-uf">
            <!-- Ejemplo de item -->
            <div class="item-uf">
                <b style="color:#0081fb">UF: 0001</b><br>
                <small style="color:#888">Cargando datos...</small>
            </div>
        </div>

    </div>

    <script>
        const btnEntrar = document.getElementById('btn-entrar');
        const btnSalir = document.getElementById('btn-salir');
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');

        // Lógica de Login
        const login = () => {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            
            if(u === "admin" && p === "admin") {
                localStorage.setItem("uf_sesion", "activa");
                mostrarApp();
            } else {
                alert("Usuario o Contraseña incorrectos");
            }
        };

        const mostrarApp = () => {
            loginScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
        };

        // Persistencia
        if(localStorage.getItem("uf_sesion") === "activa") {
            mostrarApp();
        }

        // Eventos
        btnEntrar.onclick = login;
        document.getElementById('login-pass').onkeypress = (e) => { if(e.key === 'Enter') login(); };
        
        btnSalir.onclick = () => {
            localStorage.removeItem("uf_sesion");
            location.reload();
        };

        document.getElementById('btn-soporte').onclick = () => {
            const master = prompt("Ingrese Código Maestro:");
            if(master === "1131552679") {
                alert("Acceso Temporal: admin / admin");
            }
        };
    </script>
</body>
</html>
