<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Enterprise Gold V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; }
        input, select { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: var(--bg); color: var(--text); }
        .user-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
        #log-panel { background: #000; padding: 10px; font-size: 10px; height: 100px; overflow-y: auto; color: #00ff41; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body class="dark-mode">

    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">Acceso al Sistema</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary">ENTRAR</button>
            <button id="btn-create-user-trigger" class="btn ghost">GESTIONAR ACCESOS</button>
        </div>
    </div>

    <div id="modal-create-user" class="modal hidden">
        <div class="modal-content">
            <h3 id="user-form-title">Registrar Acceso</h3>
            <input id="new-username" placeholder="Usuario">
            <input id="new-password" placeholder="Contraseña">
            <select id="new-role">
                <option value="operador">Operador</option>
                <option value="admin">Administrador</option>
            </select>
            <button id="btn-save-user" class="btn primary">GUARDAR USUARIO</button>
            <button id="btn-cancel-user" class="btn danger">CERRAR</button>
            <div id="user-db-list" style="margin-top:20px"></div>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div style="padding: 20px; background: var(--card); border-radius: 0 0 15px 15px;">
            <h3>Panel Gestión UF</h3>
            <button id="btn-logout" class="btn danger">CERRAR SESIÓN</button>
            <div id="log-panel"></div>
        </div>
        <div id="list" style="margin-top:20px"></div>
    </div>

    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content">
            <h3>Validar Clave Maestra</h3>
            <input id="confirm-pass" type="password" placeholder="Clave Maestra">
            <button id="btn-confirm-yes" class="btn primary">CONFIRMAR</button>
            <button id="btn-confirm-no" class="btn ghost">CANCELAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", 
            authDomain: "gestionuf-remoto.firebaseapp.com", 
            projectId: "gestionuf-remoto", 
            storageBucket: "gestionuf-remoto.firebasestorage.app", 
            messagingSenderId: "724452752860", 
            appId: "1:724452752860:web:4d25585addcdcbd146e319" 
        };

        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        
        const MASTER_CODE = "1131552679";
        let usuariosDB = [], editUserId = null, pendingAction = null;

        const writeLog = (msg) => {
            const lp = document.getElementById("log-panel");
            if(lp) lp.innerHTML += `<div>> ${msg}</div>`;
        };

        // --- GESTIÓN DE USUARIOS ---
        const loadUsers = () => {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                usuariosDB = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const list = document.getElementById("user-db-list");
                list.innerHTML = "<h4>Usuarios actuales:</h4>";
                usuariosDB.forEach(u => {
                    const row = document.createElement("div");
                    row.className = "user-row";
                    row.innerHTML = `<span>${u.usuario} (${u.role})</span>
                        <div>
                            <i class="fas fa-edit" onclick="window.editUser('${u.id}')" style="margin-right:10px; color:var(--primary)"></i>
                            <i class="fas fa-trash" onclick="window.askConfirm('Borrar usuario?', 'delUser', '${u.id}')" style="color:var(--danger)"></i>
                        </div>`;
                    list.appendChild(row);
                });
            });
        };

        window.editUser = (id) => {
            const u = usuariosDB.find(x => x.id === id);
            editUserId = id;
            document.getElementById("new-username").value = u.usuario;
            document.getElementById("new-password").value = u.password;
            document.getElementById("new-role").value = u.role;
            document.getElementById("user-form-title").innerText = "Editando Usuario";
        };

        document.getElementById("btn-save-user").onclick = async () => {
            const u = document.getElementById("new-username").value.trim();
            const p = document.getElementById("new-password").value.trim();
            const r = document.getElementById("new-role").value;
            if(!u || !p) return alert("Completa los datos");

            try {
                if(editUserId) {
                    await updateDoc(doc(db, "usuarios", editUserId), { usuario: u, password: p, role: r });
                    editUserId = null;
                } else {
                    await addDoc(collection(db, "usuarios"), { usuario: u, password: p, role: r });
                }
                alert("Usuario guardado correctamente");
                document.querySelectorAll("#modal-create-user input").forEach(i => i.value = "");
                document.getElementById("user-form-title").innerText = "Registrar Acceso";
            } catch (e) { alert("Error al guardar: " + e.message); }
        };

        // --- LOGIN REFORZADO ---
        document.getElementById("btn-login").onclick = async () => {
            const uInput = document.getElementById("login-user").value.trim();
            const pInput = document.getElementById("login-pass").value.trim();

            if(!uInput || !pInput) return alert("Por favor, ingrese usuario y contraseña");

            try {
                // Buscamos el usuario en la nube
                const q = query(collection(db, "usuarios"), where("usuario", "==", uInput));
                const snap = await getDocs(q);

                if (snap.empty) {
                    return alert("El usuario '" + uInput + "' no existe en la base de datos.");
                }

                let accesoConcedido = false;
                snap.forEach((doc) => {
                    const data = doc.data();
                    if(data.password === pInput) {
                        accesoConcedido = true;
                        localStorage.setItem("uf_auth", "true");
                        localStorage.setItem("uf_user_role", data.role);
                        location.reload();
                    }
                });

                if(!accesoConcedido) alert("Contraseña incorrecta para el usuario " + uInput);

            } catch (error) {
                console.error(error);
                alert("ERROR DE CONEXIÓN: " + error.code + "\nVerifica que las Reglas de Firebase permitan la lectura.");
            }
        };

        // --- CLAVE MAESTRA ---
        window.askConfirm = (msg, type, id = null) => {
            pendingAction = { type, id };
            document.getElementById("confirm-pass").value = "";
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value !== MASTER_CODE) return alert("Clave Maestra incorrecta");
            
            document.getElementById("modal-confirm").classList.add("hidden");
            if(pendingAction.type === 'openUserForm') {
                document.getElementById("modal-create-user").classList.remove("hidden");
                loadUsers();
            } else if(pendingAction.type === 'delUser') {
                await deleteDoc(doc(db, "usuarios", pendingAction.id));
            }
        };

        // --- ESTADO DE SESIÓN ---
        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            writeLog("Sesión iniciada como " + localStorage.getItem("uf_user_role"));
        }

        document.getElementById("btn-create-user-trigger").onclick = () => window.askConfirm("Acceso a Gestión de Usuarios", "openUserForm");
        document.getElementById("btn-logout").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("btn-cancel-user").onclick = () => document.getElementById("modal-create-user").classList.add("hidden");
        document.getElementById("btn-confirm-no").onclick = () => document.getElementById("modal-confirm").classList.add("hidden");

    </script>
</body>
</html>
