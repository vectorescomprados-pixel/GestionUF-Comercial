<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Restaurado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* TUS ESTILOS ORIGINALES DE LA FOTO 1 */
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; }
        .hidden { display: none !important; }
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 2px solid var(--primary); }
        .content-body { margin-top: 360px; padding-bottom: 50px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
        .btn { height: 40px; border-radius: 6px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #334155; } .warning { background: var(--warning); color: #000; }
        .item { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
        .item.no-phone { border-left: 5px solid var(--warning); }
        input { width: 100%; height: 40px; margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border); padding: 0 10px; background: #1d2a33; color: #fff; }
        #log-panel { background: #000; padding: 10px; font-size: 10px; height: 100px; overflow-y: auto; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:15px">ACCESO</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="conn-status" style="font-size:10px; text-align:center; color:var(--success); margin-bottom:5px">● EN LÍNEA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-users-manage" class="btn warning admin-only">USUARIOS</button>
                <button id="btn-logout" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-delete-all" class="btn danger admin-only" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-panel" class="hidden"></div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL CONFIRMACIÓN (BOTÓN CERRAR ARREGLADO) -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content">
            <h3 id="confirm-msg" style="text-align:center"></h3>
            <input id="confirm-pass" type="password" placeholder="Clave de Seguridad" style="margin-top:10px">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px">
                <button id="btn-confirm-yes" class="btn primary">ACEPTAR</button>
                <button onclick="document.getElementById('modal-confirm').classList.add('hidden')" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL FORMULARIO UF -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Datos UF</h3>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Tel. Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Tel. Inquilino">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button onclick="document.getElementById('modal-form').classList.add('hidden')" class="btn ghost">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], editId = null, pendingAction = null;
        const MASTER = "1131552679";

        // --- CORRECCIÓN: EVENTO ENTER EN LOGIN ---
        document.getElementById("login-pass").onkeypress = (e) => { if(e.key === 'Enter') login(); };
        document.getElementById("btn-login").onclick = login;

        async function login() {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(p === MASTER) { start("admin"); return; }
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) start(snap.docs[0].data().role);
            else alert("Credenciales incorrectas");
        }

        function start(role) {
            sessionStorage.setItem("role", role);
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            if(role === "operador") document.querySelectorAll(".admin-only").forEach(el => el.remove());
            loadData();
        }

        function loadData() {
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
        }

        // --- CORRECCIÓN: ICONOS DE LLAMADA Y WHATSAPP ---
        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                const sinDatos = !d.TelefonoPropietario && !d.TelefonoInquilino;
                const div = document.createElement("div");
                div.className = `item ${sinDatos ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:12px; font-size:16px">
                            <i class="fas fa-eye" onclick="toggleDet('${d.id}')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="openEdit('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger)" onclick="askDel('${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; border-top:1px solid #222; padding-top:10px; font-size:13px">
                        <p>Prop: ${d.Propietario} 
                           <a href="tel:${d.TelefonoPropietario}"><i class="fas fa-phone" style="margin-left:10px; color:var(--success)"></i></a>
                           <a href="https://wa.me/${d.TelefonoPropietario}"><i class="fab fa-whatsapp" style="margin-left:10px; color:var(--success)"></i></a>
                        </p>
                        <p>Inq: ${d.Inquilino} 
                           <a href="tel:${d.TelefonoInquilino}"><i class="fas fa-phone" style="margin-left:10px; color:var(--success)"></i></a>
                           <a href="https://wa.me/${d.TelefonoInquilino}"><i class="fab fa-whatsapp" style="margin-left:10px; color:var(--success)"></i></a>
                        </p>
                    </div>`;
                list.appendChild(div);
            });
        }

        // --- CORRECCIÓN: BUSCAR Y SIN DATOS ---
        const search = () => {
            const val = document.getElementById("search-input").value.toLowerCase();
            const filtered = departamentos.filter(d => d.UF.toLowerCase().includes(val) || d.Propietario.toLowerCase().includes(val));
            render(filtered);
        };
        document.getElementById("btn-search").onclick = search;
        document.getElementById("search-input").onkeyup = (e) => { if(e.key === 'Enter') search(); };
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(departamentos); };
        document.getElementById("btn-filter-empty").onclick = () => {
            const empty = departamentos.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino);
            render(empty);
        };

        // --- CORRECCIÓN: HISTORIAL (LOGS) ---
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-panel").classList.toggle("hidden");

        // --- FUNCIONES DE BOTONES RESTANTES ---
        window.toggleDet = (id) => document.getElementById(`det-${id}`).classList.toggle("hidden");
        window.openEdit = (id) => {
            editId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario; document.getElementById("f-inq").value = d.Inquilino;
            document.getElementById("f-teli").value = d.TelefonoInquilino;
            document.getElementById("modal-form").classList.remove("hidden");
        };
        document.getElementById("btn-add").onclick = () => { editId = null; document.getElementById("modal-form").classList.remove("hidden"); };
        document.getElementById("btn-save").onclick = async () => {
            const data = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            if(editId) await updateDoc(doc(db, "departamentos", editId), data);
            else await addDoc(collection(db, "departamentos"), data);
            document.getElementById("modal-form").classList.add("hidden");
        };

        window.askDel = (id, uf) => { pendingAction = id; document.getElementById("confirm-msg").innerText = `¿Borrar UF ${uf}?`; document.getElementById("modal-confirm").classList.remove("hidden"); };
        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value === MASTER) {
                await deleteDoc(doc(db, "departamentos", pendingAction));
                document.getElementById("modal-confirm").classList.add("hidden");
            } else alert("Clave Incorrecta");
        };

        // --- BOTÓN CERRAR SESIÓN ---
        document.getElementById("btn-logout").onclick = () => location.reload();
    </script>
</body>
</html>
