<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V2.3 Platinum</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; --blue-text: #3b82f6; }
        body.dark-mode { --bg: #0b141a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        /* HEADER */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: #111b21; z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .content-body { margin-top: 390px; width: 100%; padding-bottom: 100px; }
        
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; text-decoration: none; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #334155; } .warning { background: var(--warning); color: #000; }
        
        /* BARRA DE PROGRESO */
        #import-progress { width: 100%; height: 5px; background: #333; margin-bottom: 10px; border-radius: 10px; overflow: hidden; display: none; }
        #progress-fill { width: 0%; height: 100%; background: var(--success); transition: width 0.3s; }

        /* TARJETA SEGÚN FOTO */
        .item { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); width: 100%; position: relative; }
        .item.no-phone { border-left: 5px solid var(--warning) !important; }
        .item b.uf-title { font-size: 18px; color: var(--blue-text); display: block; margin-bottom: 4px; }
        .item .prop-name { font-size: 16px; font-weight: 500; margin-bottom: 10px; display: block; }
        
        .details-box { border-top: 1px dashed #334155; margin-top: 12px; padding-top: 12px; text-align: left; }
        .label-blue { color: var(--blue-text); font-weight: bold; font-size: 15px; display: block; margin-top: 8px; }
        .val-text { font-size: 15px; margin-bottom: 4px; display: block; color: #e9edef; }
        
        #btn-rocket { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; border: 2px solid white; display: none; }

        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); padding: 0 15px; background: #1a242b; color: var(--text); font-size: 16px; outline: none; }

        /* LOG */
        #log-panel { background: #000; padding: 12px; font-size: 10px; height: 120px; overflow-y: auto; border-radius: 8px; font-family: monospace; border: 1px solid #333; text-align: left; }
        .log-success { color: #00ff41; } .log-warn { color: #fbff00; } .log-err { color: #ff3131; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body class="dark-mode">

    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>
    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <!-- ACCESO -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary)">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%">ENTRAR</button>
            <button id="btn-recover-open" class="btn ghost" style="width:100%; margin-top:10px">SOPORTE TÉCNICO</button>
        </div>
    </div>

    <!-- APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="import-progress"><div id="progress-fill"></div></div>
            <div style="font-size:10px; text-align:center; margin-bottom:8px; color:var(--success)">● UF DISPONIBLES - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme" class="btn ghost">TEMA</button>
                <button id="btn-logout-trigger" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-add" class="btn primary">NUEVA UF</button>
                <button id="btn-import" class="btn ghost">IMPORTAR</button>
                <button id="btn-export" class="btn ghost">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search" class="btn primary">BUSCAR</button>
                <button id="btn-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-delete-all" class="btn danger" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-container" class="hidden" style="position:relative; margin-bottom:15px">
                <button id="btn-download-log" class="btn ghost" style="position:absolute; top:5px; right:5px; width:30px; height:30px"><i class="fas fa-download"></i></button>
                <div id="log-panel"></div>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL FORMULARIO -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Datos de Unidad</h3>
            <input id="f-uf" placeholder="Unidad">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Teléfono Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Teléfono Inquilino">
            <div class="grid-btns-2">
                <button id="btn-save" class="btn primary">GUARDAR</button>
                <button id="btn-cancel" class="btn danger">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMACIONES -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content">
            <h3 id="confirm-title">Autorización</h3>
            <p id="confirm-msg" style="margin:10px 0; font-size:13px"></p>
            <input id="confirm-pass" type="password" placeholder="Clave Administrativa">
            <div class="grid-btns-2">
                <button id="btn-confirm-yes" class="btn primary">AUTORIZAR</button>
                <button id="btn-confirm-no" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        const MASTER = "1131552679";
        let ufs = [], editId = null, pending = null;

        const writeLog = (msg, type = 'success') => {
            const lp = document.getElementById("log-panel");
            const cls = { success: 'log-success', warn: 'log-warn', err: 'log-err' };
            lp.innerHTML += `<div class="${cls[type]}">» [${new Date().toLocaleTimeString()}] ${msg}</div>`;
            lp.scrollTop = lp.scrollHeight;
        };

        // ACCESO
        const login = async () => {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            if(p === MASTER) return start();
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) start(); else alert("Acceso denegado");
        };
        document.getElementById("btn-login").onclick = login;
        document.getElementById("login-pass").onkeyup = (e) => e.key === "Enter" && login();
        document.getElementById("btn-recover-open").onclick = () => { if(prompt("CÓDIGO SOPORTE:") === MASTER) start(); };

        function start() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").classList.remove("hidden");
            load();
        }

        function load() {
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                ufs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(ufs);
                writeLog("Sincronización Cloud", "success");
            });
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(d => {
                const hasPhone = (d.TelefonoPropietario && d.TelefonoPropietario.trim() !== "") || (d.TelefonoInquilino && d.TelefonoInquilino.trim() !== "");
                const div = document.createElement("div");
                div.className = `item ${!hasPhone ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start">
                        <div>
                            <b class="uf-title">UF: ${d.UF}</b>
                            <span class="prop-name">${d.Propietario || '---'}</span>
                        </div>
                        <div style="display:flex; gap:12px; font-size:18px; padding-top:5px">
                            <i class="fas fa-eye" style="color:#94a3b8" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.editUF('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger)" onclick="window.askConfirm('Borrar UF ${d.UF}?', 'delete', '${d.id}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details-box hidden">
                        <span class="label-blue">Prop:</span>
                        <span class="val-text">${d.Propietario || '---'} |</span>
                        <span class="label-blue">Tel:</span>
                        <span class="val-text">${d.TelefonoPropietario || 'N/C'}</span>
                        
                        <span class="label-blue" style="margin-top:15px">Inq:</span>
                        <span class="val-text">${d.Inquilino || '---'} |</span>
                        <span class="label-blue">Tel:</span>
                        <span class="val-text">${d.TelefonoInquilino || 'N/C'}</span>

                        <div class="grid-btns-2">
                            <a href="tel:${d.TelefonoPropietario || d.TelefonoInquilino}" class="btn primary"><i class="fas fa-phone-alt"></i> LLAMAR</a>
                            <a href="https://wa.me/${(d.TelefonoInquilino || d.TelefonoPropietario || '').replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i> CHAT</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // IMPORTACIÓN (FORMATO CSV)
        document.getElementById("btn-import").onclick = () => document.getElementById("csv-file").click();
        document.getElementById("csv-file").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
                const total = lines.length - 1;
                document.getElementById("import-progress").style.display = "block";
                
                let batch = writeBatch(db);
                let count = 0;

                for(let i = 1; i < lines.length; i++){
                    // Manejo de punto y coma con comillas[cite: 2]
                    const cols = lines[i].split(';').map(v => v.replace(/"/g, "").trim());
                    if(cols[0]){
                        const ref = doc(collection(db, "departamentos"));
                        batch.set(ref, {
                            UF: cols[0], Propietario: cols[1], TelefonoPropietario: cols[2],
                            Inquilino: cols[3], TelefonoInquilino: cols[4]
                        });
                        count++;
                        document.getElementById("progress-fill").style.width = `${(count/total)*100}%`;
                        
                        if(count % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
                    }
                }
                await batch.commit();
                writeLog(`Importadas ${count} unidades`, "success");
                setTimeout(() => document.getElementById("import-progress").style.display = "none", 2000);
            };
            reader.readAsText(e.target.files[0]);
        };

        // BÚSQUEDA Y FILTROS
        const runSearch = () => {
            const v = document.getElementById("search-input").value.toLowerCase();
            render(ufs.filter(u => u.UF.includes(v) || (u.Propietario||'').toLowerCase().includes(v) || (u.Inquilino||'').toLowerCase().includes(v)));
            writeLog(`Buscando: ${v}`, "warn");
        };
        document.getElementById("btn-search").onclick = runSearch;
        document.getElementById("search-input").onkeyup = (e) => e.key === "Enter" && runSearch();
        document.getElementById("btn-clear").onclick = () => { document.getElementById("search-input").value = ""; render(ufs); writeLog("Vista reiniciada", "success"); };
        document.getElementById("btn-filter-empty").onclick = () => {
            render(ufs.filter(u => (!u.TelefonoPropietario || u.TelefonoPropietario==="") && (!u.TelefonoInquilino || u.TelefonoInquilino==="")));
            writeLog("Filtrando: Sin teléfonos", "warn");
        };

        // ACCIONES CRUD
        window.askConfirm = (msg, type, id = null) => {
            pending = { type, id };
            document.getElementById("confirm-msg").innerText = msg;
            document.getElementById("modal-confirm").classList.remove("hidden");
        };

        document.getElementById("btn-confirm-yes").onclick = async () => {
            if(document.getElementById("confirm-pass").value !== MASTER) return alert("Clave Incorrecta");
            if(pending.type === 'delete') await deleteDoc(doc(db, "departamentos", pending.id));
            if(pending.type === 'deleteAll') {
                const b = writeBatch(db); ufs.forEach(u => b.delete(doc(db, "departamentos", u.id))); await b.commit();
                writeLog("NUBE VACIADA", "err");
            }
            document.getElementById("modal-confirm").classList.add("hidden");
            document.getElementById("confirm-pass").value = "";
        };

        document.getElementById("btn-add").onclick = () => { editId = null; document.getElementById("modal-form").classList.remove("hidden"); };
        window.editUF = (id) => {
            editId = id; const d = ufs.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario; document.getElementById("f-inq").value = d.Inquilino;
            document.getElementById("f-teli").value = d.TelefonoInquilino;
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save").onclick = async () => {
            const data = {
                UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value,
                TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value,
                TelefonoInquilino: document.getElementById("f-teli").value
            };
            if(editId) await updateDoc(doc(db, "departamentos", editId), data);
            else await addDoc(collection(db, "departamentos"), data);
            writeLog(`Guardada UF ${data.UF}`, "success");
            document.getElementById("modal-form").classList.add("hidden");
        };

        // UI EVENTOS
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        window.onscroll = () => document.getElementById("btn-rocket").style.display = window.scrollY > 400 ? "flex" : "none";
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("btn-logout-trigger").onclick = () => { if(confirm("¿Cerrar Sistema?")) location.reload(); };
        document.querySelectorAll("#btn-confirm-no, #btn-cancel").forEach(b => b.onclick = () => document.querySelectorAll(".modal").forEach(m => m.id!=="login-screen" && m.classList.add("hidden")));

    </script>
</body>
</html>
