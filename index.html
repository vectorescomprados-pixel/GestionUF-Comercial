<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - V4.2 Gold</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2563eb; --danger: #e11d48; --text: #1f293b; --border: #e5e7eb; --warning: #f59e0b; --success: #22c55e; }
        body.dark-mode { --bg: #0b141a; --card: #111b21; --text: #e9edef; --border: #222d34; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        
        /* HEADER COMPACTO */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 10px; border-bottom: 3px solid var(--primary); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .content-body { margin-top: 360px; width: 100%; padding-bottom: 80px; }
        .admin-mode .content-body { margin-top: 410px; }

        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
        .btn { height: 38px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #64748b; } .warning { background: var(--warning); color: #000; } .success-btn { background: var(--success); }
        
        input, select { width: 100%; height: 40px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--border); padding: 0 12px; background: var(--bg); color: var(--text); font-size: 14px; }

        /* LOG DENTRO DE CONSOLA */
        #log-container { position: relative; background: #000; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; height: 100px; overflow: hidden; }
        #log-panel { padding: 8px; font-size: 9px; height: 100%; overflow-y: auto; font-family: monospace; color: #aaa; }
        #btn-download-log { position: absolute; top: 5px; right: 5px; background: rgba(255,255,255,0.1); border: none; color: #0cf; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; z-index: 20; }
        .log-success { color: #0f0; } .log-err { color: #f44; } .log-info { color: #0cf; }

        .item { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .item.no-phone { border-left: 5px solid var(--warning); }
        .details { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); font-size: 13px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 90%; max-width: 380px; }
        #btn-rocket { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; z-index: 5000; display: none; }
    </style>
</head>
<body class="dark-mode">

    <button id="btn-rocket" class="btn primary"><i class="fas fa-rocket"></i></button>
    <input type="file" id="input-csv-hidden" accept=".csv" class="hidden">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:15px; color:var(--primary)">GestiónUF Login</h2>
            <input id="user-in" placeholder="Usuario">
            <input id="pass-in" type="password" placeholder="Contraseña">
            <button id="btn-do-login" class="btn primary" style="width:100%">ACCEDER</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="status-bar" style="font-size:9px; text-align:center; margin-bottom:8px; color:var(--success)">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            
            <div class="grid-btns">
                <button id="toggle-log" class="btn ghost admin-only">LOG</button>
                <button id="toggle-theme" class="btn ghost">TEMA</button>
                <button id="trigger-logout" class="btn danger">SALIR</button>
            </div>

            <div class="grid-btns admin-only">
                <button id="add-uf-btn" class="btn primary">NUEVA UF</button>
                <button id="import-btn" class="btn ghost">IMPORTAR</button>
                <button id="users-mgr-btn" class="btn success-btn">CUENTAS</button>
            </div>

            <input id="main-search" placeholder="Buscar unidad o nombre...">
            
            <div class="grid-btns">
                <button id="search-go" class="btn primary">BUSCAR</button>
                <button id="search-clear" class="btn ghost">LIMPIAR</button>
                <button id="filter-avail" class="btn warning">DISPONIBLES</button>
            </div>

            <div class="grid-btns admin-only">
                <button id="export-btn" class="btn success-btn">RESPALDO</button>
                <button id="delete-all-btn" class="btn danger" style="grid-column: span 2">BORRAR BASE</button>
            </div>
        </div>

        <div class="content-body" id="body-container">
            <div id="log-container" class="hidden">
                <button id="btn-download-log"><i class="fas fa-save"></i> LOG</button>
                <div id="log-panel"></div>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <!-- MODAL FORMULARIO -->
    <div id="modal-uf" class="modal hidden">
        <div class="modal-content">
            <h3 id="form-title">Unidad Funcional</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 101)">
            <input id="f-prop" placeholder="Propietario">
            <input id="f-telp" placeholder="Teléfono Propietario">
            <input id="f-inq" placeholder="Inquilino">
            <input id="f-teli" placeholder="Teléfono Inquilino">
            <div class="grid-btns-2">
                <button id="save-uf-action" class="btn primary">GUARDAR</button>
                <button id="close-uf-modal" class="btn danger">CERRAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL USUARIOS -->
    <div id="modal-users" class="modal hidden">
        <div class="modal-content">
            <h3>Gestión de Usuarios</h3>
            <input id="new-u-name" placeholder="Usuario">
            <input id="new-u-pass" type="password" placeholder="Contraseña">
            <select id="new-u-role">
                <option value="operador">Operador</option>
                <option value="admin">Administrador</option>
            </select>
            <button id="add-user-action" class="btn primary" style="width:100%">CREAR</button>
            <div id="users-list-render" style="margin-top:10px; max-height:150px; overflow-y:auto; font-size:11px"></div>
            <button id="close-users-btn" class="btn ghost" style="width:100%; margin-top:10px">CERRAR</button>
        </div>
    </div>

    <!-- MODAL CONFIRMACIÓN -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <h3 id="conf-title">Confirmar</h3>
            <p id="conf-msg" style="margin:10px 0; font-size:12px"></p>
            <input id="conf-pass-check" type="password" placeholder="Clave Administrador">
            <div class="grid-btns-2">
                <button id="conf-yes" class="btn primary">SÍ</button>
                <button id="conf-no" class="btn danger">NO</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        let departamentos = [], editId = null, pendingAction = null;

        const getDBUsers = () => JSON.parse(localStorage.getItem("db_users") || '{"admin":{"pass":"admin123","role":"admin"}}');
        const currentUser = () => localStorage.getItem("uf_user");

        const pushLog = (msg, type = 'info') => {
            const panel = document.getElementById("log-panel");
            if(panel) {
                panel.innerHTML += `<div class="log-${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
                panel.scrollTop = panel.scrollHeight;
            }
        };

        // --- LOGIN ---
        document.getElementById("btn-do-login").onclick = () => {
            const u = document.getElementById("user-in").value.toLowerCase().trim();
            const p = document.getElementById("pass-in").value;
            const users = getDBUsers();
            if(users[u] && users[u].pass === p) {
                localStorage.setItem("uf_auth", "true");
                localStorage.setItem("uf_user", u);
                location.reload();
            } else alert("Credenciales incorrectas");
        };

        // --- CARGA INICIAL ---
        if(localStorage.getItem("uf_auth") === "true") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            const role = getDBUsers()[currentUser()]?.role;
            if(role === 'admin') document.body.classList.add("admin-mode");

            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                departamentos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(departamentos);
            });
            pushLog(`Sesión iniciada: ${currentUser()}`, 'success');
        }

        function render(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            const isAdmin = getDBUsers()[currentUser()]?.role === 'admin';
            data.forEach(d => {
                const tel = String(d.TelefonoPropietario || d.TelefonoInquilino || "").trim();
                const div = document.createElement("div");
                div.className = `item ${!tel ? 'no-phone' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || '---'}</small></div>
                        <div style="display:flex; gap:12px; font-size:16px">
                            <i class="fas fa-eye" onclick="window.viewUF('${d.id}')"></i>
                            ${isAdmin ? `<i class="fas fa-edit" style="color:#2563eb" onclick="window.openEdit('${d.id}')"></i>` : ''}
                            ${isAdmin ? `<i class="fas fa-trash" style="color:#e11d48" onclick="window.confirmAction('¿Borrar UF ${d.UF}?', 'delete', '${d.id}')"></i>` : ''}
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details hidden">
                        <p>P: ${d.Propietario} (${d.TelefonoPropietario || 'S/D'})</p>
                        <p>I: ${d.Inquilino} (${d.TelefonoInquilino || 'S/D'})</p>
                        <div class="grid-btns-2">
                            <a href="tel:${tel}" class="btn primary" onclick="window.pushLog('Llamada a UF ${d.UF}')">LLAMAR</a>
                            <a href="https://wa.me/${tel.replace(/\D/g,'')}" target="_blank" class="btn success-btn" onclick="window.pushLog('WP a UF ${d.UF}')">WHATSAPP</a>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        window.viewUF = (id) => {
            document.getElementById(`det-${id}`).classList.toggle("hidden");
            pushLog(`Consultó detalle UF ID: ${id}`);
        };

        // --- BUSCADOR ---
        document.getElementById("search-go").onclick = () => {
            const v = document.getElementById("main-search").value.toLowerCase().trim();
            if(!v) { render(departamentos); return; }
            const res = departamentos.filter(d => String(d.UF).toLowerCase().includes(v) || String(d.Propietario||"").toLowerCase().includes(v));
            render(res);
            if(res.length > 0) pushLog(`Búsqueda: "${v}" - ${res.length} resultados`, 'success');
            else pushLog(`Búsqueda: "${v}" - SIN RESULTADOS`, 'err');
        };
        document.getElementById("search-clear").onclick = () => { document.getElementById("main-search").value = ""; render(departamentos); };
        document.getElementById("filter-avail").onclick = () => {
            const r = departamentos.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino);
            render(r);
            pushLog(`Filtró Disponibles: ${r.length} encontradas`);
        };

        // --- GESTIÓN DATOS ---
        document.getElementById("add-uf-btn").onclick = () => { editId = null; document.getElementById("modal-uf").classList.remove("hidden"); };
        document.getElementById("close-uf-modal").onclick = () => document.getElementById("modal-uf").classList.add("hidden");
        
        document.getElementById("save-uf-action").onclick = async () => {
            const d = { UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value, TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value, TelefonoInquilino: document.getElementById("f-teli").value };
            if(editId) {
                await updateDoc(doc(db, "departamentos", editId), d);
                pushLog(`Editó UF: ${d.UF}`);
            } else {
                await addDoc(collection(db, "departamentos"), d);
                pushLog(`Creó nueva UF: ${d.UF}`, 'success');
            }
            document.getElementById("modal-uf").classList.add("hidden");
        };

        window.openEdit = (id) => {
            editId = id; const d = departamentos.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario;
            document.getElementById("f-telp").value = d.TelefonoPropietario; document.getElementById("f-inq").value = d.Inquilino;
            document.getElementById("f-teli").value = d.TelefonoInquilino;
            document.getElementById("modal-uf").classList.remove("hidden");
        };

        // --- IMPORTAR / EXPORTAR ---
        document.getElementById("export-btn").onclick = () => {
            let csv = "UF,Propietario,TelefonoPropietario,Inquilino,TelefonoInquilino\n";
            departamentos.forEach(d => csv += `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}\n`);
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Base_Datos_UF.csv"; a.click();
            pushLog("Exportó Base de Datos a CSV");
        };

        document.getElementById("import-btn").onclick = () => document.getElementById("input-csv-hidden").click();
        document.getElementById("input-csv-hidden").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const rows = ev.target.result.split("\n").slice(1);
                for(let r of rows) {
                    const c = r.split(",");
                    if(c.length >= 5) await addDoc(collection(db, "departamentos"), {UF:c[0], Propietario:c[1], TelefonoPropietario:c[2], Inquilino:c[3], TelefonoInquilino:c[4]});
                }
                pushLog("Importación masiva completada", 'success');
                alert("Importado con éxito");
            };
            reader.readAsText(e.target.files[0]);
        };

        // --- USUARIOS ---
        document.getElementById("users-mgr-btn").onclick = () => {
            const u = getDBUsers();
            const list = document.getElementById("users-list-render");
            list.innerHTML = "";
            Object.keys(u).forEach(k => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #333">
                    <span>${k} (${u[k].role})</span>
                    ${k!=='admin' ? `<i class="fas fa-trash" onclick="window.delUser('${k}')"></i>` : ''}
                </div>`;
            });
            document.getElementById("modal-users").classList.remove("hidden");
        };
        document.getElementById("close-users-btn").onclick = () => document.getElementById("modal-users").classList.add("hidden");
        
        document.getElementById("add-user-action").onclick = () => {
            const u = document.getElementById("new-u-name").value.toLowerCase().trim();
            const p = document.getElementById("new-u-pass").value;
            const r = document.getElementById("new-u-role").value;
            if(!u || !p) return;
            const db_u = getDBUsers();
            db_u[u] = {pass:p, role:r};
            localStorage.setItem("db_users", JSON.stringify(db_u));
            pushLog(`Creó usuario: ${u}`);
            document.getElementById("users-mgr-btn").click();
        };

        window.delUser = (k) => {
            const u = getDBUsers(); delete u[k];
            localStorage.setItem("db_users", JSON.stringify(u));
            document.getElementById("users-mgr-btn").click();
        };

        // --- CONFIRMACIONES (BORRAR BASE, LOGOUT, ELIMINAR UF) ---
        window.confirmAction = (msg, type, id = null) => {
            pendingAction = {type, id};
            document.getElementById("conf-msg").innerText = msg;
            document.getElementById("modal-confirm").classList.remove("hidden");
            document.getElementById("conf-pass-check").value = ""; 
        };

        document.getElementById("delete-all-btn").onclick = () => window.confirmAction("¿BORRAR TODA LA NUBE? Esta acción es irreversible.", "deleteAll");
        document.getElementById("trigger-logout").onclick = () => {
            localStorage.clear(); location.reload();
        };

        document.getElementById("conf-yes").onclick = async () => {
            const pass = document.getElementById("conf-pass-check").value;
            const myPass = getDBUsers()[currentUser()].pass;
            if(pass !== myPass) return alert("Contraseña de administrador incorrecta");

            if(pendingAction.type === 'delete') {
                await deleteDoc(doc(db, "departamentos", pendingAction.id));
                pushLog(`Eliminó registro ID: ${pendingAction.id}`, 'err');
            }
            if(pendingAction.type === 'deleteAll') {
                const snap = await getDocs(collection(db, "departamentos"));
                const batch = writeBatch(db); snap.forEach(d => batch.delete(d.ref)); await batch.commit();
                pushLog("BORRADO TOTAL DE LA BASE DE DATOS", 'err');
            }
            document.getElementById("modal-confirm").classList.add("hidden");
        };
        document.getElementById("conf-no").onclick = () => document.getElementById("modal-confirm").classList.add("hidden");

        // --- LOG DOWNLOAD ---
        document.getElementById("btn-download-log").onclick = () => {
            const blob = new Blob([document.getElementById("log-panel").innerText], {type:'text/plain'});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Log_Sistema.txt"; a.click();
        };

        // --- EXTRAS ---
        document.getElementById("toggle-log").onclick = () => document.getElementById("log-container").classList.toggle("hidden");
        document.getElementById("toggle-theme").onclick = () => document.body.classList.toggle("dark-mode");
        window.onscroll = () => document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? "flex" : "none";
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        window.pushLog = pushLog; // Hacerlo global para botones inline
    </script>
</body>
</html>
