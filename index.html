<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF Pro - Final Gold V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #1f293b; --border: #e5e7eb; }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }
        .wrap { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* CABECERA BLINDADA - AJUSTE DE BLOQUE */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 4px solid var(--primary); border-radius: 0 0 20px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        
        /* CUERPO CON MARGEN PARA NO TAPAR NADA */
        .content-body { margin-top: 390px; width: 100%; padding-bottom: 100px; }
        
        /* GRIDS DE BOTONES */
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn { height: 44px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .primary { background: var(--primary); } .danger { background: var(--danger); } .ghost { background: #374151; } .warning { background: var(--warning); color: #000; }
        
        /* COHETE REFLOTADO */
        #btn-rocket { position: fixed; bottom: 30px; right: 25px; width: 55px; height: 55px; border-radius: 50%; z-index: 5000; background: var(--primary); border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); color: white; display: none; align-items: center; justify-content: center; font-size: 20px; }

        /* BUSCADOR */
        .search-box { position: relative; margin-bottom: 10px; }
        input { width: 100%; height: 48px; border-radius: 12px; border: 1px solid var(--border); padding: 0 15px; background: #1c272f; color: white; font-size: 16px; margin-bottom: 10px; }
        .light-mode input { background: #fff; color: #000; }

        /* CARDS DE UNIDADES */
        .item { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 8px solid var(--primary); position: relative; }
        .item.empty-uf { border-left-color: var(--warning); }
        .item b { font-size: 17px; color: var(--primary); display: block; }
        .details-pane { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); font-size: 14px; line-height: 1.6; }

        /* LOG / HISTORIAL */
        #log-panel { background: #000; color: #00ff41; padding: 12px; font-family: 'Courier New', monospace; font-size: 11px; height: 120px; overflow-y: auto; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; line-height: 1.4; }

        /* MODALES UNIFICADOS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    </style>
</head>
<body class="dark-mode">

    <button id="btn-rocket"><i class="fas fa-rocket"></i></button>
    <input type="file" id="csv-file" class="hidden" accept=".csv">

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <div class="modal-content" style="text-align:center">
            <h2 style="color:var(--primary); margin-bottom:20px;">GestiónUF Pro</h2>
            <input id="login-user" placeholder="Usuario">
            <input id="login-pass" type="password" placeholder="Contraseña">
            <button id="btn-login-go" class="btn primary" style="width:100%">INICIAR SESIÓN</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div id="status-bar" style="text-align:center; font-size:10px; color:var(--success); margin-bottom:8px;">● SISTEMA ACTIVO - NUBE SINCRONIZADA</div>
            
            <div class="grid-btns">
                <button id="btn-log-toggle" class="btn ghost">HISTORIAL</button>
                <button id="btn-theme-toggle" class="btn ghost">TEMA</button>
                <button id="btn-logout-init" class="btn danger">CERRAR</button>
            </div>
            
            <div class="grid-btns">
                <button id="btn-add-new" class="btn primary">NUEVA UF</button>
                <button id="btn-import-csv" class="btn ghost">IMPORTAR</button>
                <button id="btn-export-csv" class="btn ghost">RESPALDO</button>
            </div>

            <input id="search-input" placeholder="Buscar UF o Apellido..." autocomplete="off">
            
            <div class="grid-btns">
                <button id="btn-do-search" class="btn primary">BUSCAR</button>
                <button id="btn-reset" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-avail" class="btn warning">UF DISPONIBLES</button>
            </div>
            
            <button id="btn-danger-wipe" class="btn danger" style="width:100%">BORRAR TODA LA NUBE</button>
        </div>

        <div class="content-body">
            <div id="log-panel" class="hidden"></div>
            <div id="list-container"></div>
        </div>
    </div>

    <!-- MODAL FORMULARIO COMPLETO -->
    <div id="modal-form" class="modal hidden">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:15px;">Datos de la Unidad</h3>
            <input id="f-uf" placeholder="Unidad (Ej: 001-A)">
            <input id="f-prop" placeholder="Nombre Propietario">
            <input id="f-telp" placeholder="Teléfono Propietario">
            <input id="f-inq" placeholder="Nombre Inquilino">
            <input id="f-teli" placeholder="Teléfono Inquilino">
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr; margin-top:10px;">
                <button id="btn-save-uf" class="btn primary">GUARDAR</button>
                <button id="btn-cancel-form" class="btn danger">DESCARTAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE SEGURIDAD (PARA BORRAR, SALIR, EXPORTAR) -->
    <div id="modal-security" class="modal hidden">
        <div class="modal-content" style="text-align:center">
            <i class="fas fa-lock" style="font-size:30px; color:var(--danger); margin-bottom:15px;"></i>
            <h3 id="sec-title">Confirmar Acción</h3>
            <p id="sec-msg" style="font-size:13px; margin:10px 0; opacity:0.8;"></p>
            <input id="sec-pass" type="password" placeholder="Clave Administrativa">
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr;">
                <button id="btn-sec-confirm" class="btn primary">AUTORIZAR</button>
                <button id="btn-sec-cancel" class="btn ghost">VOLVER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let localData = [], editId = null, pendingAction = null;
        const ADMIN_KEY = "admin"; // Clave por defecto
        const MASTER_KEY = "1131552679";

        const writeLog = (m, type="info") => {
            const p = document.getElementById("log-panel");
            p.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
            p.scrollTop = p.scrollHeight;
        };

        // --- RENDERIZADO ---
        function render(data) {
            const container = document.getElementById("list-container");
            container.innerHTML = "";
            data.forEach(d => {
                const isVacant = !d.TelefonoPropietario && !d.TelefonoInquilino;
                const div = document.createElement("div");
                div.className = `item ${isVacant ? 'empty-uf' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>UF: ${d.UF}</b><small>${d.Propietario || 'S/D'}</small></div>
                        <div style="display:flex; gap:15px; font-size:18px; cursor:pointer">
                            <i class="fas fa-eye" title="Ver completo" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary)" onclick="window.initEdit('${d.id}')"></i>
                            <i class="fas fa-trash" style="color:var(--danger)" onclick="window.triggerSec('delete', '${d.id}', '¿Eliminar UF ${d.UF}?')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="details-pane hidden">
                        <p><strong>Propietario:</strong> ${d.Propietario || '---'}</p>
                        <p><strong>Tel. Prop:</strong> ${d.TelefonoPropietario || '---'}</p>
                        <p><strong>Inquilino:</strong> ${d.Inquilino || '---'}</p>
                        <p><strong>Tel. Inq:</strong> ${d.TelefonoInquilino || '---'}</p>
                        <div class="grid-btns" style="margin-top:10px">
                             <a href="tel:${d.TelefonoPropietario || d.TelefonoInquilino}" class="btn primary"><i class="fas fa-phone"></i></a>
                             <a href="https://wa.me/${(d.TelefonoPropietario || d.TelefonoInquilino || '').replace(/\D/g,'')}" target="_blank" class="btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- CONTROL DE ACCESO ---
        document.getElementById("btn-login-go").onclick = () => {
            if(document.getElementById("login-pass").value === ADMIN_KEY) {
                localStorage.setItem("session_uf", "active");
                location.reload();
            } else alert("Clave Incorrecta");
        };

        if(localStorage.getItem("session_uf") === "active") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                localData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(localData);
                writeLog("Base de datos sincronizada");
            });
        }

        // --- BUSQUEDA ENTER ---
        document.getElementById("search-input").onkeyup = (e) => { if(e.key === "Enter") document.getElementById("btn-do-search").click(); };
        document.getElementById("btn-do-search").onclick = () => {
            const queryVal = document.getElementById("search-input").value.toLowerCase();
            const filtered = localData.filter(d => d.UF.toLowerCase().includes(queryVal) || (d.Propietario||"").toLowerCase().includes(queryVal));
            render(filtered);
            writeLog(`Búsqueda: ${queryVal} (${filtered.length} resultados)`);
        };

        // --- FILTRO UF DISPONIBLES ---
        document.getElementById("btn-filter-avail").onclick = () => {
            const avail = localData.filter(d => !d.TelefonoPropietario && !d.TelefonoInquilino);
            render(avail);
            writeLog(`Filtrado: UF Disponibles (${avail.length})`);
        };

        // --- SEGURIDAD ---
        window.triggerSec = (type, id, msg) => {
            pendingAction = { type, id };
            document.getElementById("sec-msg").innerText = msg;
            document.getElementById("sec-pass").value = "";
            document.getElementById("modal-security").classList.remove("hidden");
        };

        document.getElementById("btn-sec-confirm").onclick = async () => {
            const pass = document.getElementById("sec-pass").value;
            if(pass !== ADMIN_KEY && pass !== MASTER_KEY) return alert("Clave denegada");

            if(pendingAction.type === 'delete') await deleteDoc(doc(db, "departamentos", pendingAction.id));
            if(pendingAction.type === 'logout') { localStorage.removeItem("session_uf"); location.reload(); }
            if(pendingAction.type === 'wipe') {
                const snap = await getDocs(collection(db, "departamentos"));
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
            }
            if(pendingAction.type === 'export') {
                const csv = "UF,Propietario,Tel_P,Inquilino,Tel_I\n" + localData.map(d => `${d.UF},${d.Propietario},${d.TelefonoPropietario},${d.Inquilino},${d.TelefonoInquilino}`).join("\n");
                const blob = new Blob([csv], {type: 'text/csv'});
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "Respaldo_UF.csv"; link.click();
            }
            document.getElementById("modal-security").classList.add("hidden");
        };

        // --- CRUD ---
        document.getElementById("btn-add-new").onclick = () => { editId = null; document.getElementById("modal-form").classList.remove("hidden"); };
        window.initEdit = (id) => {
            editId = id; const d = localData.find(x => x.id === id);
            document.getElementById("f-uf").value = d.UF; document.getElementById("f-prop").value = d.Propietario || "";
            document.getElementById("f-telp").value = d.TelefonoPropietario || ""; document.getElementById("f-inq").value = d.Inquilino || "";
            document.getElementById("f-teli").value = d.TelefonoInquilino || "";
            document.getElementById("modal-form").classList.remove("hidden");
        };

        document.getElementById("btn-save-uf").onclick = async () => {
            const data = { 
                UF: document.getElementById("f-uf").value, Propietario: document.getElementById("f-prop").value,
                TelefonoPropietario: document.getElementById("f-telp").value, Inquilino: document.getElementById("f-inq").value,
                TelefonoInquilino: document.getElementById("f-teli").value
            };
            if(editId) await updateDoc(doc(db, "departamentos", editId), data);
            else await addDoc(collection(db, "departamentos"), data);
            document.getElementById("modal-form").classList.add("hidden");
            document.querySelectorAll("#modal-form input").forEach(i => i.value = "");
        };

        // --- FUNCIONES EXTRA ---
        document.getElementById("btn-logout-init").onclick = () => window.triggerSec('logout', null, '¿Cerrar el sistema de forma segura?');
        document.getElementById("btn-danger-wipe").onclick = () => window.triggerSec('wipe', null, '¡ADVERTENCIA! Se borrarán todos los datos de la nube.');
        document.getElementById("btn-export-csv").onclick = () => window.triggerSec('export', null, '¿Generar archivo de respaldo?');
        document.getElementById("btn-theme-toggle").onclick = () => document.body.classList.toggle("light-mode");
        document.getElementById("btn-log-toggle").onclick = () => document.getElementById("log-panel").classList.toggle("hidden");
        document.getElementById("btn-reset").onclick = () => { document.getElementById("search-input").value = ""; render(localData); };
        document.getElementById("btn-cancel-form").onclick = () => document.getElementById("modal-form").classList.add("hidden");
        document.getElementById("btn-sec-cancel").onclick = () => document.getElementById("modal-security").classList.add("hidden");

        // IMPORTAR CSV
        document.getElementById("btn-import-csv").onclick = () => document.getElementById("csv-file").click();
        document.getElementById("csv-file").onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const lines = ev.target.result.split("\n").slice(1);
                const batch = writeBatch(db);
                lines.forEach(l => {
                    const [u, p, tp, i, ti] = l.split(",");
                    if(u) batch.set(doc(collection(db, "departamentos")), { UF: u.trim(), Propietario: p, TelefonoPropietario: tp, Inquilino: i, TelefonoInquilino: ti });
                });
                await batch.commit();
                writeLog("Importación masiva completada");
            };
            reader.readAsText(e.target.files[0]);
        };

        // COHETE MOTOR
        window.onscroll = () => { document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? "flex" : "none"; };
        document.getElementById("btn-rocket").onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

    </script>
</body>
</html>
