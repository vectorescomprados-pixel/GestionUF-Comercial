<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>GestiónUF - Final Gold V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* TUS ESTILOS EXACTOS DE LA FOTO 1 - NO TOCAR */
        :root { --bg-color: #0b141a; --card-bg: #111b21; --primary-color: #2563eb; --danger-color: #e11d48; --text-color: #e9edef; --border-color: #222d34; --warning-color: #f59e0b; --success-color: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrapper { width: 95%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }
        .header-fixed { position: fixed; top: 0; width: 95%; max-width: 450px; background-color: var(--card-bg); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary-color); border-radius: 0 0 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .main-content { margin-top: 380px; width: 100%; padding-bottom: 100px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn { height: 42px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-danger { background-color: var(--danger-color); }
        .btn-ghost { background-color: #334155; }
        .btn-warning { background-color: var(--warning-color); color: #000; }
        .search-container { margin-bottom: 10px; }
        input { width: 100%; height: 45px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border-color); padding: 0 15px; background-color: #1d2a33; color: white; font-size: 16px; outline: none; }
        .uf-card { background-color: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .uf-card.no-phones { border-left: 8px solid var(--warning-color) !important; }
        /* ESTILOS DE MODALES Y LOGIN ORIGINALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN ORIGINAL -->
    <div id="login-screen" class="modal-overlay">
        <div class="modal-content">
            <h2 style="text-align: center; margin-bottom: 20px; color: var(--primary-color);">INICIAR SESIÓN</h2>
            <input type="text" id="login-user" placeholder="Usuario">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button id="btn-login" class="btn btn-primary" style="width: 100%; height: 50px;">ENTRAR</button>
        </div>
    </div>

    <div id="app-container" class="wrapper hidden">
        <div class="header-fixed">
            <div id="status-indicator" style="font-size: 10px; text-align: center; margin-bottom: 8px; color: var(--success-color); font-weight: bold;">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="btn-grid">
                <button id="btn-show-logs" class="btn btn-ghost">HISTORIAL</button>
                <button id="btn-users" class="btn btn-warning admin-only">USUARIOS</button>
                <button id="btn-exit" class="btn btn-danger">CERRAR</button>
            </div>
            <div class="btn-grid">
                <button id="btn-new-uf" class="btn btn-primary">NUEVA UF</button>
                <button id="btn-import" class="btn btn-ghost admin-only">IMPORTAR</button>
                <button id="btn-export" class="btn btn-ghost admin-only">RESPALDO</button>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar por Unidad o Apellido...">
            </div>
            <div class="btn-grid">
                <button id="btn-search-trigger" class="btn btn-primary">BUSCAR</button>
                <button id="btn-clear-search" class="btn btn-ghost">LIMPIAR</button>
                <button id="btn-filter-empty" class="btn btn-warning">SIN DATOS</button>
            </div>
            <button id="btn-delete-cloud" class="btn btn-danger admin-only" style="width: 100%;">BORRAR TODA LA NUBE</button>
        </div>

        <div class="main-content">
            <div id="log-panel" class="hidden" style="background:#000; padding:10px; height:100px; overflow-y:auto; font-family:monospace; font-size:10px; margin-bottom:10px; border-radius:8px;"></div>
            <div id="uf-list"></div>
        </div>
    </div>

    <!-- TUS OTROS MODALES (FORMULARIO, CONFIRMACIÓN, ETC) -->
    <div id="modal-confirm" class="modal-overlay hidden">
        <div class="modal-content" style="text-align: center;">
            <h3 id="confirm-title">¿Confirmar Acción?</h3>
            <p id="confirm-msg" style="margin: 15px 0; font-size: 14px;"></p>
            <input type="password" id="admin-key" placeholder="Clave Administrativa">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="confirm-yes" class="btn btn-primary" style="flex: 1;">SI</button>
                <button id="confirm-no" class="btn btn-danger" style="flex: 1;">NO</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let ufs = [], masterKey = "1131552679";

        // FUNCION LOGIN - RESTAURADO EVENTO ENTER
        const loginInput = document.getElementById("login-pass");
        loginInput.addEventListener("keypress", (e) => { if(e.key === "Enter") attemptLogin(); });
        document.getElementById("btn-login").onclick = attemptLogin;

        async function attemptLogin() {
            const user = document.getElementById("login-user").value;
            const pass = document.getElementById("login-pass").value;

            if(pass === masterKey) { initApp("admin"); return; }
            
            const q = query(collection(db, "usuarios"), where("user", "==", user), where("pass", "==", pass));
            const snap = await getDocs(q);
            if(!snap.empty) { initApp(snap.docs[0].data().role); }
            else { alert("Acceso incorrecto"); }
        }

        function initApp(role) {
            sessionStorage.setItem("currentRole", role);
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("app-container").classList.remove("hidden");
            if(role === "operador") document.querySelectorAll(".admin-only").forEach(el => el.remove());
            
            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                ufs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderList(ufs);
            });
        }

        // RENDER - RESTAURADO ICONOS LLAMADA/WHATSAPP Y ESTILO FOTO 1
        function renderList(data) {
            const container = document.getElementById("uf-list");
            container.innerHTML = "";
            data.forEach(d => {
                const noData = !d.TelefonoPropietario && !d.TelefonoInquilino;
                const card = document.createElement("div");
                card.className = `uf-card ${noData ? 'no-phones' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="color:var(--primary-color); font-size:18px;">UF: ${d.UF}</b><br>
                            <small>${d.Propietario || 'SIN NOMBRE'}</small>
                        </div>
                        <div style="display:flex; gap:15px; font-size:20px;">
                            <i class="fas fa-eye" onclick="document.getElementById('det-${d.id}').classList.toggle('hidden')"></i>
                            <i class="fas fa-edit" style="color:var(--primary-color)" onclick="alert('Editar: ${d.UF}')"></i>
                            <i class="fas fa-trash admin-only" style="color:var(--danger-color)" onclick="alert('Borrar: ${d.UF}')"></i>
                        </div>
                    </div>
                    <div id="det-${d.id}" class="hidden" style="margin-top:10px; padding-top:10px; border-top:1px dashed #444; font-size:14px;">
                        <p>PROP: ${d.Propietario} 
                            <a href="tel:${d.TelefonoPropietario}"><i class="fas fa-phone" style="color:var(--success-color); margin-left:10px;"></i></a>
                            <a href="https://wa.me/${d.TelefonoPropietario}"><i class="fab fa-whatsapp" style="color:var(--success-color); margin-left:10px;"></i></a>
                        </p>
                        <p>INQ: ${d.Inquilino} 
                            <a href="tel:${d.TelefonoInquilino}"><i class="fas fa-phone" style="color:var(--success-color); margin-left:10px;"></i></a>
                            <a href="https://wa.me/${d.TelefonoInquilino}"><i class="fab fa-whatsapp" style="color:var(--success-color); margin-left:10px;"></i></a>
                        </p>
                    </div>`;
                container.appendChild(card);
            });
        }

        // FUNCIONES DE BOTONES RESTAURADAS
        document.getElementById("btn-show-logs").onclick = () => document.getElementById("log-panel").classList.toggle("hidden");
        document.getElementById("btn-exit").onclick = () => location.reload();
        
        // BUSCAR Y ENTER EN BUSCAR
        const searchFn = () => {
            const term = document.getElementById("search-input").value.toLowerCase();
            const filtered = ufs.filter(u => u.UF.toLowerCase().includes(term) || u.Propietario.toLowerCase().includes(term));
            renderList(filtered);
        };
        document.getElementById("btn-search-trigger").onclick = searchFn;
        document.getElementById("search-input").onkeyup = (e) => { if(e.key === "Enter") searchFn(); };
        
        document.getElementById("btn-clear-search").onclick = () => { document.getElementById("search-input").value = ""; renderList(ufs); };
        document.getElementById("btn-filter-empty").onclick = () => {
            const filtered = ufs.filter(u => !u.TelefonoPropietario && !u.TelefonoInquilino);
            renderList(filtered);
        };

        // BOTÓN CERRAR EN CONFIRMACIÓN
        document.getElementById("confirm-no").onclick = () => document.getElementById("modal-confirm").classList.add("hidden");
    </script>
</body>
</html>
