<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>GestiónUF V9.6 - Final Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d141b; --card: #151f2b; --header-bg: #111b21; --primary: #2563eb; --danger: #e11d48; --text: #e9edef; --border: #222d34; --warning: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; padding: 10px 0; }

        /* HEADER SEGÚN FOTO */
        .main-header { background: var(--header-bg); padding: 15px; border-radius: 20px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .status-bar { text-align:center; font-size:11px; color:var(--success); margin-bottom:12px; font-weight:bold; letter-spacing: 0.5px; }
        .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        
        .btn { height: 48px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; color: white; text-transform: uppercase; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .primary { background: var(--primary); } 
        .danger { background: var(--danger); } 
        .ghost { background: #374151; } 
        .warning { background: var(--warning); color: #000; }

        input { width: 100%; height: 50px; margin: 5px 0 12px 0; border-radius: 10px; border: 1px solid #1c272f; padding: 0 15px; background: #0d141b; color: white; font-size: 15px; outline: none; }

        /* REGISTROS SEGÚN FOTO */
        .item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #1c272f; position: relative; }
        .no-data { border-left: 6px solid #f59e0b !important; border-top-left-radius: 20px; border-bottom-left-radius: 20px; }
        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .item-info b { color: var(--primary); font-size: 16px; }
        .item-info p { font-size: 14px; margin-top: 3px; color: #ccc; }
        .item-icons { display: flex; gap: 15px; font-size: 18px; color: #a0a0a0; }

        /* MODALES CALCADOS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #151f2b; padding: 25px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #222d34; }
        .logout-icon { font-size: 40px; color: var(--danger); margin-bottom: 15px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ACCESO -->
    <div id="login-screen" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary)">🚀 GestiónUF</h2>
            <input id="l-user" type="text" placeholder="Usuario">
            <input id="l-pass" type="password" placeholder="Contraseña">
            <button id="btn-login" class="btn primary" style="width:100%; margin-bottom:10px;">ENTRAR</button>
            <button id="btn-open-rescue" class="btn danger" style="width:100%;">RECUPERACIÓN</button>
        </div>
    </div>

    <!-- APP -->
    <div id="main-screen" class="wrap hidden">
        <div class="main-header">
            <div class="status-bar">● EN LÍNEA - SEGURIDAD ACTIVA</div>
            <div class="grid-btns">
                <button class="btn ghost" onclick="alert('Historial vacío')">HISTORIAL</button>
                <button class="btn ghost">TEMA</button>
                <button id="btn-open-logout" class="btn danger">CERRAR</button>
            </div>
            <div class="grid-btns">
                <button id="btn-open-add" class="btn primary">NUEVA UF</button>
                <button class="btn ghost admin-only">IMPORTAR</button>
                <button class="btn ghost admin-only">RESPALDO</button>
            </div>
            <input id="search-input" placeholder="Buscar por Unidad o Apellido...">
            <div class="grid-btns">
                <button id="btn-search-exec" class="btn primary">BUSCAR</button>
                <button id="btn-search-clear" class="btn ghost">LIMPIAR</button>
                <button id="btn-filter-avail" class="btn warning">SIN DATOS</button>
            </div>
            <button id="btn-wipe-all" class="btn danger admin-only" style="width:100%; margin-top:5px;">BORRAR TODA LA NUBE</button>
        </div>
        <div id="list"></div>
    </div>

    <!-- MODAL SEGURIDAD / RECUPERACIÓN (CALCADO) -->
    <div id="modal-sec" class="modal hidden">
        <div class="modal-content">
            <h3 id="sec-title">Seguridad Requerida</h3>
            <p id="sec-msg" style="margin: 10px 0; color: #888; font-size: 14px;"></p>
            <input id="sec-input" type="password" placeholder="Clave Administrativa">
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr">
                <button id="btn-sec-confirm" class="btn primary">AUTORIZAR</button>
                <button onclick="closeModals()" class="btn danger">VOLVER</button>
            </div>
        </div>
    </div>

    <!-- MODAL FINALIZAR SESIÓN (CALCADO FOTO 2) -->
    <div id="modal-logout" class="modal hidden">
        <div class="modal-content">
            <div class="logout-icon"><i class="fas fa-sign-out-alt"></i></div>
            <h3 style="color: white; margin-bottom: 8px;">Finalizar Sesión</h3>
            <p style="color: #a0a0a0; font-size: 14px; margin-bottom: 25px;">¿Desea cerrar el sistema de gestión de forma segura?</p>
            <div class="grid-btns" style="grid-template-columns: 1fr 1fr">
                <button id="btn-logout-confirm" class="btn danger">SALIR</button>
                <button onclick="closeModals()" class="btn ghost">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo", authDomain: "gestionuf-remoto.firebaseapp.com", projectId: "gestionuf-remoto", storageBucket: "gestionuf-remoto.firebasestorage.app", messagingSenderId: "724452752860", appId: "1:724452752860:web:4d25585addcdcbd146e319" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        const MASTER_CODE = "1131552679"; //
        let localData = [], secMode = "";

        // LOGIN LÓGICA
        const login = async () => {
            const u = document.getElementById("l-user").value;
            const p = document.getElementById("l-pass").value;
            const q = query(collection(db, "usuarios"), where("user", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) {
                localStorage.setItem("uf_login", snap.docs[0].data().role);
                location.reload();
            } else alert("Error de acceso");
        };
        document.getElementById("btn-login").onclick = login;

        // RECUPERACIÓN ESTÉTICA
        document.getElementById("btn-open-rescue").onclick = () => {
            secMode = "RESCUE";
            document.getElementById("sec-title").innerText = "Seguridad Requerida";
            document.getElementById("sec-msg").innerText = "Ingrese Código Maestro para resetear";
            document.getElementById("modal-sec").classList.remove("hidden");
        };

        // EVENTOS ENTER
        document.getElementById("search-input").onkeydown = (e) => { if(e.key === "Enter") execSearch(); };

        // SESIÓN
        const role = localStorage.getItem("uf_login");
        if(role) {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            if(role === "operador") document.querySelectorAll(".admin-only").forEach(b => b.remove());

            onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (snap) => {
                localData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(localData);
            });
        }

        function render(data) {
            const list = document.getElementById("list"); list.innerHTML = "";
            data.forEach(d => {
                const hasTel = d.TelefonoPropietario || d.TelefonoInquilino;
                const div = document.createElement("div");
                div.className = `item ${!hasTel ? 'no-data' : ''}`;
                div.innerHTML = `
                    <div class="item-top">
                        <div class="item-info"><b>UF: ${d.UF}</b><p>${d.Propietario || '---'}</p></div>
                        <div class="item-icons">
                            <i class="far fa-eye"></i><i class="far fa-edit"></i>
                            <i class="fas fa-trash-alt" style="color:var(--danger)" onclick="window.askDel('${d.id}', '${d.UF}')"></i>
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        // MODALES Y SEGURIDAD
        window.askDel = (id, uf) => {
            secMode = id;
            document.getElementById("sec-title").innerText = "Seguridad Requerida";
            document.getElementById("sec-msg").innerText = `¿Borrar registro UF ${uf}?`;
            document.getElementById("modal-sec").classList.remove("hidden");
        };

        document.getElementById("btn-sec-confirm").onclick = async () => {
            const code = document.getElementById("sec-input").value;
            if(secMode === "RESCUE") {
                if(code === MASTER_CODE) alert("Código Correcto. Puede cambiar la clave.");
                else alert("Código Incorrecto");
            } else {
                if(code === "admin") {
                    await deleteDoc(doc(db, "departamentos", secMode));
                    closeModals();
                } else alert("Clave Administrativa Incorrecta");
            }
        };

        // CERRAR SESIÓN
        document.getElementById("btn-open-logout").onclick = () => document.getElementById("modal-logout").classList.remove("hidden");
        document.getElementById("btn-logout-confirm").onclick = () => { localStorage.clear(); location.reload(); };

        const execSearch = () => {
            const val = document.getElementById("search-input").value.toLowerCase();
            render(localData.filter(x => x.UF.includes(val) || x.Propietario.toLowerCase().includes(val)));
        };
        document.getElementById("btn-search-exec").onclick = execSearch;
        document.getElementById("btn-search-clear").onclick = () => { document.getElementById("search-input").value = ""; render(localData); };
        document.getElementById("btn-filter-avail").onclick = () => render(localData.filter(x => !x.TelefonoPropietario));

        window.closeModals = () => { 
            document.getElementById("modal-sec").classList.add("hidden"); 
            document.getElementById("modal-logout").classList.add("hidden"); 
            document.getElementById("sec-input").value = "";
        };
    </script>
</body>
</html>
