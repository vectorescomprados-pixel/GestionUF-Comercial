<style>
    body:not(.es-admin) .admin-only { display: none !important; }
</style>

<div class="grid-3">
    <button id="btn-nueva" class="btn btn-blue">NUEVA UF</button>
    <button id="btn-importar" class="btn btn-gray admin-only">IMPORTAR</button>
    <button id="btn-respaldo" class="btn btn-gray admin-only">RESPALDO</button>
</div>
<button id="btn-borrar-nube-trigger" class="btn btn-red admin-only" style="width:100%">BORRAR TODA LA NUBE</button>

<script type="module">
    // ... (Tu configuración de Firebase y variables iniciales se mantienen igual) ...

    // --- SECCIÓN DE LOGIN REEMPLAZADA ---
    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("l-u").value, p = document.getElementById("l-p").value;
        const qU = query(collection(db, "usuarios"), where("usuario", "==", u), where("password", "==", p));
        const s = await getDocs(qU);
        
        if(!s.empty) { 
            const userData = s.docs.data();
            localStorage.setItem("uf_v5_full", "ok");
            // Guardamos el rol para usarlo en las restricciones visuales
            localStorage.setItem("user_role", userData.rol || "operador"); 
            location.reload(); 
        }
        else alert("Acceso Denegado");
    };

    if(localStorage.getItem("uf_v5_full") === "ok") {
        const role = localStorage.getItem("user_role");
        // Si es admin, quitamos la restricción visual
        if(role === "admin") { document.body.classList.add("es-admin"); }
        
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("main-screen").classList.remove("hidden");
        
        onSnapshot(query(collection(db, "departamentos"), orderBy("UF", "asc")), (s) => {
            dptos = s.docs.map(d => ({ id: d.id, ...d.data() }));
            render(dptos);
        });
    }

    // --- FUNCIÓN RENDER REEMPLAZADA (OCULTA EL BOTÓN ELIMINAR) ---
    function render(data) {
        const list = document.getElementById("list"); list.innerHTML = "";
        const role = localStorage.getItem("user_role");

        data.forEach(d => {
            const div = document.createElement("div");
            div.className = "item";
            
            // Solo se crea el icono de basura si el rol es 'admin'
            const botonBasura = (role === 'admin') ? 
                `<i class="fas fa-trash" style="color:var(--danger)" onclick="window.askAuth('¿Borrar registro UF ${d.UF}?', 'delete', '${d.id}')"></i>` : '';

            div.innerHTML = `
                <b>UF: ${d.UF}</b><p>${d.Propietario || '---'}</p>
                <div class="item-tools">
                    <i class="fas fa-eye" onclick="this.closest('.item').classList.toggle('open')"></i>
                    <i class="fas fa-edit" style="color:#2563eb" onclick="window.editUF('${d.id}')"></i>
                    ${botonBasura}
                </div>
                <div class="details">
                    <p>Prop: ${d.Propietario} | Tel: ${d.TelefonoPropietario || 'N/C'}</p>
                    <p>Inq: ${d.Inquilino} | Tel: ${d.TelefonoInquilino || 'N/C'}</p>
                </div>`;
            list.appendChild(div);
        });
    }
    // ... (El resto de tus funciones de Seguridad, CSV y CRUD se mantienen igual) ...
</script>
